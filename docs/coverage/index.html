<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <style>:root {
  --color: black;
  --bg: white;
  --head-bg: white;
  --link: #338;

  --blue: #ccf;
  --red: #fcc;
  --yellow: #ffc;
  --green: #cfc;
}

[data-theme='dark'] {
  --color: white;
  --bg: black;
  --head-bg: #333;
  --link: #aaf;

  --blue: #225;
  --red: #522;
  --yellow: #552;
  --green: #252;
}

html,
body {
  margin: 0;
  padding: 0;
  color: var(--color);
  background: var(--bg);
}

.app {
  margin: 10px;
  padding: 0;
}

.files-list {
  margin: 10px 0 0;
  width: 100%;
  border-collapse: collapse;
}
.files-list__head {
  border: 1px solid #999;
}
.files-list__head > tr > th {
  padding: 10px;
  border: 1px solid #999;
  text-align: left;
  font-weight: normal;
  background: var(--head-bg);
}
.files-list__body {
}
.files-list__file {
  cursor: pointer;
}
.files-list__file:hover {
  background: var(--blue);
}
.files-list__file > td {
  padding: 10px;
  border: 1px solid #999;
}
.files-list__file > td:first-child::before {
  content: '\01F4C4';
  margin-right: 1em;
}
.files-list__file_low {
  background: var(--red);
}
.files-list__file_medium {
  background: var(--yellow);
}
.files-list__file_high {
  background: var(--green);
}
.files-list__file_folder > td:first-child::before {
  content: '\01F4C1';
  margin-right: 1em;
}

.file-header {
  border: 1px solid #999;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  background: var(--bg);
}

.file-header__back {
  margin: 10px;
  cursor: pointer;
  flex-shrink: 0;
  flex-grow: 0;
  text-decoration: underline;
  color: var(--link);
}

.file-header__name {
  margin: 10px;
  flex-shrink: 2;
  flex-grow: 2;
}

.file-header__stat {
  margin: 10px;
  flex-shrink: 0;
  flex-grow: 0;
}

.file-content {
  margin: 10px 0 0;
  border: 1px solid #999;
  padding: 10px;
  counter-reset: line;
  display: flex;
  flex-direction: column;
}

.code-line::before {
  content: counter(line);
  margin-right: 72px;
}
.code-line {
  margin: 0;
  height: 1em;
  counter-increment: line;

  position: absolute;
  padding: 0 0.3em 0.3em 0.3em;
  display: inherit;
  width: 100%;
}
.code-line_covered {
  background: var(--green);
}
.code-line_uncovered {
  background: var(--red);
}

.code-text-container {
  position: relative;
  height: 1em;
  padding: 0.3em 0;
}

.cover-indicator {
  display: flex;
  width: 100%;
  position: absolute;
  justify-content: end;
  height: 1em;
  align-items: center;
  padding: 0 0.3em 0.3em 0.3em;
}

.cover-indicator.check-cover::after {
  content: "\2713";
  font-weight: bold;
  background-color: var(--green);
  height: 1em;
}

.cover-indicator.no-cover::after {
  content: "\2716";
  font-weight: bold;
  background-color: var(--red);
  height: 1em;
}

.stat-line-hit {
  max-width: 48px;
  overflow: hidden;
  font-weight: bold;
  margin-right: 4px;
  background-color: var(--green);
  position: relative;
  top: 0.1em;
}

#theme-toggle-label {
  margin-left: 1ch;
}
</style>
</head>

    <script>
        var data = {"files":[{"path":["/","home","lhjnano","source","project","ratatui-bubbles","crates","ratatui-bubbles","examples","demo.rs"],"content":"//! Counter demo for `ratatui_bubbles`.\n//!\n//! Run with: `cargo run --example demo`\n//!\n//! Keys:\n//! - ←/↑ or + : increment\n//! - →/↓ or - : decrement\n//! - r        : reset to 0\n//! - q / Esc  : quit\n\nuse crossterm::event::{Event, KeyCode, KeyEvent, KeyModifiers};\nuse ratatui::layout::{Alignment, Rect};\nuse ratatui::style::{Color, Modifier, Style};\nuse ratatui::text::{Line, Span};\nuse ratatui::widgets::{Block, Borders, Paragraph};\nuse ratatui::Frame;\nuse ratatui_bubbles::elm::{Command, Model};\nuse ratatui_bubbles::runtime::{run, App};\n\n#[derive(Debug, Default)]\nstruct Counter {\n    count: i32,\n}\n\n#[derive(Debug, Clone, Copy, PartialEq, Eq)]\nenum Msg {\n    Increment,\n    Decrement,\n    Reset,\n    Quit,\n}\n\nimpl Model\u003cMsg\u003e for Counter {\n    fn update(\u0026mut self, msg: Msg) -\u003e Command\u003cMsg\u003e {\n        match msg {\n            Msg::Increment =\u003e self.count += 1,\n            Msg::Decrement =\u003e self.count -= 1,\n            Msg::Reset =\u003e self.count = 0,\n            Msg::Quit =\u003e {}\n        }\n        Command::none()\n    }\n\n    fn view(\u0026self, frame: \u0026mut Frame, area: Rect) {\n        let title = Span::styled(\n            \" ratatui-bubbles counter demo \",\n            Style::default()\n                .fg(Color::Cyan)\n                .add_modifier(Modifier::BOLD),\n        );\n\n        let count_line = Line::from(vec![\n            Span::raw(\"  Count: \"),\n            Span::styled(\n                self.count.to_string(),\n                Style::default()\n                    .fg(if self.count \u003e= 0 {\n                        Color::Green\n                    } else {\n                        Color::Red\n                    })\n                    .add_modifier(Modifier::BOLD),\n            ),\n        ]);\n\n        let help = Line::from(vec![\n            Span::raw(\"  \"),\n            Span::styled(\"+\", Style::default().add_modifier(Modifier::BOLD)),\n            Span::raw(\" increment   \"),\n            Span::styled(\"-\", Style::default().add_modifier(Modifier::BOLD)),\n            Span::raw(\" decrement   \"),\n            Span::styled(\"r\", Style::default().add_modifier(Modifier::BOLD)),\n            Span::raw(\" reset   \"),\n            Span::styled(\"q/Esc\", Style::default().add_modifier(Modifier::BOLD)),\n            Span::raw(\" quit\"),\n        ]);\n\n        let block = Block::default()\n            .borders(Borders::ALL)\n            .title(title)\n            .title_alignment(Alignment::Center);\n\n        let paragraph = Paragraph::new(vec![\n            Line::default(),\n            count_line,\n            Line::default(),\n            Line::default(),\n            help,\n        ])\n        .block(block);\n\n        frame.render_widget(paragraph, area);\n    }\n}\n\nimpl App for Counter {\n    type Msg = Msg;\n\n    fn init(\u0026mut self) -\u003e Command\u003cMsg\u003e {\n        Command::none()\n    }\n\n    fn on_event(\u0026mut self, event: Event) -\u003e Option\u003cMsg\u003e {\n        let Event::Key(KeyEvent {\n            code, modifiers, ..\n        }) = event\n        else {\n            return None;\n        };\n        // Ctrl+C always quits.\n        if modifiers.contains(KeyModifiers::CONTROL) \u0026\u0026 code == KeyCode::Char('c') {\n            return Some(Msg::Quit);\n        }\n        match code {\n            KeyCode::Left | KeyCode::Up | KeyCode::Char('+') =\u003e Some(Msg::Increment),\n            KeyCode::Right | KeyCode::Down | KeyCode::Char('-') =\u003e Some(Msg::Decrement),\n            KeyCode::Char('r') =\u003e Some(Msg::Reset),\n            KeyCode::Char('q') | KeyCode::Esc =\u003e Some(Msg::Quit),\n            _ =\u003e None,\n        }\n    }\n\n    fn should_quit(\u0026self, msg: \u0026Msg) -\u003e bool {\n        matches!(msg, Msg::Quit)\n    }\n}\n\nfn main() -\u003e std::io::Result\u003c()\u003e {\n    let mut counter = Counter::default();\n    run(\u0026mut counter)\n}\n","traces":[],"covered":0,"coverable":0},{"path":["/","home","lhjnano","source","project","ratatui-bubbles","crates","ratatui-bubbles","src","elm.rs"],"content":"//! Elm architecture for Ratatui applications.\n//!\n//! A Rust port of the [`Bubble Tea`](https://github.com/charmbracelet/bubbletea)\n//! `tea.Model` / `tea.Msg` / `tea.Cmd` pattern, adapted for terminal rendering\n//! with [`Ratatui`](https://ratatui.rs).\n//!\n//! The Elm Architecture models a TUI program as a pure [`Model`] that reacts to\n//! messages of type `Msg` via [`Model::update`], returning a new state together\n//! with a [`Command`] describing the side-effects to run. The view is a pure\n//! function of the model ([`Model::view`]).\n//!\n//! This module provides the core abstractions only. The actual event loop —\n//! terminal setup, input polling, command dispatch — is intentionally left to\n//! the host application.\n\nuse ratatui::layout::Rect;\nuse ratatui::Frame;\n\n/// A command returned by [`Model::update`].\n///\n/// Commands describe the side-effects to run after a message is processed.\n/// Because a full async runtime is intentionally out of scope for this port,\n/// `Command` is modelled as a simple tree of messages rather than as a real\n/// future.\n#[derive(Debug, Clone, Default)]\npub enum Command\u003cMsg\u003e {\n    /// No side-effect.\n    #[default]\n    None,\n    /// Emit a single message synchronously.\n    Msg(Msg),\n    /// Run several commands together (logically concurrent).\n    Batch(Vec\u003cCommand\u003cMsg\u003e\u003e),\n    /// A placeholder for a timer/tick command (e.g. an animation frame).\n    Tick,\n}\n\nimpl\u003cMsg\u003e Command\u003cMsg\u003e {\n    /// Create an empty command (equivalent to [`Command::None`]).\n    #[must_use]\n    pub const fn none() -\u003e Self {\n        Command::None\n    }\n\n    /// Wrap a single message into a command.\n    #[must_use]\n    pub const fn msg(m: Msg) -\u003e Self {\n        Command::Msg(m)\n    }\n\n    /// Combine several commands into a single [`Command::Batch`].\n    #[must_use]\n    pub const fn batch(cmds: Vec\u003cCommand\u003cMsg\u003e\u003e) -\u003e Self {\n        Command::Batch(cmds)\n    }\n\n    /// Returns `true` when this command performs no work.\n    #[must_use]\n    pub const fn is_none(\u0026self) -\u003e bool {\n        matches!(self, Command::None)\n    }\n}\n\n/// The core Elm Architecture trait.\n///\n/// Implementors own the application state (`self`), react to messages of type\n/// `Msg` in [`Model::update`], and render themselves in [`Model::view`].\npub trait Model\u003cMsg\u003e {\n    /// React to `msg`, mutating internal state and returning a [`Command`]\n    /// describing any side-effects to run afterwards.\n    fn update(\u0026mut self, msg: Msg) -\u003e Command\u003cMsg\u003e;\n\n    /// Render the current state into `frame` within `area`.\n    fn view(\u0026self, frame: \u0026mut Frame\u003c'_\u003e, area: Rect);\n}\n\n/// Entry-point abstraction for a runnable Elm program.\n///\n/// This trait deliberately omits the real event loop — it exists only to anchor\n/// the `init` lifecycle that a host runtime would drive. Wiring terminal setup,\n/// input polling, and command dispatch is the host application's responsibility.\npub trait Program: Sized {\n    /// The message type the program processes.\n    type Msg;\n\n    /// Initialise the program and return the first [`Command`] to run.\n    fn init(\u0026mut self) -\u003e Command\u003cSelf::Msg\u003e;\n}\n\n/// Recursively flatten a [`Command`] tree into an ordered list of leaves.\n///\n/// Every [`Command::Batch`] node is unwrapped one level at a time; the\n/// remaining (`None` / `Msg` / `Tick`) leaves are collected in traversal order.\n/// The result is never itself a `Batch`.\n///\n/// # Examples\n///\n/// ```\n/// # use ratatui_bubbles::elm::{flatten, Command};\n/// let cmd: Command\u003c()\u003e = Command::Batch(vec![\n///     Command::Tick,\n///     Command::Batch(vec![Command::None]),\n/// ]);\n/// assert_eq!(flatten(cmd).len(), 2);\n/// ```\n#[allow(clippy::missing_const_for_fn)] // recurses + allocates; cannot be `const`\n#[must_use]\npub fn flatten\u003cMsg\u003e(cmd: Command\u003cMsg\u003e) -\u003e Vec\u003cCommand\u003cMsg\u003e\u003e {\n    fn recurse\u003cMsg\u003e(cmd: Command\u003cMsg\u003e, out: \u0026mut Vec\u003cCommand\u003cMsg\u003e\u003e) {\n        match cmd {\n            Command::Batch(cmds) =\u003e {\n                for c in cmds {\n                    recurse(c, out);\n                }\n            }\n            // Any non-Batch variant is a leaf (None / Msg / Tick).\n            leaf =\u003e out.push(leaf),\n        }\n    }\n\n    let mut out = Vec::new();\n    recurse(cmd, \u0026mut out);\n    out\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn flatten_unwraps_nested_batches() {\n        let cmd: Command\u003c()\u003e =\n            Command::Batch(vec![Command::Tick, Command::Batch(vec![Command::None])]);\n        // `Tick` and the inner `None` are the two leaves.\n        assert_eq!(flatten(cmd).len(), 2);\n    }\n\n    #[test]\n    fn flatten_unwraps_deeply_nested_batches() {\n        // Batch(Batch(Batch([Tick]))) — three levels deep, one leaf.\n        let cmd: Command\u003c()\u003e = Command::Batch(vec![Command::Batch(vec![Command::Batch(vec![\n            Command::Tick,\n        ])])]);\n        let flat = flatten(cmd);\n        assert_eq!(\n            flat.len(),\n            1,\n            \"deeply nested batch should flatten to 1 leaf\"\n        );\n        assert!(\n            matches!(flat[0], Command::Tick),\n            \"the single leaf should be Tick\"\n        );\n    }\n\n    #[test]\n    fn command_none_is_none_returns_true() {\n        assert!(\n            Command::\u003c()\u003e::none().is_none(),\n            \"Command::none() must be None\"\n        );\n        assert!(\n            !Command::\u003c()\u003e::Tick.is_none(),\n            \"Tick must not be considered None\"\n        );\n    }\n\n    #[test]\n    fn command_default_is_none() {\n        // `Command` does not derive `PartialEq`, so we assert via `is_none()`\n        // (which performs the same structural match the prompt's `==` intended).\n        assert!(\n            Command::\u003c()\u003e::default().is_none(),\n            \"Default::default() must produce Command::None\"\n        );\n    }\n\n    #[test]\n    fn batch_with_empty_vec_still_a_batch() {\n        // An empty Vec must still be a Batch variant (not collapsed to None).\n        let cmd: Command\u003c()\u003e = Command::batch(Vec::new());\n        assert!(\n            matches!(cmd, Command::Batch(ref inner) if inner.is_empty()),\n            \"Command::batch(Vec::new()) must remain Command::Batch([])\"\n        );\n    }\n\n    #[test]\n    fn msg_command_carries_payload() {\n        let cmd: Command\u003cu8\u003e = Command::msg(42u8);\n        assert!(\n            matches!(cmd, Command::Msg(42)),\n            \"Command::msg(42) must carry its payload unchanged\"\n        );\n    }\n\n    #[test]\n    fn flatten_of_none_returns_single_element() {\n        // `None` is a leaf, so flatten yields a single-element Vec.\n        let flat = flatten(Command::\u003c()\u003e::None);\n        assert_eq!(\n            flat.len(),\n            1,\n            \"flatten(None) should produce exactly one leaf\"\n        );\n        assert!(matches!(flat[0], Command::None));\n    }\n\n    #[test]\n    fn flatten_of_msg_returns_single_element() {\n        let flat = flatten(Command::msg(5i32));\n        assert_eq!(\n            flat.len(),\n            1,\n            \"flatten(Msg) should produce exactly one leaf\"\n        );\n        assert!(matches!(flat[0], Command::Msg(5)));\n    }\n\n    #[test]\n    fn flatten_of_tick_returns_single_element() {\n        let flat = flatten(Command::\u003c()\u003e::Tick);\n        assert_eq!(\n            flat.len(),\n            1,\n            \"flatten(Tick) should produce exactly one leaf\"\n        );\n        assert!(matches!(flat[0], Command::Tick));\n    }\n\n    #[test]\n    fn program_init_can_be_called_via_trait_object() {\n        // Define a tiny Program implementation and verify init() is callable.\n        struct StubProgram;\n        impl Program for StubProgram {\n            type Msg = ();\n            fn init(\u0026mut self) -\u003e Command\u003cSelf::Msg\u003e {\n                Command::none()\n            }\n        }\n        let mut p = StubProgram;\n        let cmd = Program::init(\u0026mut p);\n        assert!(cmd.is_none());\n    }\n}\n","traces":[{"line":41,"address":[1868560],"length":1,"stats":{"Line":10}},{"line":42,"address":[],"length":0,"stats":{"Line":10}},{"line":47,"address":[1953792,1953824],"length":1,"stats":{"Line":2}},{"line":48,"address":[],"length":0,"stats":{"Line":2}},{"line":53,"address":[1933712],"length":1,"stats":{"Line":2}},{"line":54,"address":[1953891],"length":1,"stats":{"Line":2}},{"line":59,"address":[],"length":0,"stats":{"Line":1}},{"line":60,"address":[1953925],"length":1,"stats":{"Line":1}},{"line":108,"address":[1954184,1954000,1954408,1954224],"length":1,"stats":{"Line":6}},{"line":109,"address":[],"length":0,"stats":{"Line":6}},{"line":110,"address":[],"length":0,"stats":{"Line":6}},{"line":111,"address":[1954539,1955227],"length":1,"stats":{"Line":3}},{"line":112,"address":[1955515,1954827,1954556,1955424,1954736,1955244],"length":1,"stats":{"Line":9}},{"line":113,"address":[1955580,1954963,1954892,1955651],"length":1,"stats":{"Line":6}},{"line":117,"address":[],"length":0,"stats":{"Line":8}},{"line":121,"address":[1933762],"length":1,"stats":{"Line":6}},{"line":122,"address":[],"length":0,"stats":{"Line":6}},{"line":123,"address":[],"length":0,"stats":{"Line":4}}],"covered":18,"coverable":18},{"path":["/","home","lhjnano","source","project","ratatui-bubbles","crates","ratatui-bubbles","src","key_help.rs"],"content":"//! Key binding help widget — a port of [Bubbles' `key`](https://github.com/charmbracelet/bubbles/key) help formatting.\n//!\n//! Renders a list of key bindings as \"\u003ckey\u003e  \u003cdesc\u003e\" pairs inside a titled block.\n\nuse ratatui::layout::{Alignment, Rect};\nuse ratatui::style::{Modifier, Style};\nuse ratatui::text::{Line, Span};\nuse ratatui::widgets::{Block, Borders, Paragraph};\nuse ratatui::Frame;\n\n/// A single key binding descriptor.\n#[derive(Debug, Clone)]\npub struct KeyBinding {\n    /// The key sequence, e.g. \"ctrl+c\" or \"enter\".\n    pub key: String,\n    /// Human-readable description.\n    pub desc: String,\n    /// Whether the binding is currently available (false = greyed out).\n    pub disabled: bool,\n}\n\nimpl KeyBinding {\n    /// Create an enabled binding.\n    #[must_use]\n    pub fn new(key: impl Into\u003cString\u003e, desc: impl Into\u003cString\u003e) -\u003e Self {\n        Self {\n            key: key.into(),\n            desc: desc.into(),\n            disabled: false,\n        }\n    }\n\n    /// Mark this binding as disabled (will be excluded from rendered help).\n    #[must_use]\n    pub fn disabled(mut self) -\u003e Self {\n        self.disabled = true;\n        self\n    }\n}\n\n/// A registry of key bindings for displaying a help footer / overlay.\n#[derive(Debug, Clone, Default)]\npub struct KeyHelp {\n    bindings: Vec\u003cKeyBinding\u003e,\n    title: String,\n}\n\nimpl KeyHelp {\n    /// Create an empty help registry with default title \"Keys\".\n    #[must_use]\n    pub fn new() -\u003e Self {\n        Self {\n            bindings: Vec::new(),\n            title: \"Keys\".to_string(),\n        }\n    }\n\n    /// Set a custom title for the help block.\n    #[must_use]\n    pub fn with_title(mut self, title: impl Into\u003cString\u003e) -\u003e Self {\n        self.title = title.into();\n        self\n    }\n\n    /// Append a binding.\n    pub fn add(\u0026mut self, binding: KeyBinding) {\n        self.bindings.push(binding);\n    }\n\n    /// Returns the count of enabled bindings.\n    #[must_use]\n    pub fn len(\u0026self) -\u003e usize {\n        self.bindings.iter().filter(|b| !b.disabled).count()\n    }\n\n    /// Returns true when there are no enabled bindings.\n    #[must_use]\n    pub fn is_empty(\u0026self) -\u003e bool {\n        self.len() == 0\n    }\n\n    /// Return (key, desc) pairs for all enabled bindings.\n    #[must_use]\n    pub fn full_help(\u0026self) -\u003e Vec\u003c(String, String)\u003e {\n        self.bindings\n            .iter()\n            .filter(|b| !b.disabled)\n            .map(|b| (b.key.clone(), b.desc.clone()))\n            .collect()\n    }\n\n    /// Renders the help registry as a Paragraph inside a titled Block.\n    ///\n    /// Each enabled binding is rendered as \"\u003ckey\u003e  \u003cdesc\u003e\" on its own line.\n    pub fn render(\u0026self, frame: \u0026mut Frame\u003c'_\u003e, area: Rect) {\n        let lines: Vec\u003cLine\u003c'_\u003e\u003e = self\n            .bindings\n            .iter()\n            .filter(|b| !b.disabled)\n            .map(|b| {\n                Line::from(vec![\n                    Span::styled(\n                        b.key.as_str().to_string(),\n                        Style::default().add_modifier(Modifier::BOLD),\n                    ),\n                    Span::raw(\"  \"),\n                    Span::raw(b.desc.as_str().to_string()),\n                ])\n            })\n            .collect();\n        let block = Block::default()\n            .borders(Borders::ALL)\n            .title(self.title.as_str())\n            .title_alignment(Alignment::Left);\n        let paragraph = Paragraph::new(lines).block(block);\n        frame.render_widget(paragraph, area);\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn new_starts_empty() {\n        let h = KeyHelp::new();\n        assert!(h.is_empty());\n        assert_eq!(h.len(), 0);\n    }\n\n    #[test]\n    fn add_includes_enabled_bindings_only() {\n        let mut h = KeyHelp::new();\n        h.add(KeyBinding::new(\"q\", \"quit\"));\n        h.add(KeyBinding::new(\"d\", \"deleted\").disabled());\n        h.add(KeyBinding::new(\"r\", \"refresh\"));\n        assert_eq!(h.len(), 2);\n        let pairs = h.full_help();\n        assert_eq!(pairs.len(), 2);\n        assert_eq!(pairs[0], (\"q\".to_string(), \"quit\".to_string()));\n        assert_eq!(pairs[1], (\"r\".to_string(), \"refresh\".to_string()));\n    }\n\n    #[test]\n    fn with_title_sets_custom_title() {\n        let h = KeyHelp::new().with_title(\"Shortcuts\");\n        assert_eq!(h.title, \"Shortcuts\");\n    }\n}\n","traces":[{"line":25,"address":[1865888,1866141,1866147],"length":1,"stats":{"Line":4}},{"line":27,"address":[3651654],"length":1,"stats":{"Line":4}},{"line":28,"address":[2032023],"length":1,"stats":{"Line":4}},{"line":35,"address":[2278064],"length":1,"stats":{"Line":2}},{"line":36,"address":[2278072],"length":1,"stats":{"Line":2}},{"line":37,"address":[2286028],"length":1,"stats":{"Line":2}},{"line":51,"address":[2286160,2286322,2286316],"length":1,"stats":{"Line":6}},{"line":53,"address":[2308414],"length":1,"stats":{"Line":6}},{"line":54,"address":[2286188],"length":1,"stats":{"Line":7}},{"line":60,"address":[],"length":0,"stats":{"Line":3}},{"line":61,"address":[3651986,3652069],"length":1,"stats":{"Line":6}},{"line":62,"address":[2032388],"length":1,"stats":{"Line":3}},{"line":66,"address":[2308288],"length":1,"stats":{"Line":4}},{"line":67,"address":[2148173],"length":1,"stats":{"Line":4}},{"line":72,"address":[2308336],"length":1,"stats":{"Line":1}},{"line":73,"address":[5600560,5600570],"length":1,"stats":{"Line":3}},{"line":78,"address":[2287104],"length":1,"stats":{"Line":1}},{"line":79,"address":[2287109],"length":1,"stats":{"Line":1}},{"line":84,"address":[2279184],"length":1,"stat w + Command/Message)\n//! - [`runtime`] — Synchronous crossterm event loop driver for Elm [`Model`](crate::elm::Model)s\n//! - [`list`] — Enhanced List widget (filter/sort/pagination)\n//! - [`viewport`] — Scrollable viewport with search\n//! - [`text_input`] — Multi-line text input with history\n//! - [`spinner`] — Spinner widget with built-in styles\n//! - [`table`] — Enhanced Table widget (sort/navigate/select)\n//! - [`key_help`] — Key binding help display\n//! - [`style`] — Lipgloss-style builder API\n\n#![warn(missing_docs)]\n#![warn(clippy::all, clippy::pedantic)]\n\npub mod elm;\npub mod list;\npub mod runtime;\npub mod text_input;\npub mod viewport;\n\npub mod key_help;\npub mod spinner;\npub mod style;\npub mod table;\n\npub mod test_utils;\n","traces":[],"covered":0,"coverable":0},{"path":["/","home","lhjnano","source","project","ratatui-bubbles","crates","ratatui-bubbles","src","list.rs"],"content":"//! Enhanced list widget with filtering, navigation, and selection.\n//!\n//! A Rust port of the [`Bubbles` `list`](https://github.com/charmbracelet/bubbles/list)\n//! package from the Bubble Tea ecosystem. The [`List`] keeps the full item set\n//! alongside a vector of indices (`filtered_indices`) into it representing the\n//! currently-visible rows; the selection cursor moves within the filtered set.\n//!\n//! Unlike the upstream Go package (which renders itself via Lipgloss), this\n//! widget delegates the actual drawing to [`ratatui::widgets::List`] and merely\n//! tracks state: items, filter, and selection.\n\n#![allow(clippy::module_name_repetitions)]\n\nuse ratatui::layout::Rect;\nuse ratatui::style::{Modifier, Style};\nuse ratatui::text::Line;\nuse ratatui::widgets::{List as RatList, ListItem as RatListItem, ListState};\nuse ratatui::Frame;\n\n/// A single row in a [`List`].\n///\n/// Implementors control both how the row is drawn (`render`) and how it\n/// participates in filtering (`filterable_text`).\npub trait ListItem {\n    /// Render this item as a [`Line`] of styled text.\n    fn render(\u0026self) -\u003e Line\u003c'_\u003e;\n\n    /// Return the text used for filtering.\n    ///\n    /// Filtering is a case-insensitive substring match against the current\n    /// filter string (see [`List::set_filter`]).\n    fn filterable_text(\u0026self) -\u003e \u0026str;\n}\n\n/// A filterable, selectable list of items.\n///\n/// Port of `bubbles/list.Model`. See the [module docs](self) for details.\npub struct List\u003cT: ListItem\u003e {\n    /// Every item in the list, in insertion order.\n    items: Vec\u003cT\u003e,\n    /// Index into the underlying item vector of the currently-selected row, if any.\n    selected: Option\u003cusize\u003e,\n    /// Current filter string (empty matches everything).\n    filter: String,\n    /// Indices into `items` that currently pass the filter.\n    filtered_indices: Vec\u003cusize\u003e,\n}\n\nimpl\u003cT: ListItem\u003e List\u003cT\u003e {\n    /// Create a new list containing `items`.\n    ///\n    /// Defaults: no selection, an empty filter, and every item visible\n    /// (all indices present in the filtered set).\n    #[must_use]\n    pub fn new(items: Vec\u003cT\u003e) -\u003e Self {\n        let filtered_indices: Vec\u003cusize\u003e = (0..items.len()).collect();\n        Self {\n            items,\n            selected: None,\n            filter: String::new(),\n            filtered_indices,\n        }\n    }\n\n    /// Return the currently-selected item, or `None` if nothing is selected\n    /// (or the filtered set is empty).\n    #[must_use]\n    pub fn selected(\u0026self) -\u003e Option\u003c\u0026T\u003e {\n        self.selected.and_then(|idx| self.items.get(idx))\n    }\n\n    /// Move the selection cursor down by one, wrapping within the filtered set.\n    ///\n    /// If nothing is currently selected, the first visible item becomes selected.\n    /// Does nothing when the filtered set is empty.\n    pub fn select_next(\u0026mut self) {\n        if self.filtered_indices.is_empty() {\n            self.selected = None;\n            return;\n        }\n        let new_pos = match self.current_filtered_pos() {\n            Some(pos) =\u003e (pos + 1) % self.filtered_indices.len(),\n            None =\u003e 0,\n        };\n        self.selected = Some(self.filtered_indices[new_pos]);\n    }\n\n    /// Move the selection cursor up by one, wrapping within the filtered set.\n    ///\n    /// If nothing is selected (or the cursor sits at the top), the last visible\n    /// item becomes selected. Does nothing when the filtered set is empty.\n    pub fn select_prev(\u0026mut self) {\n        if self.filtered_indices.is_empty() {\n            self.selected = None;\n            return;\n        }\n        let len = self.filtered_indices.len();\n        let new_pos = match self.current_filtered_pos() {\n            Some(pos) if pos \u003e 0 =\u003e pos - 1,\n            Some(_) | None =\u003e len - 1,\n        };\n        self.selected = Some(self.filtered_indices[new_pos]);\n    }\n\n    /// Set the filter string and recompute the visible rows.\n    ///\n    /// `filter` is matched case-insensitively as a substring of each item's\n    /// [`filterable_text`](ListItem::filterable_text). An empty filter shows\n    /// every item.\n    ///\n    /// If the currently-selected item survives the filter it stays selected;\n    /// otherwise the selection moves to the first visible item (or `None`\n    /// when the filtered set becomes empty).\n    pub fn set_filter(\u0026mut self, filter: \u0026str) {\n        self.filter = filter.to_string();\n        self.recompute_filtered();\n        let still_visible = self\n            .selected\n            .is_some_and(|idx| self.filtered_indices.contains(\u0026idx));\n        self.selected = if still_visible {\n            self.selected\n        } else {\n            self.filtered_indices.first().copied()\n        };\n    }\n\n    /// Return the current filter string.\n    #[must_use]\n    pub fn filter(\u0026self) -\u003e \u0026str {\n        self.filter.as_str()\n    }\n\n    /// Return the total number of items (ignoring the filter).\n    #[must_use]\n    pub fn len(\u0026self) -\u003e usize {\n        self.items.len()\n    }\n\n    /// Return `true` if there are no items at all.\n    #[must_use]\n    pub fn is_empty(\u0026self) -\u003e bool {\n        self.items.is_empty()\n    }\n\n    /// Return the number of items currently passing the filter.\n    #[must_use]\n    pub fn filtered_len(\u0026self) -\u003e usize {\n        self.filtered_indices.len()\n    }\n\n    /// Render the visible items into `frame`, highlighting the selected row.\n    ///\n    /// The selected row is highlighted with `Style::default().add_modifier(Modifier::REVERSED)`,\n    /// applied via [`ratatui::widgets::List`] stateful highlighting.\n    pub fn render(\u0026self, frame: \u0026mut Frame\u003c'_\u003e, area: Rect) {\n        let rat_items: Vec\u003cRatListItem\u003c'_\u003e\u003e = self\n            .filtered_indices\n            .iter()\n            .filter_map(|\u0026idx| {\n                self.items\n                    .get(idx)\n                    .map(|item| RatListItem::new(item.render()))\n            })\n            .collect();\n        let list = RatList::new(rat_items)\n            .highlight_style(Style::default().add_modifier(Modifier::REVERSED));\n        let mut state = ListState::default();\n        state.select(self.current_filtered_pos());\n        frame.render_stateful_widget(list, area, \u0026mut state);\n    }\n\n    /// Position of the currently-selected item within `filtered_indices`, if any.\n    fn current_filtered_pos(\u0026self) -\u003e Option\u003cusize\u003e {\n        self.selected\n            .and_then(|idx| self.filtered_indices.iter().position(|\u0026i| i == idx))\n    }\n\n    /// Recompute `filtered_indices` from `items` and the current filter.\n    fn recompute_filtered(\u0026mut self) {\n        if self.filter.is_empty() {\n            self.filtered_indices = (0..self.items.len()).collect();\n            return;\n        }\n        let needle = self.filter.to_lowercase();\n        self.filtered_indices = self\n            .items\n            .iter()\n            .enumerate()\n            .filter(|(_, item)| {\n                item.filterable_text()\n                    .to_lowercase()\n                    .contains(needle.as_str())\n            })\n            .map(|(idx, _)| idx)\n            .collect();\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    struct Row {\n        text: String,\n    }\n\n    impl ListItem for Row {\n        fn render(\u0026self) -\u003e Line\u003c'_\u003e {\n            Line::from(self.text.as_str())\n        }\n        fn filterable_text(\u0026self) -\u003e \u0026str {\n            self.text.as_str()\n        }\n    }\n\n    #[test]\n    fn filter_narrows_to_single_item() {\n        let mut list = List::new(vec![\n            Row {\n                text: \"apple\".into(),\n            },\n            Row {\n                text: \"banana\".into(),\n            },\n            Row {\n                text: \"cherry\".into(),\n            },\n        ]);\n        list.set_filter(\"ban\");\n        assert_eq!(list.filtered_len(), 1);\n        assert_eq!(list.selected().map(|r| r.text.as_str()), Some(\"banana\"));\n    }\n\n    #[test]\n    fn starts_with_no_selection_and_all_visible() {\n        let list = List::new(vec![\n            Row {\n                text: \"apple\".into(),\n            },\n            Row {\n                text: \"banana\".into(),\n            },\n        ]);\n        assert!(list.selected().is_none());\n        assert_eq!(list.len(), 2);\n        assert!(!list.is_empty());\n        assert_eq!(list.filtered_len(), 2);\n        assert_eq!(list.filter(), \"\");\n    }\n\n    #[test]\n    fn filter_is_case_insensitive() {\n        let mut list = List::new(vec![Row {\n            text: \"Banana\".into(),\n        }]);\n        list.set_filter(\"BAN\");\n        assert_eq!(list.filtered_len(), 1);\n\n        list.set_filter(\"banana\");\n        assert_eq!(list.filtered_len(), 1);\n    }\n\n    #[test]\n    fn navigation_wraps_within_filtered_set() {\n        let mut list = List::new(vec![\n            Row {\n                text: \"apple\".into(),\n            },\n            Row {\n                text: \"apricot\".into(),\n            },\n            Row {\n                text: \"banana\".into(),\n            },\n        ]);\n        list.set_filter(\"ap\"); // [apple, apricot]\n                               // selected reset to first filtered item\n        assert_eq!(list.selected().map(|r| r.text.as_str()), Some(\"apple\"));\n\n        list.select_next();\n        assert_eq!(list.selected().map(|r| r.text.as_str()), Some(\"apricot\"));\n\n        // wrap from bottom to top\n        list.select_next();\n        assert_eq!(list.selected().map(|r| r.text.as_str()), Some(\"apple\"));\n\n        // prev wraps from top to bottom\n        list.select_prev();\n        assert_eq!(list.selected().map(|r| r.text.as_str()), Some(\"apricot\"));\n    }\n\n    #[test]\n    fn surviving_selection_is_preserved_across_filter() {\n        let mut list = List::new(vec![\n            Row {\n                text: \"apple\".into(),\n            },\n            Row {\n                text: \"apricot\".into(),\n            },\n            Row {\n                text: \"banana\".into(),\n            },\n        ]);\n        list.set_filter(\"\"); // None -\u003e first (apple)\n        assert_eq!(list.selected().map(|r| r.text.as_str()), Some(\"apple\"));\n        list.select_next(); // apricot\n\n        // apricot survives \"ap\" filter -\u003e stays selected\n        list.set_filter(\"ap\");\n        assert_eq!(list.selected().map(|r| r.text.as_str()), Some(\"apricot\"));\n    }\n\n    #[test]\n    fn no_match_filter_clears_selection() {\n        let mut list = List::new(vec![Row {\n            text: \"apple\".into(),\n        }]);\n        list.set_filter(\"zzz\");\n        assert_eq!(list.filtered_len(), 0);\n        assert!(list.selected().is_none());\n\n        // empty filter restores everything and selects the first item\n        list.set_filter(\"\");\n        assert_eq!(list.filtered_len(), 1);\n        assert_eq!(list.selected().map(|r| r.text.as_str()), Some(\"apple\"));\n    }\n\n    #[test]\n    fn empty_list_has_no_selection() {\n        let list = List::new(Vec::\u003cRow\u003e::new());\n        assert!(list.selected().is_none());\n        assert_eq!(list.filtered_len(), 0);\n        assert!(list.is_empty());\n    }\n\n    #[test]\n    fn single_item_select_next_wraps_or_clamps() {\n        let mut list = List::new(vec![Row {\n            text: \"only\".into(),\n        }]);\n        list.select_next();\n        assert_eq!(list.selected().map(|r| r.text.as_str()), Some(\"only\"));\n        // navigating again on a single-item set wraps/clamps back to the same item\n        list.select_next();\n        assert_eq!(list.selected().map(|r| r.text.as_str()), Some(\"only\"));\n    }\n\n    #[test]\n    fn filter_with_no_matches_clears_filtered() {\n        let mut list = List::new(vec![\n            Row {\n                text: \"apple\".into(),\n            },\n            Row {\n                text: \"banana\".into(),\n            },\n        ]);\n        list.set_filter(\"zzz\");\n        assert_eq!(list.filtered_len(), 0);\n        assert!(list.selected().is_none());\n    }\n\n    #[test]\n    fn unicode_filter_matches_correctly() {\n        let mut list = List::new(vec![\n            Row {\n                text: \"안녕하세요\".into(),\n            },\n            Row {\n                text: \"hello\".into(),\n            },\n        ]);\n        list.set_filter(\"안녕\");\n        assert_eq!(list.filtered_len(), 1);\n        assert_eq!(list.selected().map(|r| r.text.as_str()), Some(\"안녕하세요\"));\n    }\n\n    #[test]\n    fn selection_resets_when_filtered_out() {\n        let mut list = List::new(vec![\n            Row {\n                text: \"apple\".into(),\n            },\n            Row {\n                text: \"banana\".into(),\n            },\n            Row {\n                text: \"cherry\".into(),\n            },\n        ]);\n        // select_next from None picks the first filtered item\n        list.select_next(); // apple\n        list.select_next(); // banana\n        assert_eq!(list.selected().map(|r| r.text.as_str()), Some(\"banana\"));\n\n        // filter that excludes \"banana\" (matches apple + cherry via 'e')\n        list.set_filter(\"e\");\n        // banana is filtered out -\u003e selection resets to first remaining item\n        let sel = list.selected().map(|r| r.text.as_str());\n        assert!(sel == Some(\"apple\") || sel == Some(\"cherry\"));\n        assert_ne!(sel, Some(\"banana\"));\n    }\n}\n","traces":[{"line":55,"address":[],"length":0,"stats":{"Line":7}},{"line":56,"address":[],"length":0,"stats":{"Line":16}},{"line":60,"address":[2029371],"length":1,"stats":{"Line":9}},{"line":68,"address":[],"length":0,"stats":{"Line":1}},{"line":69,"address":[2029712,2029730,2029688],"length":1,"stats":{"Line":3}},{"line":76,"address":[],"length":0,"stats":{"Line":2}},{"line":77,"address":[1950734],"length":1,"stats":{"Line":2}},{"line":78,"address":[2027729],"length":1,"stats":{"Line":0}},{"line":79,"address":[],"length":0,"stats":{"Line":0}},{"line":81,"address":[],"length":0,"stats":{"Line":2}},{"line":82,"address":[1950801,1950894],"length":1,"stats":{"Line":6}},{"line":83,"address":[],"length":0,"stats":{"Line":3}},{"line":85,"address":[],"length":0,"stats":{"Line":3}},{"line":92,"address":[2027920],"length":1,"stats":{"Line":1}},{"line":93,"address":[],"length":0,"stats":{"Line":1}},{"line":94,"address":[],"length":0,"stats":{"Line":0}},{"line":95,"address":[],"length":0,"stats":{"Line":0}},{"line":97,"address":[],"length":0,"stats":{"Line":1}},{"line":98,"address":[],"length":0,"stats":{"Line e":174,"address":[2029064],"length":1,"stats":{"Line":6}},{"line":175,"address":[3557007,3557024,3557038,3557104,3557114],"length":1,"stats":{"Line":20}},{"line":179,"address":[2028662,2028656,2028224],"length":1,"stats":{"Line":7}},{"line":180,"address":[2028244],"length":1,"stats":{"Line":7}},{"line":181,"address":[],"length":0,"stats":{"Line":1}},{"line":182,"address":[],"length":0,"stats":{"Line":0}},{"line":184,"address":[2028262],"length":1,"stats":{"Line":7}},{"line":185,"address":[],"length":0,"stats":{"Line":19}},{"line":186,"address":[],"length":0,"stats":{"Line":0}},{"line":187,"address":[3556343],"length":1,"stats":{"Line":7}},{"line":188,"address":[3556378],"length":1,"stats":{"Line":7}},{"line":189,"address":[1951584,1951606,1951820,1951814,1951266],"length":1,"stats":{"Line":21}},{"line":190,"address":[1951618,1951654],"length":1,"stats":{"Line":14}},{"line":191,"address":[],"length":0,"stats":{"Line":7}},{"line":192,"address":[1951734],"length":1,"stats":{"Line":8}},{"line":194,"address":[],"length":0,"stats":{"Line":16}},{"line":195,"address":[],"length":0,"stats":{"Line":7}}],"covered":61,"coverable":69},{"path":["/","home","lhjnano","source","project","ratatui-bubbles","crates","ratatui-bubbles","src","runtime.rs"],"content":"//! Program runtime — a synchronous crossterm event loop that drives an\n//! Elm-architecture [`Model`](crate::elm::Model).\n//!\n//! # Testing\n//!\n//! The production entry point [`run`] takes over the real terminal and cannot\n//! be exercised under `cargo-tarpaulin` without a PTY. For testing, use\n//! [`run_with`] which accepts an injected [`Terminal`] backend and\n//! [`EventSource`], allowing [`main_loop`] to run against a [`TestBackend`]\n//! and a scripted event source.\n//!\n//! [`TestBackend`]: ratatui::backend::TestBackend\n\n#![allow(clippy::missing_errors_doc)]\n\nuse std::io::{self, stdout, Stdout};\nuse std::time::Duration;\n\nuse crossterm::event::{self, DisableMouseCapture, EnableMouseCapture, Event};\nuse crossterm::execute;\nuse crossterm::terminal::{\n    disable_raw_mode, enable_raw_mode, EnterAlternateScreen, LeaveAlternateScreen,\n};\nuse ratatui::backend::{Backend, CrosstermBackend};\nuse ratatui::Terminal;\n\nuse crate::elm::{Command, Model};\n\n/// A source of terminal events, abstracting [`crossterm::event::poll`] and\n/// [`crossterm::event::read`].\n///\n/// Object-safe so it can be passed as `\u0026mut dyn EventSource`. The production\n/// implementation is [`StdinEventSource`]; tests provide their own impls.\npub trait EventSource {\n    /// Wait up to `timeout` for an event to become available. Returns\n    /// `Ok(true)` if an event is ready to read, `Ok(false)` on timeout.\n    fn poll(\u0026mut self, timeout: Duration) -\u003e io::Result\u003cbool\u003e;\n\n    /// Read and return the next pending event. Only call after `poll`\n    /// returned `Ok(true)`.\n    fn read(\u0026mut self) -\u003e io::Result\u003cEvent\u003e;\n}\n\n/// Production [`EventSource`] reading from stdin via crossterm.\n#[derive(Debug, Default)]\npub struct StdinEventSource;\n\nimpl EventSource for StdinEventSource {\n    fn poll(\u0026mut self, timeout: Duration) -\u003e io::Result\u003cbool\u003e {\n        event::poll(timeout)\n    }\n\n    fn read(\u0026mut self) -\u003e io::Result\u003cEvent\u003e {\n        event::read()\n    }\n}\n\n/// A terminal-frontend program that can be run by [`run`] or [`run_with`].\n///\n/// Composes [`Model`] with two extra hooks needed for an interactive event\n/// loop: translating terminal events into messages, and deciding when to exit.\npub trait App: Model\u003c\u003cSelf as App\u003e::Msg\u003e {\n    /// The message type driven through the loop.\n    type Msg;\n\n    /// Returns the initial [`Command`] to run before the first event poll.\n    fn init(\u0026mut self) -\u003e Command\u003cSelf::Msg\u003e;\n\n    /// Translate a crossterm [`Event`] into a message, or `None` to ignore.\n    fn on_event(\u0026mut self, event: Event) -\u003e Option\u003cSelf::Msg\u003e;\n\n    /// Whether the given message should cause the program to exit cleanly.\n    fn should_quit(\u0026self, msg: \u0026Self::Msg) -\u003e bool;\n}\n\n/// Run `program` against the real terminal (raw mode + alt screen + mouse\n/// capture via crossterm on stdout).\n///\n/// Restores the original terminal state on exit (including on error).\n/// For testing, use [`run_with`] with an injected backend and event source.\npub fn run\u003cP: App\u003e(program: \u0026mut P) -\u003e io::Result\u003c()\u003e {\n    let mut terminal = setup_terminal()?;\n    let result = main_loop(program, \u0026mut terminal, \u0026mut StdinEventSource);\n    restore_terminal(\u0026mut terminal)?;\n    result\n}\n\n/// Run `program` against an injected [`Terminal`] backend and [`EventSource`].\n///\n/// This is the testable entry point: pass a `Terminal\u003cTestBackend\u003e` and a\n/// scripted event source to exercise [`main_loop`] without touching the real\n/// terminal.\npub fn run_with\u003cP, B, E\u003e(\n    program: \u0026mut P,\n    terminal: \u0026mut Terminal\u003cB\u003e,\n    events: \u0026mut E,\n) -\u003e io::Result\u003c()\u003e\nwhere\n    P: App,\n    B: Backend,\n    E: EventSource,\n{\n    main_loop(program, terminal, events)\n}\n\n/// Recursively collect every [`Command::Msg`] payload inside `cmd` into `out`.\npub fn drain_messages\u003cMsg\u003e(cmd: Command\u003cMsg\u003e, out: \u0026mut Vec\u003cMsg\u003e) {\n    match cmd {\n        Command::None | Command::Tick =\u003e {}\n        Command::Msg(m) =\u003e out.push(m),\n        Command::Batch(cmds) =\u003e {\n            for c in cmds {\n                drain_messages(c, out);\n            }\n        }\n    }\n}\n\n/// The core event loop. Generic over backend `B` and event source `E`.\n///\n/// Loops: drain pending messages → render → poll for next event → feed event\n/// through `App::on_event` → push produced message to pending. Exits when\n/// `App::should_quit` returns true.\npub fn main_loop\u003cP, B, E\u003e(\n    program: \u0026mut P,\n    terminal: \u0026mut Terminal\u003cB\u003e,\n    events: \u0026mut E,\n) -\u003e io::Result\u003c()\u003e\nwhere\n    P: App,\n    B: Backend,\n    E: EventSource,\n{\n    let mut pending: Vec\u003cP::Msg\u003e = Vec::new();\n    let init_cmd = program.init();\n    drain_messages(init_cmd, \u0026mut pending);\n\n    let poll_timeout = Duration::from_millis(20);\n\n    loop {\n        // Drain any pending messages produced by previous updates.\n        while let Some(msg) = pending.pop() {\n            let quit = program.should_quit(\u0026msg);\n            let cmd = program.update(msg);\n            if quit {\n                return Ok(());\n            }\n            drain_messages(cmd, \u0026mut pending);\n        }\n\n        // Render after every update batch.\n        terminal.draw(|frame| program.view(frame, frame.area()))?;\n\n        // Poll for the next event with a short timeout so pending messages\n        // get serviced promptly.\n        if events.poll(poll_timeout)? {\n            let ev = events.read()?;\n            if let Some(msg) = program.on_event(ev) {\n                pending.push(msg);\n            }\n        }\n    }\n}\n\n/// Enter raw mode, switch to the alternate screen, enable mouse capture.\n///\n/// # Requires TTY\n///\n/// Calls [`enable_raw_mode`] which needs a controlling terminal. Will fail\n/// under `cargo-tarpaulin` and other headless test runners — exercise via\n/// [`run_with`] + [`TestBackend`] in tests instead.\n///\n/// [`TestBackend`]: ratatui::backend::TestBackend\nfn setup_terminal() -\u003e io::Result\u003cTerminal\u003cCrosstermBackend\u003cStdout\u003e\u003e\u003e {\n    enable_raw_mode()?;\n    let mut stdout = stdout();\n    execute!(stdout, EnterAlternateScreen, EnableMouseCapture)?;\n    let backend = CrosstermBackend::new(stdout);\n    Terminal::new(backend)\n}\n\n/// Disable raw mode, leave the alternate screen, disable mouse capture.\n///\n/// # Requires TTY\n///\n/// Same constraint as [`setup_terminal`].\nfn restore_terminal(terminal: \u0026mut Terminal\u003cCrosstermBackend\u003cStdout\u003e\u003e) -\u003e io::Result\u003c()\u003e {\n    disable_raw_mode()?;\n    execute!(\n        terminal.backend_mut(),\n        LeaveAlternateScreen,\n        DisableMouseCapture\n    )?;\n    terminal.show_cursor()?;\n    Ok(())\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn drain_none_yields_nothing() {\n        let mut out = Vec::\u003cu8\u003e::new();\n        drain_messages(Command::\u003cu8\u003e::None, \u0026mut out);\n        assert!(out.is_empty());\n    }\n\n    #[test]\n    fn drain_msg_pushes_payload() {\n        let mut out = Vec::new();\n        drain_messages(Command::msg(7u8), \u0026mut out);\n        assert_eq!(out, vec![7]);\n    }\n\n    #[test]\n    fn drain_batch_flattens_recursively() {\n        let mut out = Vec::new();\n        let cmd = Command::Batch(vec![\n            Command::Msg(1u8),\n            Command::Batch(vec![Command::Msg(2), Command::Msg(3)]),\n            Command::None,\n        ]);\n        drain_messages(cmd, \u0026mut out);\n        assert_eq!(out, vec![1, 2, 3]);\n    }\n\n    #[test]\n    fn stdin_event_source_is_default_constructible() {\n        // Smoke test: StdinEventSource compiles and implements Default.\n        // Uses a trait-bound assertion rather than constructing the value,\n        // since clippy flags both `::default()` on a unit struct and an unused\n        // `let _ =` binding under `-D warnings`.\n        fn requires_default\u003cT: Default\u003e() {}\n        requires_default::\u003cStdinEventSource\u003e();\n    }\n}\n","traces":[{"line":49,"address":[2063088],"length":1,"stats":{"Line":0}},{"line":50,"address":[2063138],"length":1,"stats":{"Line":0}},{"line":53,"address":[2063168],"length":1,"stats":{"Line":0}},{"line":54,"address":[2063185],"length":1,"stats":{"Line":0}},{"line":81,"address":[],"length":0,"stats":{"Line":0}},{"line" [\"⠋\", \"⠙\", \"⠹\", \"⠸\", \"⠼\", \"⠴\", \"⠦\", \"⠧\", \"⠇\", \"⠏\"],\n            Self::Jump =\u003e \u0026[\"⢄\", \"⢂\", \"⢁\", \"⡈\", \"⡐\", \"⡠\"],\n            Self::Pulse =\u003e \u0026[\"█\", \"▓\", \"▒\", \"░\"],\n            Self::Meter =\u003e \u0026[\"█\", \"▉\", \"▊\", \"▋\", \"▌\", \"▍\", \"▎\", \"▏\"],\n            Self::Hamburger =\u003e \u0026[\"☱\", \"☲\", \"☴\", \"☲\"],\n            Self::Ellipsis =\u003e \u0026[\"  \", \". \", \".. \", \"...\"],\n        }\n    }\n}\n\n/// A spinner widget.\n///\n/// Holds the active style, the current frame index, and a target frame rate\n/// in frames-per-second. Call [`Spinner::tick`] periodically to advance the\n/// animation.\n#[derive(Debug, Clone)]\npub struct Spinner {\n    style: SpinnerStyle,\n    frame: usize,\n    fps: u32,\n}\n\nimpl Spinner {\n    /// Create a new spinner with the given style, starting at frame 0.\n    /// Default FPS is 10.\n    #[must_use]\n    pub fn new(style: SpinnerStyle) -\u003e Self {\n        Self {\n            style,\n            frame: 0,\n            fps: 10,\n        }\n    }\n\n    /// Sets the target FPS (frames per second).\n    #[must_use]\n    pub const fn with_fps(mut self, fps: u32) -\u003e Self {\n        self.fps = fps;\n        self\n    }\n\n    /// Current FPS value.\n    #[must_use]\n    pub const fn fps(\u0026self) -\u003e u32 {\n        self.fps\n    }\n\n    /// Advance the spinner by one frame, wrapping around.\n    pub fn tick(\u0026mut self) {\n        let frames = self.style.frames();\n        if !frames.is_empty() {\n            self.frame = (self.frame + 1) % frames.len();\n        }\n    }\n\n    /// Returns the text of the current frame.\n    #[must_use]\n    pub fn current_frame(\u0026self) -\u003e \u0026str {\n        let frames = self.style.frames();\n        if frames.is_empty() {\n            \"\"\n        } else {\n            frames[self.frame]\n        }\n    }\n\n    /// Renders the spinner as a single yellow span in the top-left of `area`.\n    pub fn render(\u0026self, frame: \u0026mut Frame\u003c'_\u003e, area: Rect) {\n        let span = Span::styled(self.current_frame(), Style::default().fg(Color::Yellow));\n        frame.render_widget(Paragraph::new(Line::from(span)), area);\n    }\n}\n\nimpl Default for Spinner {\n    fn default() -\u003e Self {\n        Self::new(SpinnerStyle::Line)\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn line_style_has_four_frames() {\n        assert_eq!(SpinnerStyle::Line.frames().len(), 4);\n    }\n\n    #[test]\n    fn new_spinner_starts_at_frame_zero() {\n        let s = Spinner::new(SpinnerStyle::Dot);\n        assert_eq!(s.frame, 0);\n        assert_eq!(s.current_frame(), \"⣾\");\n    }\n\n    #[test]\n    fn tick_advances_and_wraps() {\n        let mut s = Spinner::new(SpinnerStyle::Line);\n        for expected in [\"/\", \"-\", \"\\\\\", \"|\", \"/\"] {\n            s.tick();\n            assert_eq!(s.current_frame(), expected);\n        }\n    }\n\n    #[test]\n    fn with_fps_sets_fps() {\n        let s = Spinner::new(SpinnerStyle::Dot).with_fps(30);\n        assert_eq!(s.fps(), 30);\n    }\n\n    #[test]\n    fn all_spinner_styles_have_non_empty_frames() {\n        for style in [\n            SpinnerStyle::Line,\n            SpinnerStyle::Dot,\n            SpinnerStyle::MiniDot,\n            SpinnerStyle::Jump,\n            SpinnerStyle::Pulse,\n            SpinnerStyle::Meter,\n            SpinnerStyle::Hamburger,\n            SpinnerStyle::Ellipsis,\n        ] {\n            let frames = style.frames();\n            assert!(!frames.is_empty(), \"style {style:?} returned empty frames\");\n            for frame in frames {\n                assert!(\n                    !frame.is_empty(),\n                    \"style {style:?} has an empty frame string\"\n                );\n            }\n            let mut s = Spinner::new(style);\n            let initial = s.current_frame().to_string();\n            assert_eq!(initial, frames[0], \"style {style:?} initial frame mismatch\");\n            s.tick();\n            assert_eq!(\n                s.current_frame(),\n                frames[1],\n                \"style {style:?} post-tick frame mismatch\"\n            );\n        }\n    }\n}\n","traces":[{"line":38,"address":[2230720],"length":1,"stats":{"Line":6}},{"line":39,"address":[2006199,2006418],"length":1,"stats":{"Line":12}},{"line":40,"address":[2006230],"length":1,"stats":{"Line":5}},{"line":41,"address":[2006256],"length":1,"stats":{"Line":3}},{"line":42,"address":[2006282],"length":1,"stats":{"Line":2}},{"line":43,"address":[2006305],"length":1,"stats":{"Line":2}},{"line":44,"address":[2230856],"length":1,"stats":{"Line":2}},{"line":45,"address":[2006351],"length":1,"stats":{"Line":2}},{"line":46,"address":[2230902],"length":1,"stats":{"Line":2}},{"line":47,"address":[2230925],"length":1,"stats":{"Line":2}},{"line":68,"address":[2231168],"length":1,"stats":{"Line":5}},{"line":78,"address":[5644608],"length":1,"stats":{"Line":1}},{"line":79,"address":[2231639],"length":1,"stats":{"Line":1}},{"line":80,"address":[5644618],"length":1,"stats":{"Line":1}},{"line":85,"address":[2231152],"length":1,"stats":{"Line":1}},{"line":86,"address":[2006613],"length":1,"stats":{"Line":1}},{"line":90,"address":[2006656],"length":1,"stats":{"Line":3}},{"line":91,"address":[2231214],"length":1,"stats":{"Line":3}},{"line":92,"address":[2231245,2231336],"length":1,"stats":{"Line":6}},{"line":93,"address":[5644268,5644236,5644314],"length":1,"stats":{"Line":6}},{"line":99,"address":[2230960],"length":1,"stats":{"Line":5}},{"line":100,"address":[2230974],"length":1,"stats":{"Line":5}},{"line":101,"address":[2231063,2231010,2231098],"length":1,"stats":{"Line":11}},{"line":102,"address":[2006514],"length":1,"stats":{"Line":0}},{"line":104,"address":[2006544,2006500,2006579],"length":1,"stats":{"Line":10}},{"line":109,"address":[2231360],"length":1,"stats":{"Line":4}},{"line":110,"address":[2006859],"length":1,"stats":{"Line":4}},{"line":111,"address":[2006947],"length":1,"stats":{"Line":5}},{"line":116,"address":[2007664],"length":1,"stats":{"Line":0}},{"line":117,"address":[2007672],"length":1,"stats":{"Line":0}}],"covered":27,"coverable":30},{"path":["/","home","lhjnano","source","project","ratatui-bubbles","crates","ratatui-bubbles","src","style.rs"],"content":"//! Lipgloss-style builder API — a port of [Lipgloss](https://github.com/charmbracelet/lipgloss) for Ratatui.\n//!\n//! Provides a chained builder for [`ratatui::style::Style`]. Padding, margin,\n//! and border (layout concepts in Lipgloss) are accepted by the builder for\n//! API parity but are not yet applied to the produced `Style` — they would\n//! require wrapping the widget in a `Block` at render time, which is out of\n//! scope for this module.\n\nuse ratatui::style::{Color, Modifier, Style};\nuse ratatui::widgets::BorderType;\n\n/// A chained builder for [`ratatui::style::Style`], inspired by Lipgloss.\n#[derive(Debug, Clone)]\npub struct StyleBuilder {\n    fg: Option\u003cColor\u003e,\n    bg: Option\u003cColor\u003e,\n    bold: bool,\n    italic: bool,\n    underline: bool,\n    padding: Option\u003c(u16, u16)\u003e,\n    margin: Option\u003c(u16, u16)\u003e,\n    border: Option\u003cBorderType\u003e,\n}\n\nimpl StyleBuilder {\n    /// Start a new style.\n    #[must_use]\n    pub fn new() -\u003e Self {\n        Self {\n            fg: None,\n            bg: None,\n            bold: false,\n            italic: false,\n            underline: false,\n            padding: None,\n            margin: None,\n            border: None,\n        }\n    }\n\n    /// Set the foreground color.\n    #[must_use]\n    pub fn foreground(mut self, color: Color) -\u003e Self {\n        self.fg = Some(color);\n        self\n    }\n\n    /// Set the background color.\n    #[must_use]\n    pub fn background(mut self, color: Color) -\u003e Self {\n        self.bg = Some(color);\n        self\n    }\n\n    /// Enable bold.\n    #[must_use]\n    pub fn bold(mut self) -\u003e Self {\n        self.bold = true;\n        self\n    }\n\n    /// Enable italic.\n    #[must_use]\n    pub fn italic(mut self) -\u003e Self {\n        self.italic = true;\n        self\n    }\n\n    /// Enable underline.\n    #[must_use]\n    pub fn underline(mut self) -\u003e Self {\n        self.underline = true;\n        self\n    }\n\n    /// Set horizontal and vertical padding (stored but NOT applied to the\n    /// produced `Style`; would need a wrapping `Block` at render time).\n    #[must_use]\n    pub fn padding(mut self, x: u16, y: u16) -\u003e Self {\n        self.padding = Some((x, y));\n        self\n    }\n\n    /// Set horizontal and vertical margin (stored but NOT applied to the\n    /// produced `Style`; would need a wrapping `Block` at render time).\n    #[must_use]\n    pub fn margin(mut self, x: u16, y: u16) -\u003e Self {\n        self.margin = Some((x, y));\n        self\n    }\n\n    /// Set border type (stored but NOT applied to the produced `Style`; would\n    /// need a wrapping `Block` at render time).\n    #[must_use]\n    pub fn border(mut self, border: BorderType) -\u003e Self {\n        self.border = Some(border);\n        self\n    }\n\n    /// Build the final [`ratatui::style::Style`].\n    ///\n    /// Note: `padding`, `margin`, and `border` are intentionally ignored —\n    /// see the module docs.\n    #[must_use]\n    pub fn build(self) -\u003e Style {\n        let mut style = Style::default();\n        if let Some(fg) = self.fg {\n            style = style.fg(fg);\n        }\n        if let Some(bg) = self.bg {\n            style = style.bg(bg);\n        }\n        let mut modifier = Modifier::empty();\n        if self.bold {\n            modifier |= Modifier::BOLD;\n        }\n        if self.italic {\n            modifier |= Modifier::ITALIC;\n        }\n        if self.underline {\n            modifier |= Modifier::UNDERLINED;\n        }\n        if !modifier.is_empty() {\n            style = style.add_modifier(modifier);\n        }\n        style\n    }\n}\n\nimpl Default for StyleBuilder {\n    fn default() -\u003e Self {\n        Self::new()\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn empty_builder_produces_default_style() {\n        let s = StyleBuilder::new().build();\n        assert_eq!(s, Style::default());\n    }\n\n    #[test]\n    fn foreground_sets_fg() {\n        let s = StyleBuilder::new().foreground(Color::Red).build();\n        assert_eq!(s.fg, Some(Color::Red));\n    }\n\n    #[test]\n    fn bold_and_italic_compose_into_modifier() {\n        let s = StyleBuilder::new().bold().italic().build();\n        assert!(s.add_modifier.contains(Modifier::BOLD));\n        assert!(s.add_modifier.contains(Modifier::ITALIC));\n    }\n\n    #[test]\n    fn background_sets_bg() {\n        let s = StyleBuilder::new().background(Color::Blue).build();\n        assert_eq!(s.bg, Some(Color::Blue));\n    }\n\n    #[test]\n    fn underline_adds_underlined_modifier() {\n        let s = StyleBuilder::new().underline().build();\n        assert!(s.add_modifier.contains(Modifier::UNDERLINED));\n    }\n\n    #[test]\n    fn padding_is_stored_without_affecting_build() {\n        // padding is accepted by the builder but not applied to Style (documented limitation).\n        // Verify build() still produces a valid default-equivalent Style when only padding is set.\n        let s = StyleBuilder::new().padding(2, 1).build();\n        assert_eq!(s, Style::default());\n    }\n\n    #[test]\n    fn margin_is_stored_without_affecting_build() {\n        let s = StyleBuilder::new().margin(1, 0).build();\n        assert_eq!(s, Style::default());\n    }\n\n    #[test]\n    fn border_is_stored_without_affecting_build() {\n        let s = StyleBuilder::new().border(BorderType::Rounded).build();\n        assert_eq!(s, Style::default());\n    }\n}\n","traces":[{"line":28,"address":[5625264],"length":1,"stats":{"Line": ne":115,"address":[2077620],"length":1,"stats":{"Line":2}},{"line":117,"address":[5625708],"length":1,"stats":{"Line":3}},{"line":118,"address":[2077650],"length":1,"stats":{"Line":2}},{"line":120,"address":[5625738],"length":1,"stats":{"Line":3}},{"line":121,"address":[2077683],"length":1,"stats":{"Line":2}},{"line":123,"address":[2077667],"length":1,"stats":{"Line":4}},{"line":124,"address":[2077700],"length":1,"stats":{"Line":3}},{"line":126,"address":[2077782],"length":1,"stats":{"Line":3}},{"line":131,"address":[2078736],"length":1,"stats":{"Line":0}},{"line":132,"address":[2078744],"length":1,"stats":{"Line":0}}],"covered":41,"coverable":43},{"path":["/","home","lhjnano","source","project","ratatui-bubbles","crates","ratatui-bubbles","src","table.rs"],"content":"//! Enhanced Table widget — a port of [Bubbles' `table`](https://github.com/charmbracelet/bubbles/table).\n//!\n//! Provides a sortable, navigable table widget built on top of\n//! [`ratatui::widgets::Table`].\n\nuse ratatui::layout::{Constraint, Rect};\nuse ratatui::style::{Modifier, Style};\nuse ratatui::text::Text;\nuse ratatui::widgets::{Cell, Row as RatRow, Table as RatTable, TableState};\nuse ratatui::Frame;\n\n/// A column definition for a [`Table`].\n#[derive(Debug, Clone)]\npub struct Column {\n    /// Column header text.\n    pub title: String,\n    /// Column width constraint in terminal cells.\n    pub width: u16,\n}\n\nimpl Column {\n    /// Create a new column with the given title and width.\n    #[must_use]\n    pub fn new(title: impl Into\u003cString\u003e, width: u16) -\u003e Self {\n        Self {\n            title: title.into(),\n            width,\n        }\n    }\n\n    fn constraint(\u0026self) -\u003e Constraint {\n        Constraint::Length(self.width)\n    }\n\n    fn header_cell(\u0026self) -\u003e Cell\u003c'_\u003e {\n        Cell::from(self.title.as_str())\n    }\n}\n\n/// A row in a [`Table`]. Implementors expose their cells as `String`s, in\n/// column order.\npub trait Row {\n    /// The cells of this row, in column order.\n    fn cells(\u0026self) -\u003e Vec\u003cString\u003e;\n}\n\n/// An enhanced table widget with sort, navigation, and selection.\n#[derive(Debug, Clone)]\npub struct Table\u003cR: Row\u003e {\n    /// Column definitions.\n    pub columns: Vec\u003cColumn\u003e,\n    /// Row data.\n    pub rows: Vec\u003cR\u003e,\n    /// Index of the currently-selected row, if any.\n    pub selected: Option\u003cusize\u003e,\n    /// Active sort column index.\n    pub sort_column: Option\u003cusize\u003e,\n    /// Sort direction (true = ascending).\n    pub sort_ascending: bool,\n    /// Vertical scroll offset (rows scrolled past).\n    pub scroll_offset: usize,\n}\n\nimpl\u003cR: Row\u003e Table\u003cR\u003e {\n    /// Create a new table with the given columns and no rows.\n    #[must_use]\n    pub fn new(columns: Vec\u003cColumn\u003e) -\u003e Self {\n        Self {\n            columns,\n            rows: Vec::new(),\n            selected: None,\n            sort_column: None,\n            sort_ascending: true,\n            scroll_offset: 0,\n        }\n    }\n\n    /// Replace the row set. Resets selection and scroll.\n    pub fn set_rows(\u0026mut self, rows: Vec\u003cR\u003e) {\n        self.rows = rows;\n        self.selected = if self.rows.is_empty() { None } else { Some(0) };\n        self.scroll_offset = 0;\n    }\n\n    /// Returns the current number of rows.\n    #[must_use]\n    pub fn len(\u0026self) -\u003e usize {\n        self.rows.len()\n    }\n\n    /// Returns true when there are no rows.\n    #[must_use]\n    pub fn is_empty(\u0026self) -\u003e bool {\n        self.rows.is_empty()\n    }\n\n    /// Returns the index of the currently-selected row, if any.\n    #[must_use]\n    pub fn selected(\u0026self) -\u003e Option\u003cusize\u003e {\n        self.selected\n    }\n\n    /// Move selection down by one (clamped at last row).\n    pub fn select_next(\u0026mut self) {\n        if self.rows.is_empty() {\n            return;\n        }\n        self.selected = Some(match self.selected {\n            None =\u003e 0,\n            Some(i) =\u003e (i + 1).min(self.rows.len() - 1),\n        });\n    }\n\n    /// Move selection up by one (clamped at first row).\n    pub fn select_prev(\u0026mut self) {\n        if self.rows.is_empty() {\n            return;\n        }\n        self.selected = Some(match self.selected {\n            None =\u003e 0,\n            Some(i) =\u003e i.saturating_sub(1),\n        });\n    }\n\n    /// Sort by the given column index.\n    ///\n    /// If already sorted by that column, toggles the direction.\n    /// Otherwise, sets it as the new sort column in ascending order.\n    pub fn sort_by(\u0026mut self, column_idx: usize) {\n        if self.sort_column == Some(column_idx) {\n            self.sort_ascending = !self.sort_ascending;\n        } else {\n            self.sort_column = Some(column_idx);\n            self.sort_ascending = true;\n        }\n        let dir = self.sort_ascending;\n        self.rows.sort_by(move |a, b| {\n            let ac = a.cells().get(column_idx).cloned().unwrap_or_default();\n            let bc = b.cells().get(column_idx).cloned().unwrap_or_default();\n            if dir {\n                ac.cmp(\u0026bc)\n            } else {\n                bc.cmp(\u0026ac)\n            }\n        });\n    }\n\n    /// Renders the table inside `area`.\n    pub fn render(\u0026self, frame: \u0026mut Frame\u003c'_\u003e, area: Rect) {\n        let header_cells: Vec\u003cCell\u003c'_\u003e\u003e = self.columns.iter().map(Column::header_cell).collect();\n        let header = RatRow::new(header_cells).style(Style::default().add_modifier(Modifier::BOLD));\n        let constraints: Vec\u003cConstraint\u003e = self.columns.iter().map(Column::constraint).collect();\n        let rat_rows: Vec\u003cRatRow\u003c'_\u003e\u003e = self\n            .rows\n            .iter()\n            .map(|r| {\n                let cells: Vec\u003cCell\u003c'_\u003e\u003e = r\n                    .cells()\n                    .into_iter()\n                    .map(|c| Cell::from(Text::from(c)))\n                    .collect();\n                RatRow::new(cells)\n            })\n            .collect();\n        let table = RatTable::new(rat_rows, constraints)\n            .header(header)\n            .row_highlight_style(Style::default().add_modifier(Modifier::REVERSED));\n        let mut state = TableState::default();\n        state.select(self.selected);\n        frame.render_stateful_widget(table, area, \u0026mut state);\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[derive(Debug, Clone)]\n    struct TestRow(Vec\u003cString\u003e);\n    impl Row for TestRow {\n        fn cells(\u0026self) -\u003e Vec\u003cString\u003e {\n            self.0.clone()\n        }\n    }\n\n    fn cols() -\u003e Vec\u003cColumn\u003e {\n        vec![Column::new(\"name\", 10), Column::new(\"age\", 5)]\n    }\n\n    #[test]\n    fn select_next_clamps_at_last_row() {\n        let mut t = Table::new(cols());\n        t.set_rows(vec![\n            TestRow(vec![\"alice\".into(), \"30\".into()]),\n            TestRow(vec![\"bob\".into(), \"25\".into()]),\n        ]);\n        assert_eq!(t.selected(), Some(0));\n        t.select_next();\n        assert_eq!(t.selected(), Some(1));\n        t.select_next(); // would go past end\n        assert_eq!(t.selected(), Some(1));\n    }\n\n    #[test]\n    fn select_prev_clamps_at_zero() {\n        let mut t = Table::new(cols());\n        t.set_rows(vec![\n            TestRow(vec![\"alice\".into(), \"30\".into()]),\n            TestRow(vec![\"bob\".into(), \"25\".into()]),\n        ]);\n        t.select_next();\n        t.select_prev();\n        assert_eq!(t.selected(), Some(0));\n        t.select_prev(); // would go below zero\n        assert_eq!(t.selected(), Some(0));\n    }\n\n    #[test]\n    fn sort_by_toggles_direction_on_same_column() {\n        let mut t = Table::new(cols());\n        t.set_rows(vec![\n            TestRow(vec![\"charlie\".into(), \"3\".into()]),\n            TestRow(vec![\"alice\".into(), \"1\".into()]),\n            TestRow(vec![\"bob\".into(), \"2\".into()]),\n        ]);\n        t.sort_by(0); // ascending\n        assert_eq!(t.rows[0].cells()[0], \"alice\");\n        t.sort_by(0); // descending\n        assert_eq!(t.rows[0].cells()[0], \"charlie\");\n    }\n\n    #[test]\n    fn len_returns_row_count() {\n        let mut t = Table::new(cols());\n        assert_eq!(t.len(), 0);\n        assert!(t.is_empty());\n        t.set_rows(vec![\n            TestRow(vec![\"alice\".into(), \"30\".into()]),\n            TestRow(vec![\"bob\".into(), \"25\".into()]),\n        ]);\n        assert_eq!(t.len(), 2);\n        assert!(!t.is_empty());\n    }\n\n    #[test]\n    fn is_empty_after_construction() {\n        let t = Table::\u003cTestRow\u003e::new(cols());\n        assert!(t.is_empty());\n        assert_eq!(t.len(), 0);\n    }\n}\n","traces":[{"line":24,"address":[2038112],"length":1,"stats":{"Line":5}},{"line":26,"address":[2038149],"length":1,"stats":{"Line":5}},{"line":31,"address":[2162384],"length":1,"stats":{"Line":4}},{"line":32,"address":[2008088],"length":1,"stats":{"Line":4}},{"line":35,"address":[5599344],"length":1,"stats":{"Line":3}},{"line":36,"address":[2008144],"length":1,"stats":{"Line":4}},{"line":67,"address":[2037053,2036880],"length":1,"stats":{"Line":6}},{"line":70,"address":[],"length":0,"stats":{"Line":6}},{"line":79,"address":[1863200,1863261],"length":1,"stats":{"Line":5}},{"line":80,"address":[2037922,2038000],"length":1,"stats":{"Line":12}},{"line":81,"address":[1863319],"length":1,"stats":{"Line":6}},{"line":82,"address":[],"length":0,"stats":{"Line":6}},{"line":87,"address":[2036864],"length":1,"stats":{"Line":1}},{"line":88,"address":[],"length":0,"stats":{"Line":1}},{"line":93,"address":[2037856],"length":1,"stats":{"Line":1}},{"line":94,"address":[2037861],"length":1,"stats":{"Line":1}},{"lin

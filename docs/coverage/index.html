,"address":[3279385],"length":1,"stats":{"Line":3}},{"line":255,"address":[3279864,3279922],"length":1,"stats":{"Line":3}},{"line":256,"address":[3279722],"length":1,"stats":{"Line":9}},{"line":257,"address":[3279841,3279890],"length":1,"stats":{"Line":3}},{"line":258,"address":[3280019],"length":1,"stats":{"Line":3}},{"line":260,"address":[3280082,3280153,3280655],"length":1,"stats":{"Line":7}},{"line":261,"address":[3280605,3280254],"length":1,"stats":{"Line":3}},{"line":262,"address":[3280382],"length":1,"stats":{"Line":1}},{"line":269,"address":[3276928,3276938],"length":1,"stats":{"Line":0}}],"covered":32,"coverable":116},{"path":["/","home","lhjnano","source","project","ratatui-bubbles","crates","tui-inject","src","dump.rs"],"content":"//! Buffer dump utilities — convert a ratatui `Buffer` to plain text or HTML.\n\nuse ratatui::buffer::Buffer;\nuse ratatui::layout::Rect;\nuse ratatui::style::{Color, Modifier};\n\n/// Render the visible portion of `buf` as plain text.\n///\n/// Each row is the concatenation of cell symbols from x=0 to x=width.\n/// Trailing whitespace is preserved so the output has consistent shape.\n#[must_use]\npub fn buffer_to_text(buf: \u0026Buffer, width: u16, height: u16) -\u003e String {\n    let mut out = String::with_capacity(usize::from(width) * usize::from(height) * 2);\n    for y in 0..height {\n        for x in 0..width {\n            let cell = \u0026buf[(x, y)];\n            out.push_str(cell.symbol());\n        }\n        if y + 1 \u003c height {\n            out.push('\\n');\n        }\n    }\n    out\n}\n\n/// Render the visible portion of `buf` as a standalone HTML document.\n///\n/// Each cell becomes a `\u003cspan\u003e` with inline CSS reflecting its style\n/// (foreground/background color, modifier flags). The result is a complete\n/// `\u003c!DOCTYPE html\u003e` document with a dark theme and monospace font.\n#[must_use]\npub fn buffer_to_html(buf: \u0026Buffer, width: u16, height: u16) -\u003e String {\n    let mut html = String::new();\n    html.push_str(\"\u003c!DOCTYPE html\u003e\\n\u003chtml lang=\\\"en\\\"\u003e\\n\u003chead\u003e\\n\");\n    html.push_str(\"\u003cmeta charset=\\\"UTF-8\\\"\u003e\\n\");\n    html.push_str(\"\u003cmeta name=\\\"viewport\\\" content=\\\"width=device-width, initial-scale=1.0\\\"\u003e\\n\");\n    html.push_str(\"\u003ctitle\u003etui-inject render\u003c/title\u003e\\n\");\n    html.push_str(\"\u003cstyle\u003e\\n\");\n    html.push_str(\"  body { background: #0d1117; color: #e6edf3; margin: 0; padding: 24px; \");\n    html.push_str(\"font-family: 'Cascadia Code','Fira Code','SF Mono',Consolas,monospace; }\\n\");\n    html.push_str(\"  .frame { display: inline-block; \");\n    html.push_str(\"border: 1px solid #30363d; background: #161b22; padding: 8px; \");\n    html.push_str(\"line-height: 1.0; font-size: 14px; white-space: pre; }\\n\");\n    html.push_str(\"  .frame div { min-height: 1em; }\\n\");\n    html.push_str(\"  span { display: inline-block; }\\n\");\n    html.push_str(\"\u003c/style\u003e\\n\u003c/head\u003e\\n\u003cbody\u003e\\n\");\n    html.push_str(\"\u003cdiv class=\\\"frame\\\"\u003e\\n\");\n\n    for y in 0..height {\n        html.push_str(\"\u003cdiv\u003e\");\n        for x in 0..width {\n            let cell = \u0026buf[(x, y)];\n            let css = style_to_css(\u0026cell.style());\n            let symbol = html_escape(cell.symbol());\n            if css.is_empty() {\n                html.push_str(\u0026symbol);\n            } else {\n                html.push_str(\"\u003cspan style=\\\"\");\n                html.push_str(\u0026css);\n                html.push_str(\"\\\"\u003e\");\n                html.push_str(\u0026symbol);\n                html.push_str(\"\u003c/span\u003e\");\n            }\n        }\n        html.push_str(\"\u003c/div\u003e\\n\");\n    }\n\n    html.push_str(\"\u003c/div\u003e\\n\u003c/body\u003e\\n\u003c/html\u003e\\n\");\n    html\n}\n\n/// Convert a ratatui `Style` to inline CSS properties.\nfn style_to_css(style: \u0026ratatui::style::Style) -\u003e String {\n    let mut parts: Vec\u003cString\u003e = Vec::new();\n\n    if let Some(fg) = style.fg {\n        if let Some(color) = color_to_css(fg) {\n            parts.push(format!(\"color: {color}\"));\n        }\n    }\n    if let Some(bg) = style.bg {\n        if let Some(color) = color_to_css(bg) {\n            parts.push(format!(\"background-color: {color}\"));\n        }\n    }\n\n    let modifier = style.add_modifier;\n    if modifier.contains(Modifier::BOLD) {\n        parts.push(\"font-weight: bold\".to_string());\n    }\n    if modifier.contains(Modifier::ITALIC) {\n        parts.push(\"font-style: italic\".to_string());\n    }\n    if modifier.contains(Modifier::UNDERLINED) {\n        parts.push(\"text-decoration: underline\".to_string());\n    }\n    if modifier.contains(Modifier::REVERSED) {\n        parts.push(\"filter: invert(1)\".to_string());\n    }\n\n    parts.join(\"; \")\n}\n\n/// Convert a ratatui `Color` to a CSS color string.\nfn color_to_css(color: Color) -\u003e Option\u003cString\u003e {\n    match color {\n        Color::Reset =\u003e None,\n        Color::Black =\u003e Some(\"#000000\".to_string()),\n        Color::Red =\u003e Some(\"#ff5555\".to_string()),\n        Color::Green =\u003e Some(\"#50fa7b\".to_string()),\n        Color::Yellow =\u003e Some(\"#f1fa8c\".to_string()),\n        Color::Blue =\u003e Some(\"#bd93f9\".to_string()),\n        Color::Magenta =\u003e Some(\"#ff79c6\".to_string()),\n        Color::Cyan =\u003e Some(\"#8be9fd\".to_string()),\n        Color::Gray =\u003e Some(\"#bbbbbb\".to_string()),\n        Color::DarkGray =\u003e Some(\"#555555\".to_string()),\n        Color::LightRed =\u003e Some(\"#ff7777\".to_string()),\n        Color::LightGreen =\u003e Some(\"#88ff99\".to_string()),\n        Color::LightYellow =\u003e Some(\"#ffffaa\".to_string()),\n        Color::LightBlue =\u003e Some(\"#ccbbff\".to_string()),\n        Color::LightMagenta =\u003e Some(\"#ffaadd\".to_string()),\n        Color::LightCyan =\u003e Some(\"#aaeeff\".to_string()),\n        Color::White =\u003e Some(\"#ffffff\".to_string()),\n        Color::Rgb(r, g, b) =\u003e Some(format!(\"#{r:02x}{g:02x}{b:02x}\")),\n        Color::Indexed(i) =\u003e Some(format!(\"rgb({i}, {i}, {i})\")),\n    }\n}\n\n/// Escape special HTML characters.\nfn html_escape(s: \u0026str) -\u003e String {\n    let mut out = String::with_capacity(s.len());\n    for c in s.chars() {\n        match c {\n            '\u0026' =\u003e out.push_str(\"\u0026amp;\"),\n            '\u003c' =\u003e out.push_str(\"\u0026lt;\"),\n            '\u003e' =\u003e out.push_str(\"\u0026gt;\"),\n            '\"' =\u003e out.push_str(\"\u0026quot;\"),\n            '\\'' =\u003e out.push_str(\"\u0026#39;\"),\n            ' ' =\u003e out.push_str(\"\u0026nbsp;\"),\n            _ =\u003e out.push(c),\n        }\n    }\n    out\n}\n\n/// Render area dimensions as a `Rect` for convenience.\n#[must_use]\npub fn full_area(width: u16, height: u16) -\u003e Rect {\n    Rect::new(0, 0, width, height)\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use ratatui::buffer::Buffer;\n\n    #[test]\n    fn text_dump_concatenates_symbols() {\n        let buf = Buffer::with_lines([\"ab\", \"cd\"]);\n        let text = buffer_to_text(\u0026buf, 2, 2);\n        assert_eq!(text, \"ab\\ncd\");\n    }\n\n    #[test]\n    fn html_dump_wraps_in_doctype() {\n        let buf = Buffer::with_lines([\"hi\"]);\n        let html = buffer_to_html(\u0026buf, 2, 1);\n        assert!(html.starts_with(\"\u003c!DOCTYPE html\u003e\"));\n        assert!(html.contains(\"hi\"));\n        assert!(html.contains(\"\u003c/html\u003e\"));\n    }\n\n    #[test]\n    fn html_escape_handles_special_chars() {\n        assert_eq!(html_escape(\"a\u003cb\u003e\u0026c\"), \"a\u0026lt;b\u0026gt;\u0026amp;c\");\n        assert_eq!(html_escape(\" \"), \"\u0026nbsp;\");\n    }\n\n    #[test]\n    fn style_to_css_handles_basic_colors() {\n        let style = ratatui::style::Style::default()\n            .fg(Color::Red)\n            .bg(Color::Blue);\n        let css = style_to_css(\u0026style);\n        assert!(css.contains(\"color: #ff5555\"));\n        assert!(css.contains(\"background-color: #bd93f9\"));\n    }\n\n    // ----- Color variants -----\n\n    #[test]\n    fn color_to_css_reset_returns_none() {\n        assert!(color_to_css(Color::Reset).is_none());\n    }\n\n    #[test]\n    fn color_to_css_named_variants() {\n        assert_eq!(color_to_css(Color::Black).unwrap(), \"#000000\");\n        assert_eq!(color_to_css(Color::Red).unwrap(), \"#ff5555\");\n        assert_eq!(color_to_css(Color::Green).unwrap(), \"#50fa7b\");\n        assert_eq!(color_to_css(Color::Yellow).unwrap(), \"#f1fa8c\");\n        assert_eq!(color_to_css(Color::Blue).unwrap(), \"#bd93f9\");\n        assert_eq!(color_to_css(Color::Magenta).unwrap(), \"#ff79c6\");\n        assert_eq!(color_to_css(Color::Cyan).unwrap(), \"#8be9fd\");\n        assert_eq!(color_to_css(Color::Gray).unwrap(), \"#bbbbbb\");\n        assert_eq!(color_to_css(Color::DarkGray).unwrap(), \"#555555\");\n        assert_eq!(color_to_css(Color::LightRed).unwrap(), \"#ff7777\");\n        assert_eq!(color_to_css(Color::LightGreen).unwrap(), \"#88ff99\");\n        assert_eq!(color_to_css(Color::LightYellow).unwrap(), \"#ffffaa\");\n        assert_eq!(color_to_css(Color::LightBlue).unwrap(), \"#ccbbff\");\n        assert_eq!(color_to_css(Color::LightMagenta).unwrap(), \"#ffaadd\");\n        assert_eq!(color_to_css(Color::LightCyan).unwrap(), \"#aaeeff\");\n        assert_eq!(color_to_css(Color::White).unwrap(), \"#ffffff\");\n    }\n\n    #[test]\n    fn color_to_css_rgb_formats_as_hex() {\n        let css = color_to_css(Color::Rgb(0x12, 0x34, 0x56)).unwrap();\n        assert_eq!(css, \"#123456\");\n    }\n\n    #[test]\n    fn color_to_css_indexed_returns_grayscale() {\n        let css = color_to_css(Color::Indexed(128)).unwrap();\n        assert_eq!(css, \"rgb(128, 128, 128)\");\n    }\n\n    // ----- Modifier flags -----\n\n    #[test]\n    fn style_to_css_bold_modifier() {\n        let style = ratatui::style::Style::default().add_modifier(Modifier::BOLD);\n        let css = style_to_css(\u0026style);\n        assert!(css.contains(\"font-weight: bold\"));\n    }\n\n    #[test]\n    fn style_to_css_italic_modifier() {\n        let style = ratatui::style::Style::default().add_modifier(Modifier::ITALIC);\n        let css = style_to_css(\u0026style);\n        assert!(css.contains(\"font-style: italic\"));\n    }\n\n    #[test]\n    fn style_to_css_underlined_modifier() {\n        let style = ratatui::style::Style::default().add_modifier(Modifier::UNDERLINED);\n        let css = style_to_css(\u0026style);\n        assert!(css.contains(\"text-decoration: underline\"));\n    }\n\n    #[test]\n    fn style_to_css_reversed_modifier() {\n        let style = ratatui::style::Style::default().add_modifier(Modifier::REVERSED);\n        let css = style_to_css(\u0026style);\n        assert!(css.contains(\"filter: invert(1)\"));\n    }\n\n    #[test]\n    fn style_to_css_empty_returns_empty() {\n        let style = ratatui::style::Style::default();\n        let css = style_to_css(\u0026style);\n        assert!(css.is_empty());\n    }\n\n    #[test]\n    fn style_to_css_combines_multiple_modifiers() {\n        let style = ratatui::style::Style::default()\n            .add_modifier(Modifier::BOLD | Modifier::ITALIC | Modifier::UNDERLINED);\n        let css = style_to_css(\u0026style);\n        assert!(css.contains(\"font-weight: bold\"));\n        assert!(css.contains(\"font-style: italic\"));\n        assert!(css.contains(\"text-decoration: underline\"));\n    }\n\n    // ----- html_escape edge cases -----\n\n    #[test]\n    fn html_escape_quotes() {\n        assert_eq!(html_escape(\"a\\\"b\"), \"a\u0026quot;b\");\n        assert_eq!(html_escape(\"a'b\"), \"a\u0026#39;b\");\n    }\n\n    #[test]\n    fn html_escape_empty_string() {\n        assert_eq!(html_escape(\"\"), \"\");\n    }\n\n    #[test]\n    fn html_escape_preserves_plain_text() {\n        assert_eq!(html_escape(\"hello\"), \"hello\");\n    }\n\n    #[test]\n    fn html_escape_handles_all_special_at_once() {\n        assert_eq!(\n            html_escape(\"\u003ca href=\\\"x\\\"\u003e\u0026'test'\u003c/a\u003e\"),\n            \"\u0026lt;a\u0026nbsp;href=\u0026quot;x\u0026quot;\u0026gt;\u0026amp;\u0026#39;test\u0026#39;\u0026lt;/a\u0026gt;\"\n        );\n    }\n\n    // ----- buffer_to_html with styled cells -----\n\n    #[test]\n    fn buffer_to_html_emits_span_for_styled_cell() {\n        use ratatui::style::{Color, Style};\n        let mut buf = Buffer::empty(ratatui::layout::Rect::new(0, 0, 1, 1));\n        buf[(0, 0)].set_style(Style::default().fg(Color::Green));\n        let html = buffer_to_html(\u0026buf, 1, 1);\n        assert!(html.contains(\"\u003cspan\"));\n        assert!(html.contains(\"color: #50fa7b\"));\n    }\n\n    // ----- full_area -----\n\n    #[test]\n    fn full_area_returns_expected_rect() {\n        let rect = full_area(80, 24);\n        assert_eq!(rect.x, 0);\n        assert_eq!(rect.y, 0);\n        assert_eq!(rect.width, 80);\n        assert_eq!(rect.height, 24);\n    }\n}\n","traces":[{"line":12,"address":[3651292,3650528,3651286],"length":1,"stats":{"Line":1}},{"line":13,"address":[3650587,3650724],"length":1,"stats":{"Line":1}},{"line":14,"address":[3650791,3650698],"length":1,"stats":{"Line":2}},{"line":15,"address":[3650904,3650993,3651098],"length":1,"stats":{"Line":3}},{"line":16,"address":[3651227,3651090,3651109],"length":1,"stats":{"Line":3}},{"line":17,"address":[3651235],"length":1,"stats":{"Line":1}},{"line":19,"address":[3651140],"length":1,"stats":{"Line":1}},{"line":20,"address":[3651210],"length":1,"stats":{"Line":1}},{"line":23,"address":[3650940],"length":1,"stats":{"Line":1}},{"line":32,"address":[3650509,3649024,3650503],"length":1,"stats":{"Line":1}},{"line":33,"address":[3649105],"length":1,"stat ain() -\u003e std::process::ExitCode {\n    let cli = Cli::parse();\n    run(cli.command)\n}\n","traces":[{"line":20,"address":[3599840],"length":1,"stats":{"Line":0}},{"line":21,"address":[3599847],"length":1,"stats":{"Line":0}},{"line":22,"address":[3599857],"length":1,"stats":{"Line":0}}],"covered":0,"coverable":3},{"path":["/","home","lhjnano","source","project","ratatui-bubbles","crates","tui-inject","src","record_fuzz_bench.rs"],"content":"//! `record`, `fuzz`, and `bench` command implementations for `tui-inject`.\n\nuse std::fs;\nuse std::panic;\nuse std::process::ExitCode;\nuse std::time::{Duration, Instant};\n\nuse crossterm::event::{Event, KeyCode, KeyEvent, KeyEventKind, KeyEventState, KeyModifiers};\n\nuse crate::widget::WidgetSpec;\n\n// ============================================================\n// record\n// ============================================================\n\n/// `tui-inject record` — capture keyboard events and save as TOML.\n///\n/// If the process has a controlling TTY, enters raw mode and records keys\n/// interactively until `q` or `Ctrl+C` is pressed. If no TTY is available\n/// (e.g. CI, piped stdin), writes a skeleton scenario file that the user\n/// can edit.\npub fn record(output: \u0026str) -\u003e ExitCode {\n    if !is_tty() {\n        let toml = write_skeleton();\n        match fs::write(output, toml) {\n            Ok(()) =\u003e {\n                eprintln!(\"no TTY detected — wrote skeleton scenario to {output}\");\n                eprintln!(\"edit it manually, then run `tui-inject replay {output}`\");\n                ExitCode::SUCCESS\n            }\n            Err(e) =\u003e {\n                eprintln!(\"write error: {e}\");\n                ExitCode::from(1)\n            }\n        }\n    } else {\n        record_interactive(output)\n    }\n}\n\n/// Check if stdin is a TTY (best-effort, no extra dependency).\nfn is_tty() -\u003e bool {\n    // We use crossterm's tty detection indirectly: try enable_raw_mode and\n    // see if it succeeds. If it errors, we're not on a TTY.\n    crossterm::terminal::enable_raw_mode().is_ok()\n}\n\n/// Build the skeleton scenario TOML content (without writing it).\nfn write_skeleton() -\u003e String {\n    r#\"# Skeleton scenario generated by `tui-inject record`.\n# No controlling TTY was available, so this is a template — edit the events\n# list manually, then run `tui-inject replay`.\n\n[widget]\nname = \"counter\"\ninitial = 0\n\n# Events: each [[events]] block is one input.\n# Simple form:\n#   [[events]]\n#   key = \"enter\"\n#\n# Modifier form:\n#   [[events]]\n#   key = \"ctrl+c\"\n#\n# Full form (with explicit modifiers list):\n#   [[events]]\n#   key = \"a\"\n#   modifiers = [\"shift\"]\n\n[[events]]\nkey = \"+\"\n\n[[events]]\nkey = \"+\"\n\n[[events]]\nkey = \"q\"\n\n[output]\nformat = \"text\"\nwidth = 40\nheight = 6\n\"#\n    .to_string()\n}\n\n/// Interactive recording on a real TTY.\nfn record_interactive(output: \u0026str) -\u003e ExitCode {\n    use crossterm::event;\n    use crossterm::event::{DisableMouseCapture, EnableMouseCapture};\n    use crossterm::execute;\n    use crossterm::terminal::{disable_raw_mode, EnterAlternateScreen, LeaveAlternateScreen};\n    use std::io::stdout;\n\n    // Raw mode was enabled by is_tty(); set up the rest.\n    let mut stdout = stdout();\n    let _ = execute!(stdout, EnterAlternateScreen, EnableMouseCapture);\n\n    let mut events: Vec\u003cEventRecord\u003e = Vec::new();\n    let mut instructions = [\n        \"Recording — press keys to capture. Press q / Esc / Ctrl+C to stop.\",\n        \"Each key will be saved as a [[events]] entry in the output TOML.\",\n    ];\n    let _ = instructions.iter_mut(); // silence dead-code warning on instructions\n\n    loop {\n        if let Ok(true) = event::poll(Duration::from_millis(100)) {\n            if let Ok(Event::Key(key)) = event::read() {\n                if key.kind != KeyEventKind::Press {\n                    continue;\n                }\n                let stop = matches!(key.code, KeyCode::Char('q') | KeyCode::Esc)\n                    || (key.modifiers.contains(KeyModifiers::CONTROL)\n                        \u0026\u0026 key.code == KeyCode::Char('c'));\n\n                if !stop {\n                    events.push(EventRecord::from(\u0026key));\n                }\n                if stop {\n                    break;\n                }\n            }\n        }\n    }\n\n    let _ = execute!(stdout, LeaveAlternateScreen, DisableMouseCapture);\n    let _ = disable_raw_mode();\n\n    let toml = format_scenario_toml(\u0026events);\n    match fs::write(output, toml) {\n        Ok(()) =\u003e {\n            eprintln!(\"recorded {} events to {output}\", events.len());\n            ExitCode::SUCCESS\n        }\n        Err(e) =\u003e {\n            eprintln!(\"write error: {e}\");\n            ExitCode::from(1)\n        }\n    }\n}\n\n/// Compact representation of one captured key event, for TOML output.\nstruct EventRecord {\n    key: String,\n    modifiers: Vec\u003cString\u003e,\n}\n\nimpl EventRecord {\n    fn from(key: \u0026KeyEvent) -\u003e Self {\n        let key_str = match key.code {\n            KeyCode::Enter =\u003e \"enter\".to_string(),\n            KeyCode::Tab =\u003e \"tab\".to_string(),\n            KeyCode::Backspace =\u003e \"backspace\".to_string(),\n            KeyCode::Delete =\u003e \"delete\".to_string(),\n            KeyCode::Esc =\u003e \"esc\".to_string(),\n            KeyCode::Up =\u003e \"up\".to_string(),\n            KeyCode::Down =\u003e \"down\".to_string(),\n            KeyCode::Left =\u003e \"left\".to_string(),\n            KeyCode::Right =\u003e \"right\".to_string(),\n            KeyCode::Home =\u003e \"home\".to_string(),\n            KeyCode::End =\u003e \"end\".to_string(),\n            KeyCode::PageUp =\u003e \"pageup\".to_string(),\n            KeyCode::PageDown =\u003e \"pagedown\".to_string(),\n            KeyCode::Char(' ') =\u003e \"space\".to_string(),\n            KeyCode::Char(c) =\u003e c.to_string(),\n            KeyCode::F(n) =\u003e format!(\"f{n}\"),\n            KeyCode::Null =\u003e \"null\".to_string(),\n            other =\u003e format!(\"{other:?}\"),\n        };\n        let mut modifiers = Vec::new();\n        if key.modifiers.contains(KeyModifiers::SHIFT) {\n            modifiers.push(\"shift\".to_string());\n        }\n        if key.modifiers.contains(KeyModifiers::CONTROL) {\n            modifiers.push(\"ctrl\".to_string());\n        }\n        if key.modifiers.contains(KeyModifiers::ALT) {\n            modifiers.push(\"alt\".to_string());\n        }\n        if key.modifiers.contains(KeyModifiers::SUPER) {\n            modifiers.push(\"super\".to_string());\n        }\n        Self {\n            key: key_str,\n            modifiers,\n        }\n    }\n}\n\n/// Format a list of captured events as a complete scenario TOML string.\nfn format_scenario_toml(events: \u0026[EventRecord]) -\u003e String {\n    let mut out = String::new();\n    out.push_str(\"# Recorded with `tui-inject record`.\\n\\n\");\n    out.push_str(\"[widget]\\nname = \\\"counter\\\"\\ninitial = 0\\n\\n\");\n    for ev in events {\n        if ev.modifiers.is_empty() {\n            out.push_str(\u0026format!(\"[[events]]\\nkey = \\\"{}\\\"\\n\\n\", ev.key));\n        } else {\n            let mods = ev\n                .modifiers\n                .iter()\n                .map(|m| format!(\"\\\"{m}\\\"\"))\n                .collect::\u003cVec\u003c_\u003e\u003e()\n                .join(\", \");\n            out.push_str(\u0026format!(\n                \"[[events]]\\nkey = \\\"{}\\\"\\nmodifiers = [{}]\\n\\n\",\n                ev.key, mods\n            ));\n        }\n    }\n    out.push_str(\"[output]\\nformat = \\\"text\\\"\\nwidth = 40\\nheight = 6\\n\");\n    out\n}\n\n// ============================================================\n// fuzz\n// ============================================================\n\n/// `tui-inject fuzz \u003cwidget\u003e --events N` — inject N random events.\n///\n/// Drives a Counter App through N random key events, using `catch_unwind`\n/// per event to isolate panics. Reports total events, panics, and final state.\npub fn fuzz(name: \u0026str, event_count: usize) -\u003e ExitCode {\n    if name != \"counter\" {\n        eprintln!(\"fuzz: widget '{name}' not supported (only 'counter' is fuzzable currently)\");\n        return ExitCode::from(2);\n    }\n\n    let mut rng = Prng::seeded(0xC0FFEE_u64);\n    let mut panics = 0;\n    let mut counter = CounterForFuzz::default();\n\n    for i in 0..event_count {\n        let event = random_key_event(\u0026mut rng);\n        let result = panic::catch_unwind(panic::AssertUnwindSafe(|| {\n            counter.on_event(event);\n        }));\n        if result.is_err() {\n            panics += 1;\n            eprintln!(\"fuzz: panic at event {i}\");\n        }\n    }\n\n    println!(\"fuzz results for '{name}':\");\n    println!(\"  events generated: {event_count}\");\n    println!(\"  panics:           {panics}\");\n    println!(\"  final count:      {}\", counter.count);\n    if panics == 0 {\n        println!(\"  status:           OK (no panics)\");\n        ExitCode::SUCCESS\n    } else {\n        println!(\"  status:           FAIL ({panics} panics)\");\n        ExitCode::from(1)\n    }\n}\n\n/// Minimal xorshift PRNG — no external dependency.\nstruct Prng {\n    state: u64,\n}\n\nimpl Prng {\n    fn seeded(seed: u64) -\u003e Self {\n        Self {\n            state: if seed == 0 { 0xDEADBEEF } else { seed },\n        }\n    }\n\n    fn next_u64(\u0026mut self) -\u003e u64 {\n        let mut x = self.state;\n        x ^= x \u003c\u003c 13;\n        x ^= x \u003e\u003e 7;\n        x ^= x \u003c\u003c 17;\n        self.state = x;\n        x\n    }\n\n    fn pick\u003c'a, T\u003e(\u0026mut self, items: \u0026'a [T]) -\u003e \u0026'a T {\n        let idx = (self.next_u64() as usize) % items.len();\n        \u0026items[idx]\n    }\n}\n\n/// Generate a random key event from a small, known-safe alphabet.\nfn random_key_event(rng: \u0026mut Prng) -\u003e Event {\n    let codes = [\n        KeyCode::Char('+'),\n        KeyCode::Char('-'),\n        KeyCode::Up,\n        KeyCode::Down,\n        KeyCode::Char('r'),\n        KeyCode::Char('q'),\n        KeyCode::Esc,\n        KeyCode::Enter,\n        KeyCode::Tab,\n        KeyCode::Char('a'),\n    ];\n    Event::Key(KeyEvent::new_with_kind_and_state(\n        *rng.pick(\u0026codes),\n        KeyModifiers::NONE,\n        KeyEventKind::Press,\n        KeyEventState::NONE,\n    ))\n}\n\n/// Minimal Counter for fuzzing — stateful, with the same Msg logic as the\n/// demo app, but without the App/Model trait baggage (no Command plumbing).\n#[derive(Debug, Default)]\nstruct CounterForFuzz {\n    count: i32,\n}\n\nimpl CounterForFuzz {\n    fn on_event(\u0026mut self, event: Event) {\n        if let Event::Key(KeyEvent {\n            code,\n            kind: KeyEventKind::Press,\n            ..\n        }) = event\n        {\n            match code {\n                KeyCode::Char('+') | KeyCode::Up =\u003e self.count += 1,\n                KeyCode::Char('-') | KeyCode::Down =\u003e self.count -= 1,\n                KeyCode::Char('r') =\u003e self.count = 0,\n                _ =\u003e {}\n            }\n        }\n    }\n}\n\n// ============================================================\n// bench\n// ============================================================\n\n/// `tui-inject bench \u003cwidget\u003e --iterations N` — measure render time.\n///\n/// Renders the widget N times via TestBackend and reports min/mean/p95/max.\npub fn bench(name: \u0026str, iterations: usize) -\u003e ExitCode {\n    let spec = match WidgetSpec::from_name(name) {\n        Some(s) =\u003e s,\n        None =\u003e {\n            eprintln!(\n                \"bench: unknown widget '{name}'. Available: {}\",\n                WidgetSpec::NAMES.join(\", \")\n            );\n            return ExitCode::from(1);\n        }\n    };\n\n    let width = 60_u16;\n    let height = 16_u16;\n    let mut timings: Vec\u003cDuration\u003e = Vec::with_capacity(iterations);\n\n    for _ in 0..iterations {\n        let backend = ratatui::backend::TestBackend::new(width, height);\n        let mut terminal = ratatui::Terminal::new(backend).expect(\"terminal\");\n        let start = Instant::now();\n        terminal\n            .draw(|frame| spec.render(frame, ratatui::layout::Rect::new(0, 0, width, height)))\n            .expect(\"draw\");\n        timings.push(start.elapsed());\n    }\n\n    timings.sort();\n    let min = timings.first().copied().unwrap_or_default();\n    let max = timings.last().copied().unwrap_or_default();\n    let mean_ns = timings.iter().map(|d| d.as_nanos()).sum::\u003cu128\u003e() / iterations.max(1) as u128;\n    let p95_idx = (iterations * 95) / 100;\n    let p95 = timings\n        .get(p95_idx.min(timings.len().saturating_sub(1)))\n        .copied()\n        .unwrap_or_default();\n\n    println!(\"bench results for '{name}' ({iterations} iterations, {width}x{height}):\");\n    println!(\"  min:  {}\", format_duration(min));\n    println!(\n        \"  mean: {}\",\n        format_duration(Duration::from_nanos(mean_ns as u64))\n    );\n    println!(\"  p95:  {}\", format_duration(p95));\n    println!(\"  max:  {}\", format_duration(max));\n    ExitCode::SUCCESS\n}\n\n/// Format a Duration for human-friendly display.\nfn format_duration(d: Duration) -\u003e String {\n    let ns = d.as_nanos();\n    if ns \u003c 1_000 {\n        format!(\"{ns} ns\")\n    } else if ns \u003c 1_000_000 {\n        format!(\"{:.2} µs\", ns as f64 / 1_000.0)\n    } else {\n        format!(\"{:.2} ms\", ns as f64 / 1_000_000.0)\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn prng_is_deterministic() {\n        let mut a = Prng::seeded(42);\n        let mut b = Prng::seeded(42);\n        for _ in 0..10 {\n            assert_eq!(a.next_u64(), b.next_u64());\n        }\n    }\n\n    #[test]\n    fn prng_pick_returns_in_range() {\n        let mut rng = Prng::seeded(7);\n        let items = [1, 2, 3, 4, 5];\n        for _ in 0..20 {\n            let picked = rng.pick(\u0026items);\n            assert!(items.contains(picked));\n        }\n    }\n\n    #[test]\n    fn random_key_event_produces_known_codes() {\n        let mut rng = Prng::seeded(99);\n        for _ in 0..20 {\n            let ev = random_key_event(\u0026mut rng);\n            assert!(matches!(ev, Event::Key(_)));\n        }\n    }\n\n    #[test]\n    fn counter_for_fuzz_increments_and_decrements() {\n        let mut c = CounterForFuzz::default();\n        c.on_event(random_key_event(\u0026mut Prng::seeded(1)));\n        // Just verify it doesn't panic on any random event.\n        let mut rng = Prng::seeded(2);\n        for _ in 0..100 {\n            c.on_event(random_key_event(\u0026mut rng));\n        }\n    }\n\n    #[test]\n    fn format_duration_handles_ranges() {\n        assert_eq!(format_duration(Duration::from_nanos(500)), \"500 ns\");\n        assert_eq!(format_duration(Duration::from_nanos(1_500)), \"1.50 µs\");\n        assert_eq!(format_duration(Duration::from_nanos(1_500_000)), \"1.50 ms\");\n    }\n\n    #[test]\n    fn format_scenario_toml_includes_widget_and_output() {\n        let events = vec![EventRecord {\n            key: \"enter\".to_string(),\n            modifiers: vec![],\n        }];\n        let toml = format_scenario_toml(\u0026events);\n        assert!(toml.contains(\"[widget]\"));\n        assert!(toml.contains(\"[[events]]\"));\n        assert!(toml.contains(\"[output]\"));\n        assert!(toml.contains(\"enter\"));\n    }\n\n    #[test]\n    fn event_record_maps_chars_and_arrows() {\n        let key = KeyEvent::new_with_kind_and_state(\n            KeyCode::Char('a'),\n            KeyModifiers::SHIFT,\n            KeyEventKind::Press,\n            KeyEventState::NONE,\n        );\n        let rec = EventRecord::from(\u0026key);\n        assert_eq!(rec.key, \"a\");\n        assert_eq!(rec.modifiers, vec![\"shift\".to_string()]);\n\n        let key = KeyEvent::new_with_kind_and_state(\n            KeyCode::Up,\n            KeyModifiers::NONE,\n            KeyEventKind::Press,\n            KeyEventState::NONE,\n        );\n        let rec = EventRecord::from(\u0026key);\n        assert_eq!(rec.key, \"up\");\n        assert!(rec.modifiers.is_empty());\n    }\n\n    #[test]\n    fn write_skeleton_includes_counter_widget() {\n        let toml = write_skeleton();\n        assert!(toml.contains(\"name = \\\"counter\\\"\"));\n        assert!(toml.contains(\"[[events]]\"));\n    }\n}\n","traces":[{"line":22,"address":[3436543,3436537,3435984],"length":1,"stats":{"Line":0}},{"line":23,"address":[3436001],"length":1,"stats":{"Line":0}},{"line":24,"address":[3436010],"length":1,"stats":{"Line":0}},{"line":25,"address":[3436020],"length":1,"stats":{"Line":0}},{"line":27,"address":[3436192],"length":1,"stats":{"Line":0}},{"line":28,"address":[3436270],"length":1,"stats":{"Line":0}},{"line":29,"address":[3436360],"length":1,"stats":{"Line":0}},{"line":31,"address":[3436141],"length":1,"stats":{"Line":0}},{"line":32,"address":[3436162,3436421],"length":1,"stats":{"Line":0}},{"line":33,"address":[3436499],"length":1,"stats":{"Line":0}},{"line":37,"address":[3436117],"length":1,"stats":{"Line":0}},{"line":42,"address":[3435966,3435872,3435960],"length":1,"stats":{"Line":0}},{"line":45,"address":[3435876],"length":1,"stats":{"Line":0}},{"line":49,"address":[3426736],"length":1,"stats":{"Line":1}},{"line":90,"address":[3427728,3429573,3429567],"length":1,"stats":{"Line":0}},{"line":98,"address":[3427751],"length":1,"stats":{"Line":0}},{"line":99,"address":[3427768],"length":1,"stats":{"Line":0}},{"line":101,"address":[3427876],"length":1,"stats":{"Line":0}},{"line":102,"address":[3427881],"length":1,"stats":{"Line":0}},{"line":106,"address":[3427948],"length":1,"stats":{ ":[3432585],"length":1,"stats":{"Line":0}},{"line":356,"address":[3433078,3432986],"length":1,"stats":{"Line":0}},{"line":357,"address":[3433137],"length":1,"stats":{"Line":0}},{"line":358,"address":[3435450],"length":1,"stats":{"Line":0}},{"line":359,"address":[3435664,3435595],"length":1,"stats":{"Line":0}},{"line":361,"address":[3435687],"length":1,"stats":{"Line":0}},{"line":363,"address":[3435800],"length":1,"stats":{"Line":0}},{"line":366,"address":[3433183],"length":1,"stats":{"Line":0}},{"line":367,"address":[3433237],"length":1,"stats":{"Line":0}},{"line":368,"address":[3433416],"length":1,"stats":{"Line":0}},{"line":369,"address":[3433902,3433595],"length":1,"stats":{"Line":0}},{"line":370,"address":[3433922,3433871],"length":1,"stats":{"Line":0}},{"line":371,"address":[3434257,3433995],"length":1,"stats":{"Line":0}},{"line":372,"address":[3434058],"length":1,"stats":{"Line":0}},{"line":376,"address":[3434300],"length":1,"stats":{"Line":0}},{"line":377,"address":[3434610],"length":1,"stats":{"Line":0}},{"line":378,"address":[3434796],"length":1,"stats":{"Line":0}},{"line":382,"address":[3435030],"length":1,"stats":{"Line":0}},{"line":383,"address":[3435231],"length":1,"stats":{"Line":0}},{"line":384,"address":[3435409],"length":1,"stats":{"Line":0}},{"line":388,"address":[3426768],"length":1,"stats":{"Line":1}},{"line":389,"address":[3426798],"length":1,"stats":{"Line":1}},{"line":390,"address":[3426813],"length":1,"stats":{"Line":1}},{"line":391,"address":[3426867],"length":1,"stats":{"Line":1}},{"line":392,"address":[3426838],"length":1,"stats":{"Line":1}},{"line":393,"address":[3427136],"length":1,"stats":{"Line":1}},{"line":395,"address":[3426966],"length":1,"stats":{"Line":1}}],"covered":60,"coverable":169},{"path":["/","home","lhjnano","source","project","ratatui-bubbles","crates","tui-inject","src","scenario.rs"],"content":"//! TOML scenario parsing for `tui-inject replay`.\n//!\n//! Scenario files describe a widget configuration, a sequence of events to\n//! inject, and an output format. The format is intentionally minimal —\n//! crossterm's `Event` type has no built-in serde, so we define a small\n//! [`ScenarioEvent`] schema that covers the common key/mouse cases.\n\nuse std::fs;\n\nuse crossterm::event::{\n    Event, KeyCode, KeyEvent, KeyEventKind, KeyEventState, KeyModifiers, MouseButton, MouseEvent,\n    MouseEventKind,\n};\nuse serde::Deserialize;\n\n/// A complete replay scenario.\n#[derive(Debug, Deserialize)]\npub struct Scenario {\n    /// Widget configuration.\n    pub widget: WidgetConfig,\n    /// Events to inject, in order.\n    #[serde(default)]\n    pub events: Vec\u003cScenarioEvent\u003e,\n    /// Output format (text or html).\n    #[serde(default)]\n    pub output: OutputConfig,\n}\n\n/// Widget configuration block.\n#[derive(Debug, Deserialize)]\npub struct WidgetConfig {\n    /// Widget name — currently only `counter` supports replay.\n    pub name: String,\n    /// Initial value (used by `counter`).\n    #[serde(default)]\n    pub initial: Option\u003ci32\u003e,\n}\n\n/// Output configuration block.\n#[derive(Debug, Deserialize)]\npub struct OutputConfig {\n    /// Format: `text` (default) or `html`.\n    #[serde(default = \"default_format\")]\n    pub format: String,\n    /// Frame width.\n    #[serde(default = \"default_width\")]\n    pub width: u16,\n    /// Frame height.\n    #[serde(default = \"default_height\")]\n    pub height: u16,\n}\n\nimpl Default for OutputConfig {\n    fn default() -\u003e Self {\n        Self {\n            format: default_format(),\n            width: default_width(),\n            height: default_height(),\n        }\n    }\n}\n\nfn default_format() -\u003e String {\n    \"text\".to_string()\n}\n\nfn default_width() -\u003e u16 {\n    50\n}\n\nfn default_height() -\u003e u16 {\n    8\n}\n\n/// A single scenario event.\n///\n/// The simplest form is a key string: `key = \"enter\"` or `key = \"ctrl+c\"`.\n/// For mouse events or fine-grained key control, use the table form.\n#[derive(Debug, Deserialize)]\n#[serde(untagged)]\npub enum ScenarioEvent {\n    /// Simple key string form (most common): `\"enter\"`, `\"up\"`, `\"q\"`, `\"ctrl+c\"`.\n    Key(String),\n    /// Full key specification for unusual cases.\n    FullKey(FullKeyEvent),\n    /// Mouse event.\n    Mouse(MouseEventSpec),\n}\n\n/// A fully-specified key event.\n#[derive(Debug, Deserialize)]\npub struct FullKeyEvent {\n    /// Key code name: `enter`, `tab`, `up`, `down`, `left`, `right`, `esc`,\n    /// `backspace`, `delete`, `home`, `end`, `pageup`, `pagedown`, or a single\n    /// character like `\"a\"` or `\"+\"`.\n    pub key: String,\n    /// Modifier list (any of: `shift`, `ctrl`, `alt`, `super`).\n    #[serde(default)]\n    pub modifiers: Vec\u003cString\u003e,\n}\n\n/// A mouse event specification.\n#[derive(Debug, Deserialize)]\npub struct MouseEventSpec {\n    /// Mouse kind: `down`, `up`, `drag`, `moved`, `scroll_down`, `scroll_up`.\n    pub kind: String,\n    /// X column (0-indexed).\n    pub column: u16,\n    /// Y row (0-indexed).\n    pub row: u16,\n}\n\n/// Parse a scenario from a TOML file.\n///\n/// # Errors\n///\n/// Returns an error if the file cannot be read or the TOML is malformed.\npub fn load(path: \u0026str) -\u003e Result\u003cScenario, String\u003e {\n    let content = fs::read_to_string(path).map_err(|e| format!(\"read {path}: {e}\"))?;\n    toml::from_str(\u0026content).map_err(|e| format!(\"parse {path}: {e}\"))\n}\n\n/// Convert a [`ScenarioEvent`] to a crossterm [`Event`].\n///\n/// # Errors\n///\n/// Returns an error if a key name or modifier is not recognized.\npub fn to_crossterm_event(event: \u0026ScenarioEvent) -\u003e Result\u003cEvent, String\u003e {\n    match event {\n        ScenarioEvent::Key(s) =\u003e parse_key_string(s).map(Event::Key),\n        ScenarioEvent::FullKey(k) =\u003e {\n            let code = parse_key_code(\u0026k.key)?;\n            let mods = parse_modifiers(\u0026k.modifiers)?;\n            Ok(Event::Key(KeyEvent::new_with_kind_and_state(\n                code,\n                mods,\n                KeyEventKind::Press,\n                KeyEventState::NONE,\n            )))\n        }\n        ScenarioEvent::Mouse(m) =\u003e {\n            let kind = parse_mouse_kind(\u0026m.kind)?;\n            Ok(Event::Mouse(MouseEvent {\n                kind,\n                column: m.column,\n                row: m.row,\n                modifiers: KeyModifiers::NONE,\n            }))\n        }\n    }\n}\n\n/// Parse a key string like `\"enter\"`, `\"up\"`, `\"q\"`, or `\"ctrl+c\"`.\n///\n/// Recognized modifiers (as prefixes): `ctrl+`, `shift+`, `alt+`, `super+`.\n/// Multiple modifiers can stack: `ctrl+shift+a`. A single `+` character is\n/// parsed as the key `+`, not as a modifier separator.\nfn parse_key_string(s: \u0026str) -\u003e Result\u003cKeyEvent, String\u003e {\n    let mut modifiers = KeyModifiers::NONE;\n    let mut key_part = s;\n    for (mod_name, flag) in [\n        (\"ctrl\", KeyModifiers::CONTROL),\n        (\"shift\", KeyModifiers::SHIFT),\n        (\"alt\", KeyModifiers::ALT),\n        (\"super\", KeyModifiers::SUPER),\n    ] {\n        let prefix = format!(\"{mod_name}+\");\n        if key_part.starts_with(\u0026prefix) {\n            modifiers |= flag;\n            key_part = \u0026key_part[prefix.len()..];\n        }\n    }\n    let code = parse_key_code(key_part)?;\n    Ok(KeyEvent::new_with_kind_and_state(\n        code,\n        modifiers,\n        KeyEventKind::Press,\n        KeyEventState::NONE,\n    ))\n}\n\n/// Parse a single key code name.\nfn parse_key_code(name: \u0026str) -\u003e Result\u003cKeyCode, String\u003e {\n    match name.to_ascii_lowercase().as_str() {\n        \"enter\" | \"return\" =\u003e Ok(KeyCode::Enter),\n        \"tab\" =\u003e Ok(KeyCode::Tab),\n        \"backspace\" | \"bs\" =\u003e Ok(KeyCode::Backspace),\n        \"delete\" | \"del\" =\u003e Ok(KeyCode::Delete),\n        \"esc\" | \"escape\" =\u003e Ok(KeyCode::Esc),\n        \"up\" =\u003e Ok(KeyCode::Up),\n        \"down\" =\u003e Ok(KeyCode::Down),\n        \"left\" =\u003e Ok(KeyCode::Left),\n        \"right\" =\u003e Ok(KeyCode::Right),\n        \"home\" =\u003e Ok(KeyCode::Home),\n        \"end\" =\u003e Ok(KeyCode::End),\n        \"pageup\" | \"pgup\" =\u003e Ok(KeyCode::PageUp),\n        \"pagedown\" | \"pgdn\" =\u003e Ok(KeyCode::PageDown),\n        \"space\" | \" \" =\u003e Ok(KeyCode::Char(' ')),\n        single if single.len() == 1 =\u003e {\n            let c = single.chars().next().unwrap();\n            Ok(KeyCode::Char(c))\n        }\n        other =\u003e Err(format!(\"unknown key code '{other}'\")),\n    }\n}\n\n/// Parse a list of modifier names into a `KeyModifiers` bitfield.\nfn parse_modifiers(mods: \u0026[String]) -\u003e Result\u003cKeyModifiers, String\u003e {\n    let mut flags = KeyModifiers::NONE;\n    for m in mods {\n        let flag = match m.to_ascii_lowercase().as_str() {\n            \"shift\" =\u003e KeyModifiers::SHIFT,\n            \"ctrl\" | \"control\" =\u003e KeyModifiers::CONTROL,\n            \"alt\" =\u003e KeyModifiers::ALT,\n            \"super\" | \"meta\" =\u003e KeyModifiers::SUPER,\n            other =\u003e return Err(format!(\"unknown modifier '{other}'\")),\n        };\n        flags |= flag;\n    }\n    Ok(flags)\n}\n\n/// Parse a mouse event kind name.\nfn parse_mouse_kind(name: \u0026str) -\u003e Result\u003cMouseEventKind, String\u003e {\n    match name.to_ascii_lowercase().as_str() {\n        \"down\" | \"press\" =\u003e Ok(MouseEventKind::Down(MouseButton::Left)),\n        \"up\" | \"release\" =\u003e Ok(MouseEventKind::Up(MouseButton::Left)),\n        \"drag\" =\u003e Ok(MouseEventKind::Drag(MouseButton::Left)),\n        \"moved\" | \"move\" =\u003e Ok(MouseEventKind::Moved),\n        \"scroll_down\" | \"wheel_down\" =\u003e Ok(MouseEventKind::ScrollDown),\n        \"scroll_up\" | \"wheel_up\" =\u003e Ok(MouseEventKind::ScrollUp),\n        other =\u003e Err(format!(\"unknown mouse kind '{other}'\")),\n    }\n}\n\n/// Resolve the scenario's widget configuration to a [`ReplayTarget`].\n///\n/// Currently only `counter` is supported for replay (it's the only widget\n/// with an interactive App implementation). Other widgets return an error.\n///\n/// # Errors\n///\n/// Returns an error if the widget name is unknown or unsupported for replay.\npub fn resolve_widget(config: \u0026WidgetConfig) -\u003e Result\u003cReplayTarget, String\u003e {\n    match config.name.as_str() {\n        \"counter\" =\u003e Ok(ReplayTarget::Counter {\n            initial: config.initial.unwrap_or(0),\n        }),\n        other =\u003e Err(format!(\n            \"replay is not yet supported for widget '{other}'. Supported: counter\"\n        )),\n    }\n}\n\n/// A widget that can be driven through a replay scenario.\npub enum ReplayTarget {\n    /// Counter app with an initial count value.\n    Counter { initial: i32 },\n}\n\n/// Helper trait: write scenario errors in a friendly format.\nimpl Scenario {\n    /// Run this scenario and return the rendered output as a string.\n    ///\n    /// Drives a Counter App through `main_loop` using a `TestBackend` and a\n    /// `ScriptedEventSource` preloaded with the scenario's events.\n    ///\n    /// # Errors\n    ///\n    /// Returns an error if the widget is unsupported, an event fails to\n    /// convert, or the main loop returns an IO error.\n    pub fn run(\u0026self) -\u003e Result\u003cString, String\u003e {\n        use ratatui::backend::TestBackend;\n        use ratatui::Terminal;\n        use ratatui_bubbles::elm::{Command, Model};\n        use ratatui_bubbles::runtime::{main_loop, App};\n        use ratatui_bubbles::test_utils::ScriptedEventSource;\n\n        let target = resolve_widget(\u0026self.widget)?;\n\n        // Convert scenario events to crossterm events.\n        let mut events = Vec::with_capacity(self.events.len());\n        for ev in \u0026self.events {\n            events.push(to_crossterm_event(ev)?);\n        }\n\n        let ReplayTarget::Counter { initial } = target;\n\n        // Counter App — mirrors examples/demo.rs but with initial count.\n        #[derive(Debug, Default)]\n        struct Counter {\n            count: i32,\n        }\n        #[derive(Debug, Clone, Copy)]\n        enum Msg {\n            Increment,\n            Decrement,\n            Quit,\n        }\n        impl Model\u003cMsg\u003e for Counter {\n            fn update(\u0026mut self, msg: Msg) -\u003e Command\u003cMsg\u003e {\n                match msg {\n                    Msg::Increment =\u003e self.count += 1,\n                    Msg::Decrement =\u003e self.count -= 1,\n                    Msg::Quit =\u003e {}\n                }\n                Command::none()\n            }\n            fn view(\u0026self, frame: \u0026mut ratatui::Frame, area: ratatui::layout::Rect) {\n                use ratatui::layout::{Alignment, Rect};\n                use ratatui::style::{Color, Modifier, Style};\n                use ratatui::text::{Line, Span};\n                use ratatui::widgets::{Block, Borders, Paragraph};\n\n                let _ = Alignment::Left; // suppress unused import warning if not needed\n                let title = Span::styled(\n                    \" Counter (replay) \",\n                    Style::default()\n                        .fg(Color::Cyan)\n                        .add_modifier(Modifier::BOLD),\n                );\n                let count_line = Line::from(vec![\n                    Span::raw(\" Count: \"),\n                    Span::styled(\n                        self.count.to_string(),\n                        Style::default().fg(if self.count \u003e= 0 {\n                            Color::Green\n                        } else {\n                            Color::Red\n                        }),\n                    ),\n                ]);\n                let block = Block::default().borders(Borders::ALL).title(title);\n                let paragraph = Paragraph::new(vec![Line::default(), count_line]).block(block);\n                frame.render_widget(paragraph, area);\n                let _ = Rect::new(0, 0, 0, 0); // ensure Rect import is used\n            }\n        }\n        impl App for Counter {\n            type Msg = Msg;\n            fn init(\u0026mut self) -\u003e Command\u003cMsg\u003e {\n                Command::none()\n            }\n            fn on_event(\u0026mut self, event: Event) -\u003e Option\u003cMsg\u003e {\n                if let Event::Key(KeyEvent {\n                    code,\n                    kind: KeyEventKind::Press,\n                    ..\n                }) = event\n                {\n                    match code {\n                        KeyCode::Char('+') | KeyCode::Up =\u003e return Some(Msg::Increment),\n                        KeyCode::Char('-') | KeyCode::Down =\u003e return Some(Msg::Decrement),\n                        KeyCode::Char('q') | KeyCode::Esc =\u003e return Some(Msg::Quit),\n                        _ =\u003e {}\n                    }\n                }\n                None\n            }\n            fn should_quit(\u0026self, msg: \u0026Msg) -\u003e bool {\n                matches!(msg, Msg::Quit)\n            }\n        }\n\n        let mut counter = Counter { count: initial };\n        let backend = TestBackend::new(self.output.width, self.output.height);\n        let mut terminal = Terminal::new(backend).map_err(|e| format!(\"terminal: {e}\"))?;\n        let mut source = ScriptedEventSource::new(events);\n\n        // main_loop returns Ok(()) on Quit, Err on exhaustion — both are fine\n        // for replay (we just want the final buffer).\n        let _ = main_loop(\u0026mut counter, \u0026mut terminal, \u0026mut source);\n        let buf = terminal.backend().buffer().clone();\n\n        match self.output.format.as_str() {\n            \"text\" | \"txt\" =\u003e Ok(crate::dump::buffer_to_text(\n                \u0026buf,\n                self.output.width,\n                self.output.height,\n            )),\n            \"html\" | \"htm\" =\u003e Ok(crate::dump::buffer_to_html(\n                \u0026buf,\n                self.output.width,\n                self.output.height,\n            )),\n            other =\u003e Err(format!(\"unknown format '{other}'\")),\n        }\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn parse_simple_key_string() {\n        let ev = parse_key_string(\"enter\").unwrap();\n        assert_eq!(ev.code, KeyCode::Enter);\n        assert_eq!(ev.modifiers, KeyModifiers::NONE);\n    }\n\n    #[test]\n    fn parse_key_with_modifier() {\n        let ev = parse_key_string(\"ctrl+c\").unwrap();\n        assert_eq!(ev.code, KeyCode::Char('c'));\n        assert!(ev.modifiers.contains(KeyModifiers::CONTROL));\n    }\n\n    #[test]\n    fn parse_single_char_plus_key() {\n        let ev = parse_key_string(\"+\").unwrap();\n        assert_eq!(ev.code, KeyCode::Char('+'));\n        assert_eq!(ev.modifiers, KeyModifiers::NONE);\n    }\n\n    #[test]\n    fn parse_arrow_keys() {\n        assert_eq!(parse_key_string(\"up\").unwrap().code, KeyCode::Up);\n        assert_eq!(parse_key_string(\"down\").unwrap().code, KeyCode::Down);\n    }\n\n    #[test]\n    fn parse_invalid_key_returns_error() {\n        assert!(parse_key_string(\"not-a-key\").is_err());\n    }\n\n    #[test]\n    fn parse_invalid_modifier_returns_error() {\n        assert!(parse_modifiers(\u0026[\"hyperlock\".to_string()]).is_err());\n    }\n\n    #[test]\n    fn scenario_parses_from_toml() {\n        let toml_str = r#\"\n[widget]\nname = \"counter\"\ninitial = 5\n\n[[events]]\nkey = \"+\"\n\n[[events]]\nkey = \"q\"\n\n[output]\nformat = \"text\"\nwidth = 40\nheight = 6\n\"#;\n        let scenario: Scenario = toml::from_str(toml_str).unwrap();\n        assert_eq!(scenario.widget.name, \"counter\");\n        assert_eq!(scenario.widget.initial, Some(5));\n        assert_eq!(scenario.events.len(), 2);\n        assert_eq!(scenario.output.format, \"text\");\n    }\n\n    #[test]\n    fn scenario_uses_default_output_when_omitted() {\n        let toml_str = r#\"\n[widget]\nname = \"counter\"\n\n[[events]]\nkey = \"q\"\n\"#;\n        let scenario: Scenario = toml::from_str(toml_str).unwrap();\n        assert_eq!(scenario.output.format, \"text\");\n        assert_eq!(scenario.output.width, 50);\n        assert_eq!(scenario.output.height, 8);\n    }\n\n    #[test]\n    fn resolve_counter_target() {\n        let config = WidgetConfig {\n            name: \"counter\".to_string(),\n            initial: Some(10),\n        };\n        let target = resolve_widget(\u0026config).unwrap();\n        let ReplayTarget::Counter { initial } = target;\n        assert_eq!(initial, 10);\n    }\n\n    #[test]\n    fn resolve_unsupported_widget_errors() {\n        let config = WidgetConfig {\n            name: \"list\".to_string(),\n            initial: None,\n        };\n        assert!(resolve_widget(\u0026config).is_err());\n    }\n\n    #[test]\n    fn scenario_run_produces_output() {\n        let toml_str = r#\"\n[widget]\nname = \"counter\"\ninitial = 5\n\n[[events]]\nkey = \"+\"\n\n[[events]]\nkey = \"+\"\n\n[[events]]\nkey = \"q\"\n\n[output]\nformat = \"text\"\nwidth = 30\nheight = 5\n\"#;\n        let scenario: Scenario = toml::from_str(toml_str).unwrap();\n        let output = scenario.run().unwrap();\n        // Initial 5 + 2 increments + Quit = final count 7\n        assert!(output.contains(\"7\"), \"output was: {output}\");\n    }\n}\n","traces":[{"line":54,"address":[3302475,3302481,3302336],"length":1,"stats":{"Line":1}},{"line":56,"address":[3302355],"length":1,"stats":{"Line":1}},{"line":57,"address":[3302360],"length":1,"stats":{"Line":1}},{"line":58,"address":[3302404],"length":1,"stats":{"Line":1}},{"line":63,"address":[3289104],"length":1,"stats":{"Line":1}},{"line":64,"address":[3289112],"length":1,"stats":{"Line":1}},{"line":118,"address":[ tats":{"Line":2}},{"line":373,"address":[3297571],"length":1,"stats":{"Line":1}},{"line":375,"address":[3297632,3297707],"length":1,"stats":{"Line":2}},{"line":376,"address":[3297723,3298263],"length":1,"stats":{"Line":2}},{"line":381,"address":[3298210,3297850],"length":1,"stats":{"Line":0}},{"line":386,"address":[3297977],"length":1,"stats":{"Line":0}}],"covered":105,"coverable":130},{"path":["/","home","lhjnano","source","project","ratatui-bubbles","crates","tui-inject","src","widget.rs"],"content":"//! Widget specifications and factories for `tui-inject`.\n//!\n//! Each variant of [`WidgetSpec`] corresponds to a ratatui-bubbles widget\n//! configured with simple primitive parameters (strings, ints). The\n//! [`WidgetSpec::render`] method draws the widget into a ratatui `Frame`.\n\nuse ratatui::layout::Rect;\nuse ratatui::text::Line;\nuse ratatui::Frame;\nuse ratatui_bubbles::key_help::{KeyBinding, KeyHelp};\nuse ratatui_bubbles::list::{List, ListItem};\nuse ratatui_bubbles::spinner::{Spinner, SpinnerStyle};\nuse ratatui_bubbles::style::StyleBuilder;\nuse ratatui_bubbles::table::{Column, Row, Table};\nuse ratatui_bubbles::text_input::TextInput;\nuse ratatui_bubbles::viewport::Viewport;\n\n/// A configured widget ready to render.\n///\n/// Each variant carries the minimum primitive state needed to construct\n/// the underlying ratatui-bubbles widget. Use [`WidgetSpec::render`] to\n/// draw it into a `Frame`.\n#[derive(Debug, Clone)]\npub enum WidgetSpec {\n    /// Filterable list of string items.\n    List {\n        /// Items to display.\n        items: Vec\u003cString\u003e,\n        /// Optional case-insensitive substring filter.\n        filter: Option\u003cString\u003e,\n    },\n    /// Scrollable viewport of text lines with optional search.\n    Viewport {\n        /// Lines to display.\n        lines: Vec\u003cString\u003e,\n        /// Optional search query (highlights matches).\n        search: Option\u003cString\u003e,\n        /// Height of the viewport window.\n        height: u16,\n    },\n    /// Multi-line text input with initial content.\n    TextInput {\n        /// Initial text content.\n        initial: String,\n    },\n    /// Animated spinner at a given frame.\n    Spinner {\n        /// Visual style preset.\n        style: SpinnerStyle,\n        /// Number of ticks to advance before rendering.\n        ticks: usize,\n    },\n    /// Sortable table of string rows.\n    Table {\n        /// Column titles and widths.\n        columns: Vec\u003c(String, u16)\u003e,\n        /// Row data (each inner Vec is one row's cells).\n        rows: Vec\u003cVec\u003cString\u003e\u003e,\n    },\n    /// Key-binding help display.\n    KeyHelp {\n        /// Bindings as (key, description) pairs.\n        bindings: Vec\u003c(String, String)\u003e,\n        /// Optional custom title for the help block.\n        title: Option\u003cString\u003e,\n    },\n    /// StyleBuilder demo — renders a styled span to show the result of `build()`.\n    StyleDemo {\n        /// Whether to enable bold.\n        bold: bool,\n        /// Whether to enable italic.\n        italic: bool,\n        /// Whether to enable underline.\n        underline: bool,\n    },\n}\n\n/// String item adapter for the [`List`] widget.\nstruct StringItem(String);\n\nimpl ListItem for StringItem {\n    fn render(\u0026self) -\u003e Line\u003c'_\u003e {\n        Line::from(self.0.as_str())\n    }\n\n    fn filterable_text(\u0026self) -\u003e \u0026str {\n        \u0026self.0\n    }\n}\n\n/// String row adapter for the [`Table`] widget.\n#[derive(Debug, Clone)]\nstruct StringRow(Vec\u003cString\u003e);\n\nimpl Row for StringRow {\n    fn cells(\u0026self) -\u003e Vec\u003cString\u003e {\n        self.0.clone()\n    }\n}\n\nimpl WidgetSpec {\n    /// All available widget names, in stable order.\n    pub const NAMES: \u0026'static [\u0026'static str] = \u0026[\n        \"list\",\n        \"viewport\",\n        \"text-input\",\n        \"spinner\",\n        \"table\",\n        \"key-help\",\n        \"style-demo\",\n    ];\n\n    /// Construct a widget spec from its name with default parameters.\n    ///\n    /// Returns `None` if `name` is not a known widget.\n    #[must_use]\n    pub fn from_name(name: \u0026str) -\u003e Option\u003cSelf\u003e {\n        Some(match name {\n            \"list\" =\u003e Self::List {\n                items: sample_items(),\n                filter: None,\n            },\n            \"viewport\" =\u003e Self::Viewport {\n                lines: sample_lines(),\n                search: None,\n                height: 10,\n            },\n            \"text-input\" =\u003e Self::TextInput {\n                initial: String::new(),\n            },\n            \"spinner\" =\u003e Self::Spinner {\n                style: SpinnerStyle::Line,\n                ticks: 0,\n            },\n            \"table\" =\u003e Self::Table {\n                columns: vec![(\"name\".to_string(), 12), (\"age\".to_string(), 5)],\n                rows: sample_table_rows(),\n            },\n            \"key-help\" =\u003e Self::KeyHelp {\n                bindings: sample_bindings(),\n                title: None,\n            },\n            \"style-demo\" =\u003e Self::StyleDemo {\n                bold: true,\n                italic: false,\n                underline: false,\n            },\n            _ =\u003e return None,\n        })\n    }\n\n    /// Render this widget into `frame` at `area`.\n    pub fn render(\u0026self, frame: \u0026mut Frame, area: Rect) {\n        match self {\n            Self::List { items, filter } =\u003e {\n                let list_items: Vec\u003cStringItem\u003e = items.iter().cloned().map(StringItem).collect();\n                let mut list = List::new(list_items);\n                if let Some(f) = filter {\n                    list.set_filter(f);\n                }\n                list.render(frame, area);\n            }\n            Self::Viewport {\n                lines,\n                search,\n                height,\n            } =\u003e {\n                let mut vp = Viewport::new(*height);\n                for line in lines {\n                    vp.append_line(Line::from(line.clone()));\n                }\n                if let Some(s) = search {\n                    vp.set_search(Some(s.as_str()));\n                }\n                vp.render(frame, area);\n            }\n            Self::TextInput { initial } =\u003e {\n                let mut ti = TextInput::new();\n                ti.insert_str(initial.as_str());\n                ti.render(frame, area);\n            }\n            Self::Spinner { style, ticks } =\u003e {\n                let mut spinner = Spinner::new(*style);\n                for _ in 0..*ticks {\n                    spinner.tick();\n                }\n                spinner.render(frame, area);\n            }\n            Self::Table { columns, rows } =\u003e {\n                let cols: Vec\u003cColumn\u003e = columns\n                    .iter()\n                    .map(|(title, width)| Column::new(title.clone(), *width))\n                    .collect();\n                let mut table = Table::\u003cStringRow\u003e::new(cols);\n                let table_rows: Vec\u003cStringRow\u003e = rows.iter().cloned().map(StringRow).collect();\n                table.set_rows(table_rows);\n                table.render(frame, area);\n            }\n            Self::KeyHelp { bindings, title } =\u003e {\n                let mut help = if let Some(t) = title {\n                    KeyHelp::new().with_title(t.clone())\n                } else {\n                    KeyHelp::new()\n                };\n                for (key, desc) in bindings {\n                    help.add(KeyBinding::new(key.clone(), desc.clone()));\n                }\n                help.render(frame, area);\n            }\n            Self::StyleDemo {\n                bold,\n                italic,\n                underline,\n            } =\u003e {\n                let mut builder = StyleBuilder::new().foreground(ratatui::style::Color::Cyan);\n                if *bold {\n                    builder = builder.bold();\n                }\n                if *italic {\n                    builder = builder.italic();\n                }\n                if *underline {\n                    builder = builder.underline();\n                }\n                let style = builder.build();\n                let span = ratatui::text::Span::styled(\"styled text demo\", style);\n                let line = Line::from(span);\n                let paragraph = ratatui::widgets::Paragraph::new(line);\n                frame.render_widget(paragraph, area);\n            }\n        }\n    }\n}\n\nfn sample_items() -\u003e Vec\u003cString\u003e {\n    vec![\n        \"apple\".to_string(),\n        \"banana\".to_string(),\n        \"cherry\".to_string(),\n        \"date\".to_string(),\n        \"elderberry\".to_string(),\n        \"fig\".to_string(),\n        \"grape\".to_string(),\n    ]\n}\n\nfn sample_lines() -\u003e Vec\u003cString\u003e {\n    vec![\n        \"First line of the viewport\".to_string(),\n        \"Second line follows here\".to_string(),\n        \"Third line continues the pattern\".to_string(),\n        \"Fourth line wraps up the demo\".to_string(),\n        \"Fifth line for good measure\".to_string(),\n    ]\n}\n\nfn sample_table_rows() -\u003e Vec\u003cVec\u003cString\u003e\u003e {\n    vec![\n        vec![\"alice\".to_string(), \"30\".to_string()],\n        vec![\"bob\".to_string(), \"25\".to_string()],\n        vec![\"charlie\".to_string(), \"35\".to_string()],\n    ]\n}\n\nfn sample_bindings() -\u003e Vec\u003c(String, String)\u003e {\n    vec![\n        (\"q\".to_string(), \"quit\".to_string()),\n        (\"↑/↓\".to_string(), \"navigate\".to_string()),\n        (\"enter\".to_string(), \"select\".to_string()),\n        (\"/\".to_string(), \"filter\".to_string()),\n    ]\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use ratatui::backend::TestBackend;\n    use ratatui::layout::Rect;\n    use ratatui::Terminal;\n\n    /// Render a widget spec into a fresh buffer for assertions.\n    fn render_buffer(spec: \u0026WidgetSpec, width: u16, height: u16) -\u003e ratatui::buffer::Buffer {\n        let backend = TestBackend::new(width, height);\n        let mut terminal = Terminal::new(backend).expect(\"terminal\");\n        terminal\n            .draw(|frame| spec.render(frame, Rect::new(0, 0, width, height)))\n            .expect(\"draw\");\n        terminal.backend().buffer().clone()\n    }\n\n    fn row_symbols(buf: \u0026ratatui::buffer::Buffer, y: usize, len: usize) -\u003e String {\n        (0..len)\n            .map(|x| buf[(x as u16, y as u16)].symbol().to_string())\n            .collect()\n    }\n\n    // ----- from_name + NAMES -----\n\n    #[test]\n    fn names_includes_all_seven_widgets() {\n        assert_eq!(WidgetSpec::NAMES.len(), 7);\n        assert!(WidgetSpec::NAMES.contains(\u0026\"list\"));\n        assert!(WidgetSpec::NAMES.contains(\u0026\"viewport\"));\n        assert!(WidgetSpec::NAMES.contains(\u0026\"text-input\"));\n        assert!(WidgetSpec::NAMES.contains(\u0026\"spinner\"));\n        assert!(WidgetSpec::NAMES.contains(\u0026\"table\"));\n        assert!(WidgetSpec::NAMES.contains(\u0026\"key-help\"));\n        assert!(WidgetSpec::NAMES.contains(\u0026\"style-demo\"));\n    }\n\n    #[test]\n    fn from_name_returns_some_for_known_widgets() {\n        for name in WidgetSpec::NAMES {\n            assert!(\n                WidgetSpec::from_name(name).is_some(),\n                \"from_name should return Some for known widget '{name}'\"\n            );\n        }\n    }\n\n    #[test]\n    fn from_name_returns_none_for_unknown() {\n        assert!(WidgetSpec::from_name(\"does-not-exist\").is_none());\n        assert!(WidgetSpec::from_name(\"\").is_none());\n    }\n\n    // ----- List -----\n\n    #[test]\n    fn list_renders_items() {\n        let spec = WidgetSpec::from_name(\"list\").unwrap();\n        let buf = render_buffer(\u0026spec, 30, 8);\n        let row0 = row_symbols(\u0026buf, 0, 30);\n        assert!(row0.contains(\"apple\"), \"row 0 was: {row0:?}\");\n    }\n\n    #[test]\n    fn list_filter_narrows_visible_items() {\n        let spec = WidgetSpec::List {\n            items: vec![\"alpha\".to_string(), \"beta\".to_string(), \"gamma\".to_string()],\n            filter: Some(\"am\".to_string()),\n        };\n        let buf = render_buffer(\u0026spec, 20, 5);\n        let row0 = row_symbols(\u0026buf, 0, 20);\n        assert!(row0.contains(\"gamma\"));\n        // \"alpha\" should NOT appear in the first 3 rows when filter=\"am\"\n        for y in 0..3 {\n            let row = row_symbols(\u0026buf, y, 20);\n            assert!(\n                !row.contains(\"alpha\"),\n                \"row {y} should not contain alpha: {row:?}\"\n            );\n        }\n    }\n\n    // ----- Viewport -----\n\n    #[test]\n    fn viewport_renders_lines() {\n        let spec = WidgetSpec::Viewport {\n            lines: vec![\"hello viewport\".to_string()],\n            search: None,\n            height: 5,\n        };\n        let buf = render_buffer(\u0026spec, 30, 6);\n        let row0 = row_symbols(\u0026buf, 0, 30);\n        assert!(row0.contains(\"hello\"));\n    }\n\n    #[test]\n    fn viewport_with_search_highlights_matches() {\n        let spec = WidgetSpec::Viewport {\n            lines: vec![\"foo line\".to_string(), \"no match\".to_string()],\n            search: Some(\"foo\".to_string()),\n            height: 5,\n        };\n        let buf = render_buffer(\u0026spec, 30, 6);\n        // search doesn't filter, just highlights — both lines should be present\n        let combined = (0..2).map(|y| row_symbols(\u0026buf, y, 30)).collect::\u003cString\u003e();\n        assert!(combined.contains(\"foo\"));\n    }\n\n    // ----- TextInput -----\n\n    #[test]\n    fn text_input_renders_initial_content() {\n        let spec = WidgetSpec::TextInput {\n            initial: \"hello world\".to_string(),\n        };\n        let buf = render_buffer(\u0026spec, 30, 3);\n        let row0 = row_symbols(\u0026buf, 0, 30);\n        assert!(row0.contains(\"hello\"));\n    }\n\n    // ----- Spinner -----\n\n    #[test]\n    fn spinner_renders_first_frame_for_each_style() {\n        for style in [\n            SpinnerStyle::Line,\n            SpinnerStyle::Dot,\n            SpinnerStyle::MiniDot,\n            SpinnerStyle::Jump,\n            SpinnerStyle::Pulse,\n            SpinnerStyle::Meter,\n            SpinnerStyle::Hamburger,\n            SpinnerStyle::Ellipsis,\n        ] {\n            let spec = WidgetSpec::Spinner { style, ticks: 0 };\n            let buf = render_buffer(\u0026spec, 5, 1);\n            let frame = style.frames()[0];\n            let rendered = row_symbols(\u0026buf, 0, frame.chars().count());\n            assert!(\n                rendered.starts_with(frame) || rendered.contains(frame.trim()),\n                \"SpinnerStyle {style:?} frame 0 '{frame}' not found in '{rendered}'\"\n            );\n        }\n    }\n\n    #[test]\n    fn spinner_tick_advances_frame_in_render() {\n        let spec = WidgetSpec::Spinner {\n            style: SpinnerStyle::Line,\n            ticks: 2,\n        };\n        let buf = render_buffer(\u0026spec, 5, 1);\n        let rendered = row_symbols(\u0026buf, 0, 1);\n        // Line frames: [\"|\", \"/\", \"-\", \"\\\\\"]; 2 ticks → \"-\"\n        assert_eq!(rendered, \"-\");\n    }\n\n    // ----- Table -----\n\n    #[test]\n    fn table_renders_header_and_data() {\n        let spec = WidgetSpec::from_name(\"table\").unwrap();\n        let buf = render_buffer(\u0026spec, 30, 8);\n        let header = row_symbols(\u0026buf, 0, 30);\n        assert!(header.contains(\"name\"), \"header was: {header:?}\");\n        // First data row\n        let row1 = row_symbols(\u0026buf, 1, 30);\n        assert!(row1.contains(\"alice\"), \"row1 was: {row1:?}\");\n    }\n\n    // ----- KeyHelp -----\n\n    #[test]\n    fn key_help_renders_title_and_bindings() {\n        let spec = WidgetSpec::KeyHelp {\n            bindings: vec![(\"q\".to_string(), \"quit\".to_string())],\n            title: Some(\"Test Title\".to_string()),\n        };\n        let buf = render_buffer(\u0026spec, 30, 6);\n        // Title appears in top border\n        let top = row_symbols(\u0026buf, 0, 30);\n        assert!(top.contains(\"Test Title\"), \"top was: {top:?}\");\n        // Binding appears in content area (row 1 inside border)\n        let row1 = row_symbols(\u0026buf, 1, 30);\n        assert!(\n            row1.contains('q') \u0026\u0026 row1.contains(\"quit\"),\n            \"row1 was: {row1:?}\"\n        );\n    }\n\n    // ----- StyleDemo -----\n\n    #[test]\n    fn style_demo_renders_text() {\n        let spec = WidgetSpec::StyleDemo {\n            bold: true,\n            italic: true,\n            underline: true,\n        };\n        let buf = render_buffer(\u0026spec, 30, 3);\n        let row0 = row_symbols(\u0026buf, 0, 30);\n        assert!(row0.contains(\"styled text\"), \"row0 was: {row0:?}\");\n    }\n}\n","traces":[{"line":82,"address":[3715200],"length":1,"stats":{"Line":3}},{"line":83,"address":[3715232],"length":1,"stats":{"Line":3}},{"line":86,"address":[3715184],"length":1,"stats":{"Line":1}},{"line":87,"address":[3715189],"length":1,"stats":{"Line":1}},{"line":96,"address":[3715136],"length":1,"stats":{"Line":1}},{"line":97,"address":[3715153],"length":1,"stats":{"Line":1}},{"line":117,"address":[3708654,3708660,3707248],"length":1,"stats":{"Line":3}},{"line":118,"address":[3708125],"length":1,"stats":{"Line":4}},{"line":119,"address":[3707393,3707307],"length":1,"stats":{"Line":7}},{"line":120,"address":[3707365],"length":1,"stats":{"Line":4}},{"line":121,"address":[3707375],"length":1,"stats":{"Line":4}},{"line":123,"address":[3707550,3707338],"length":1,"stats":{"Line":2}},{"line":124

/// Create an empty source (immediately exhausted).\n    #[must_use]\n    pub fn empty() -\u003e Self {\n        Self::new(Vec::new())\n    }\n\n    /// Number of events remaining in the queue.\n    #[must_use]\n    pub fn remaining(\u0026self) -\u003e usize {\n        self.events.len().saturating_sub(self.next)\n    }\n}\n\nimpl EventSource for ScriptedEventSource {\n    fn poll(\u0026mut self, _timeout: Duration) -\u003e io::Result\u003cbool\u003e {\n        if self.next \u003c self.events.len() {\n            Ok(true)\n        } else {\n            Err(io::Error::new(\n                io::ErrorKind::UnexpectedEof,\n                \"scripted event queue exhausted\",\n            ))\n        }\n    }\n\n    fn read(\u0026mut self) -\u003e io::Result\u003cEvent\u003e {\n        if self.next \u003c self.events.len() {\n            let ev = self.events[self.next].clone();\n            self.next += 1;\n            Ok(ev)\n        } else {\n            Err(io::Error::new(\n                io::ErrorKind::UnexpectedEof,\n                \"scripted event queue exhausted\",\n            ))\n        }\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use crossterm::event::{KeyCode, KeyEvent, KeyEventKind, KeyEventState, KeyModifiers};\n\n    fn key(code: KeyCode) -\u003e Event {\n        Event::Key(KeyEvent {\n            code,\n            modifiers: KeyModifiers::NONE,\n            kind: KeyEventKind::Press,\n            state: KeyEventState::NONE,\n        })\n    }\n\n    #[test]\n    fn empty_source_polls_as_exhausted() {\n        let mut s = ScriptedEventSource::empty();\n        let err = s.poll(Duration::from_millis(10)).unwrap_err();\n        assert_eq!(err.kind(), io::ErrorKind::UnexpectedEof);\n    }\n\n    #[test]\n    fn queue_drains_in_order() {\n        let mut s = ScriptedEventSource::new(vec![key(KeyCode::Enter), key(KeyCode::Tab)]);\n        assert!(s.poll(Duration::ZERO).unwrap());\n        let _ = s.read().unwrap();\n        assert!(s.poll(Duration::ZERO).unwrap());\n        let _ = s.read().unwrap();\n        // Now exhausted\n        let err = s.poll(Duration::ZERO).unwrap_err();\n        assert_eq!(err.kind(), io::ErrorKind::UnexpectedEof);\n    }\n\n    #[test]\n    fn remaining_tracks_progress() {\n        let mut s = ScriptedEventSource::new(vec![key(KeyCode::Enter), key(KeyCode::Tab)]);\n        assert_eq!(s.remaining(), 2);\n        let _ = s.read();\n        assert_eq!(s.remaining(), 1);\n    }\n}\n","traces":[{"line":30,"address":[2199216],"length":1,"stats":{"Line":8}},{"line":36,"address":[2199264],"length":1,"stats":{"Line":1}},{"line":37,"address":[2199277],"length":1,"stats":{"Line":1}},{"line":42,"address":[2009984],"length":1,"stats":{"Line":1}},{"line":43,"address":[2009998],"length":1,"stats":{"Line":1}},{"line":48,"address":[2009424],"length":1,"stats":{"Line":9}},{"line":49,"address":[2198841,2198775],"length":1,"stats":{"Line":11}},{"line":50,"address":[2198848],"length":1,"stats":{"Line":8}},{"line":52,"address":[2009490],"length":1,"stats":{"Line":2}},{"line":59,"address":[2009862,2009868,2009552],"length":1,"stats":{"Line":8}},{"line":60,"address":[2198988,2198912,2199138],"length":1,"stats":{"Line":18}},{"line":61,"address":[2198995],"length":1,"stats":{"Line":9}},{"line":62,"address":[2199140,2199030,2199078],"length":1,"stats":{"Line":18}},{"line":63,"address":[2199082],"length":1,"stats":{"Line":9}},{"line":65,"address":[2198940],"length":1,"stats":{"Line":0}}],"covered":14,"coverable":15},{"path":["/","home","lhjnano","source","project","ratatui-bubbles","crates","ratatui-bubbles","src","text_input.rs"],"content":"//! Multi-line text input with command history.\n//!\n//! A Rust port of the [`Bubbles` `textarea`](https://github.com/charmbracelet/bubbles/textarea)\n//! package, implemented as a multi-line editor with cursor movement and an\n//! optional submission history (similar to a shell readline).\n//!\n//! Unlike the original Go component — a fully styled textarea — this port\n//! focuses on the buffer model, cursor motion, and a submit-driven history\n//! cycle suitable for prompt-style inputs.\n\n#![allow(clippy::module_name_repetitions)]\n\nuse ratatui::layout::Rect;\nuse ratatui::style::{Modifier, Style};\nuse ratatui::text::{Line, Span};\nuse ratatui::widgets::Paragraph;\nuse ratatui::Frame;\n\n/// A multi-line text input widget.\n///\n/// Port of `bubbles/textarea.Model`, focused on the editable buffer and a\n/// submit-driven history (readline-style). See the [module docs](self).\npub struct TextInput {\n    /// The buffer, one [`String`] per line. Always non-empty.\n    lines: Vec\u003cString\u003e,\n    /// Cursor row (0-indexed into [`TextInput::lines`]).\n    cursor_line: usize,\n    /// Cursor column measured in characters (0-indexed; may equal the line's\n    /// character count when at end-of-line).\n    cursor_col: usize,\n    /// Previously submitted values, oldest first.\n    history: Vec\u003cString\u003e,\n    /// Current position within [`TextInput::history`] during navigation, or\n    /// `None` when editing the live buffer.\n    history_cursor: Option\u003cusize\u003e,\n    /// The live buffer captured when navigation enters [`TextInput::history`],\n    /// restored when the user browses past the newest entry.\n    saved_buffer: Option\u003cString\u003e,\n}\n\nimpl TextInput {\n    /// Create an empty text input (one empty line, cursor at `0,0`).\n    #[must_use]\n    pub fn new() -\u003e Self {\n        Self {\n            lines: vec![String::new()],\n            cursor_line: 0,\n            cursor_col: 0,\n            history: Vec::new(),\n            history_cursor: None,\n            saved_buffer: None,\n        }\n    }\n\n    /// Return the full buffer joined by newlines.\n    #[must_use]\n    pub fn value(\u0026self) -\u003e String {\n        self.lines.join(\"\\n\")\n    }\n\n    /// Return the cursor position as `(line, column)`.\n    #[must_use]\n    pub fn cursor(\u0026self) -\u003e (usize, usize) {\n        (self.cursor_line, self.cursor_col)\n    }\n\n    /// Insert a single character at the cursor, advancing the column by one.\n    pub fn insert_char(\u0026mut self, c: char) {\n        let line = \u0026mut self.lines[self.cursor_line];\n        let off = char_byte_offset(line, self.cursor_col);\n        line.insert(off, c);\n        self.cursor_col += 1;\n    }\n\n    /// Insert a string at the cursor.\n    ///\n    /// Embedded newlines split the buffer into additional lines, mirroring\n    /// [`TextInput::enter`].\n    pub fn insert_str(\u0026mut self, s: \u0026str) {\n        for c in s.chars() {\n            if c == '\\n' {\n                self.enter();\n            } else {\n                self.insert_char(c);\n            }\n        }\n    }\n\n    /// Delete the character before the cursor.\n    ///\n    /// At column `0` of a non-first line the current line is merged into the\n    /// previous one and the cursor moves to the join.\n    pub fn backspace(\u0026mut self) {\n        if self.cursor_col \u003e 0 {\n            let line = \u0026mut self.lines[self.cursor_line];\n            let off = char_byte_offset(line, self.cursor_col - 1);\n            line.remove(off);\n            self.cursor_col -= 1;\n        } else if self.cursor_line \u003e 0 {\n            let current = self.lines.remove(self.cursor_line);\n            self.cursor_line -= 1;\n            let join_col = self.lines[self.cursor_line].chars().count();\n            self.lines[self.cursor_line].push_str(\u0026current);\n            self.cursor_col = join_col;\n        }\n    }\n\n    /// Split the current line at the cursor, moving the cursor to the start of\n    /// the new line below.\n    pub fn enter(\u0026mut self) {\n        let current = self.lines[self.cursor_line].clone();\n        let off = char_byte_offset(\u0026current, self.cursor_col);\n        let (before, after) = current.split_at(off);\n        self.lines[self.cursor_line] = before.to_string();\n        self.lines.insert(self.cursor_line + 1, after.to_string());\n        self.cursor_line += 1;\n        self.cursor_col = 0;\n    }\n\n    /// Move the cursor left, wrapping to the end of the previous line.\n    pub fn move_left(\u0026mut self) {\n        if self.cursor_col \u003e 0 {\n            self.cursor_col -= 1;\n        } else if self.cursor_line \u003e 0 {\n            self.cursor_line -= 1;\n            self.cursor_col = self.lines[self.cursor_line].chars().count();\n        }\n    }\n\n    /// Move the cursor right, wrapping to the start of the next line.\n    pub fn move_right(\u0026mut self) {\n        let cur_len = self.lines[self.cursor_line].chars().count();\n        if self.cursor_col \u003c cur_len {\n            self.cursor_col += 1;\n        } else if self.cursor_line + 1 \u003c self.lines.len() {\n            self.cursor_line += 1;\n            self.cursor_col = 0;\n        }\n    }\n\n    /// Move the cursor up one line, clamping the column to the target line.\n    pub fn move_up(\u0026mut self) {\n        if self.cursor_line \u003e 0 {\n            self.cursor_line -= 1;\n            self.clamp_col();\n        }\n    }\n\n    /// Move the cursor down one line, clamping the column to the target line.\n    pub fn move_down(\u0026mut self) {\n        if self.cursor_line + 1 \u003c self.lines.len() {\n            self.cursor_line += 1;\n            self.clamp_col();\n        }\n    }\n\n    /// Reset the buffer to a single empty line and abandon any in-progress\n    /// history navigation. Submitted [`TextInput::history`] is preserved.\n    pub fn clear(\u0026mut self) {\n        self.lines = vec![String::new()];\n        self.cursor_line = 0;\n        self.cursor_col = 0;\n        self.history_cursor = None;\n        self.saved_buffer = None;\n    }\n\n    /// Submit the current buffer: push it onto [`TextInput::history`], clear\n    /// the buffer, and return the submitted value.\n    pub fn submit(\u0026mut self) -\u003e String {\n        let value = self.value();\n        self.history.push(value.clone());\n        self.clear();\n        value\n    }\n\n    /// Navigate to the previous (older) history entry, replacing the buffer.\n    ///\n    /// The first call captures the live buffer so [`TextInput::history_next`]\n    /// can restore it later. No-op when [`TextInput::history`] is empty or the\n    /// cursor already sits at the oldest entry.\n    pub fn history_prev(\u0026mut self) {\n        if self.history.is_empty() {\n            return;\n        }\n        let idx = match self.history_cursor {\n            None =\u003e {\n                self.saved_buffer = Some(self.value());\n                self.history.len() - 1\n            }\n            Some(i) if i \u003e 0 =\u003e i - 1,\n            Some(_) =\u003e return, // already at the oldest entry\n        };\n        self.history_cursor = Some(idx);\n        let entry = self.history[idx].clone();\n        self.load_string(\u0026entry);\n    }\n\n    /// Navigate to the next (newer) history entry.\n    ///\n    /// Moving past the newest entry exits history navigation and restores the\n    /// buffer captured by [`TextInput::history_prev`].\n    pub fn history_next(\u0026mut self) {\n        let Some(i) = self.history_cursor else {\n            return; // already editing the live buffer\n        };\n        if i + 1 \u003c self.history.len() {\n            let idx = i + 1;\n            self.history_cursor = Some(idx);\n            let entry = self.history[idx].clone();\n            self.load_string(\u0026entry);\n        } else {\n            // past newest -\u003e restore the saved live buffer\n            self.history_cursor = None;\n            let saved = self.saved_buffer.take().unwrap_or_default();\n            self.load_string(\u0026saved);\n        }\n    }\n\n    /// Render the buffer into `frame` inside `area`.\n    ///\n    /// The cursor is indicated (best-effort) by drawing the character under it\n    /// in reverse video; an inverted space is drawn at end-of-line. Ratatui\n    /// 0.29 has no widget-level cursor positioning, so this is a visual hint\n    /// rather than a real terminal cursor.\n    pub fn render(\u0026self, frame: \u0026mut Frame\u003c'_\u003e, area: Rect) {\n        let lines: Vec\u003cLine\u003c'static\u003e\u003e = self\n            .lines\n            .iter()\n            .enumerate()\n            .map(|(li, l)| {\n                if li == self.cursor_line {\n                    render_line_with_cursor(l, self.cursor_col)\n                } else {\n                    Line::from(l.clone())\n                }\n            })\n            .collect();\n        frame.render_widget(Paragraph::new(lines), area);\n    }\n\n    /// Clamp [`TextInput::cursor_col`] to the current line's character count.\n    fn clamp_col(\u0026mut self) {\n        let len = self.lines[self.cursor_line].chars().count();\n        if self.cursor_col \u003e len {\n            self.cursor_col = len;\n        }\n    }\n\n    /// Replace the buffer with `s` (split on newlines) and place the cursor at\n    /// the end of the buffer.\n    fn load_string(\u0026mut self, s: \u0026str) {\n        let mut lines: Vec\u003cString\u003e = s.split('\\n').map(String::from).collect();\n        if lines.is_empty() {\n            lines.push(String::new());\n        }\n        self.cursor_line = lines.len() - 1;\n        self.cursor_col = lines[self.cursor_line].chars().count();\n        self.lines = lines;\n    }\n}\n\nimpl Default for TextInput {\n    fn default() -\u003e Self {\n        Self::new()\n    }\n}\n\n/// Return the byte offset of the `col`-th character of `s`, or `s.len()` when\n/// `col` is at or past the end of the string.\nfn char_byte_offset(s: \u0026str, col: usize) -\u003e usize {\n    s.char_indices()\n        .nth(col)\n        .map_or_else(|| s.len(), |(b, _)| b)\n}\n\n/// Build a [`Line`] whose character at `col` is shown in reverse video.\n///\n/// When `col` sits past the last character an inverted space is drawn so the\n/// cursor remains visible at end-of-line.\nfn render_line_with_cursor(line: \u0026str, col: usize) -\u003e Line\u003c'static\u003e {\n    let cursor_style = Style::new().add_modifier(Modifier::REVERSED);\n    let off = char_byte_offset(line, col);\n\n    let before = \u0026line[..off];\n    let rest = \u0026line[off..];\n\n    let mut spans: Vec\u003cSpan\u003c'static\u003e\u003e = Vec::new();\n    if !before.is_empty() {\n        spans.push(Span::raw(before.to_string()));\n    }\n    let cur = rest\n        .chars()\n        .next()\n        .map_or_else(|| String::from(' '), |c| c.to_string());\n    spans.push(Span::styled(cur, cursor_style));\n\n    let after_off = off + rest.chars().next().map_or(0, char::len_utf8);\n    if after_off \u003c line.len() {\n        spans.push(Span::raw(line[after_off..].to_string()));\n    }\n    Line::from(spans)\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn insert_enter_insert_produces_two_lines() {\n        let mut ti = TextInput::new();\n        ti.insert_char('a');\n        ti.enter();\n        ti.insert_char('b');\n        assert_eq!(ti.value(), \"a\\nb\");\n    }\n\n    #[test]\n    fn new_starts_empty_at_origin() {\n        let ti = TextInput::new();\n        assert_eq!(ti.value(), \"\");\n        assert_eq!(ti.cursor(), (0, 0));\n        assert!(ti.history.is_empty());\n    }\n\n    #[test]\n    fn default_equals_new() {\n        assert_eq!(TextInput::default().value(), TextInput::new().value());\n    }\n\n    #[test]\n    fn insert_str_handles_newlines() {\n        let mut ti = TextInput::new();\n        ti.insert_str(\"ab\\ncd\\nef\");\n        assert_eq!(ti.value(), \"ab\\ncd\\nef\");\n        assert_eq!(ti.cursor(), (2, 2)); // end of \"ef\"\n    }\n\n    #[test]\n    fn backspace_merges_lines_at_column_zero() {\n        let mut ti = TextInput::new();\n        ti.insert_str(\"foo\\nbar\");\n        // cursor at end of \"bar\": (1, 3)\n        ti.backspace();\n        ti.backspace();\n        ti.backspace();\n        // now at col 0 of line 1; one more backspace merges into \"foo\"\n        ti.backspace();\n        assert_eq!(ti.value(), \"foo\");\n        assert_eq!(ti.cursor(), (0, 3));\n    }\n\n    #[test]\n    fn submit_clears_buffer_and_records_history() {\n        let mut ti = TextInput::new();\n        ti.insert_str(\"first\");\n        assert_eq!(ti.submit(), \"first\");\n        assert_eq!(ti.value(), \"\"); // buffer cleared\n        assert_eq!(ti.cursor(), (0, 0));\n\n        ti.insert_str(\"second\");\n        assert_eq!(ti.submit(), \"second\");\n        assert_eq!(ti.history, vec![\"first\".to_string(), \"second\".to_string()]);\n    }\n\n    #[test]\n    fn history_prev_next_walk_and_restore_saved_buffer() {\n        let mut ti = TextInput::new();\n        ti.insert_str(\"a\");\n        let _ = ti.submit();\n        ti.insert_str(\"b\");\n        let _ = ti.submit();\n        // history: [\"a\", \"b\"]; live buffer is now empty\n        ti.insert_str(\"draft\"); // live buffer captured on first history_prev\n\n        ti.history_prev();\n        assert_eq!(ti.value(), \"b\"); // newest\n        ti.history_prev();\n        assert_eq!(ti.value(), \"a\"); // oldest\n        ti.history_prev(); // already at oldest -\u003e no-op\n        assert_eq!(ti.value(), \"a\");\n\n        ti.history_next();\n        assert_eq!(ti.value(), \"b\");\n        ti.history_next(); // past newest -\u003e restore the saved \"draft\"\n        assert_eq!(ti.value(), \"draft\");\n        ti.history_next(); // already live -\u003e no-op\n        assert_eq!(ti.value(), \"draft\");\n    }\n\n    #[test]\n    fn history_prev_is_noop_when_empty() {\n        let mut ti = TextInput::new();\n        ti.insert_str(\"x\");\n        ti.history_prev(); // no history -\u003e no-op\n        assert_eq!(ti.value(), \"x\");\n        assert!(ti.history_cursor.is_none());\n    }\n\n    #[test]\n    fn clear_resets_buffer_but_keeps_history() {\n        let mut ti = TextInput::new();\n        ti.insert_str(\"keep me\");\n        let _ = ti.submit();\n        ti.insert_str(\"scratch\");\n        ti.clear();\n        assert_eq!(ti.value(), \"\");\n        assert_eq!(ti.cursor(), (0, 0));\n        assert_eq!(ti.history, vec![\"keep me\".to_string()]);\n    }\n\n    #[test]\n    fn cursor_movement_wraps_and_clamps() {\n        let mut ti = TextInput::new();\n        ti.insert_str(\"abc\\nde\");\n        // cursor at end of \"de\": (1, 2)\n        ti.move_right(); // no-op (end of buffer)\n        assert_eq!(ti.cursor(), (1, 2));\n        ti.move_up();\n        assert_eq!(ti.cursor(), (0, 2)); // clamped to len(\"abc\")\n        ti.move_left();\n        ti.move_left();\n        ti.move_left(); // (0, -1) -\u003e wraps to end of... no, still line 0\n        assert_eq!(ti.cursor(), (0, 0));\n        ti.move_left(); // at (0,0) -\u003e no-op\n        assert_eq!(ti.cursor(), (0, 0));\n        ti.move_down();\n        assert_eq!(ti.cursor(), (1, 0)); // clamped down keeps col within \"de\"\n    }\n\n    #[test]\n    fn handles_multibyte_characters_by_char_column() {\n        let mut ti = TextInput::new();\n        ti.insert_str(\"한글\"); // 2 chars, 6 bytes\n        assert_eq!(ti.cursor(), (0, 2));\n        ti.move_left();\n        ti.insert_char('x'); // insert between the two Hangul syllables\n        assert_eq!(ti.value(), \"한x글\");\n        ti.backspace(); // delete 'x'\n        assert_eq!(ti.value(), \"한글\");\n    }\n\n    #[test]\n    fn backspace_at_start_of_first_line_is_noop() {\n        let mut ti = TextInput::new();\n        ti.backspace(); // empty buffer, cursor at (0,0) -\u003e both branches skip\n        assert_eq!(ti.value(), \"\");\n        assert_eq!(ti.cursor(), (0, 0));\n    }\n\n    #[test]\n    fn insert_str_with_embedded_newlines_creates_multiple_lines() {\n        let mut ti = TextInput::new();\n        ti.insert_str(\"line1\\nline2\\nline3\");\n        assert_eq!(ti.value(), \"line1\\nline2\\nline3\");\n        assert_eq!(ti.lines.len(), 3);\n        assert_eq!(ti.cursor(), (2, 5)); // end of \"line3\"\n    }\n\n    #[test]\n    fn move_left_at_start_of_first_line_clamps() {\n        let mut ti = TextInput::new();\n        ti.move_left(); // (0,0) -\u003e neither branch applies\n        assert_eq!(ti.cursor(), (0, 0));\n    }\n\n    #[test]\n    fn move_right_at_end_of_input_clamps() {\n        let mut ti = TextInput::new();\n        ti.insert_str(\"abc\");\n        // cursor at (0, 3); end of single-line buffer -\u003e move_right is a no-op\n        ti.move_right();\n        assert_eq!(ti.cursor(), (0, 3));\n    }\n\n    #[test]\n    fn history_prev_on_empty_history_is_noop_or_safe() {\n        let mut ti = TextInput::new();\n        ti.history_prev(); // no submitted history -\u003e early return, no panic\n        assert_eq!(ti.value(), \"\");\n        assert!(ti.history_cursor.is_none());\n    }\n\n    #[test]\n    fn submit_pushes_to_history_and_clears() {\n        let mut ti = TextInput::new();\n        ti.insert_str(\"hello\");\n        assert_eq!(ti.submit(), \"hello\");\n        assert_eq!(ti.value(), \"\"); // buffer cleared by submit\n        assert_eq!(ti.cursor(), (0, 0));\n        // browsing back should restore the just-submitted value\n        ti.history_prev();\n        assert_eq!(ti.value(), \"hello\");\n    }\n\n    #[test]\n    fn clear_resets_to_single_empty_line() {\n        let mut ti = TextInput::new();\n        ti.insert_str(\"some\\nmultiline\\ncontent\");\n        ti.clear();\n        assert_eq!(ti.value(), \"\");\n        assert_eq!(ti.cursor(), (0, 0));\n        assert_eq!(ti.lines.len(), 1); // single empty line, not zero lines\n    }\n}\n","traces":[{"line":44,"address":[5609316,5608912,5609322],"length":1,"stats":{"Line":4}},{"line":46,"address":[2231710,2231521],"length":1,"stats":{"Line":4}},{"line":49,"address":[2231694],"length":1,"stats":{"Line":4}},{"line":57,"address":[1965472],"length":1,"stats":{"Line":1}},{"line":58,"address":[2269680], ,2181492],"length":1,"stats":{"Line":3}},{"line":298,"address":[2283956,2283998],"length":1,"stats":{"Line":6}},{"line":299,"address":[2186091],"length":1,"stats":{"Line":0}},{"line":301,"address":[2228888],"length":1,"stats":{"Line":3}}],"covered":119,"coverable":127},{"path":["/","home","lhjnano","source","project","ratatui-bubbles","crates","ratatui-bubbles","src","viewport.rs"],"content":"//! Scrollable viewport with optional substring search.\n//!\n//! A Rust port of the [`Bubbles` `viewport`](https://github.com/charmbracelet/bubbles/viewport)\n//! package: a vertically-scrollable buffer of [`ratatui::text::Line`]s with\n//! case-insensitive substring search and match navigation.\n\n#![allow(clippy::module_name_repetitions)]\n\nuse ratatui::layout::Rect;\nuse ratatui::style::{Style, Stylize};\nuse ratatui::text::Line;\nuse ratatui::widgets::Paragraph;\nuse ratatui::Frame;\n\n/// A vertically-scrollable buffer of lines with optional substring search.\n///\n/// Port of `bubbles/viewport.Model`. See the [module docs](self) for details.\npub struct Viewport {\n    /// Every line currently held in the buffer.\n    lines: Vec\u003cLine\u003c'static\u003e\u003e,\n    /// Top-most visible line index.\n    offset: usize,\n    /// Desired visible height (in terminal rows).\n    height: u16,\n    /// Active search query, if any.\n    search: Option\u003cString\u003e,\n    /// Indices into [`Viewport::lines`] whose plain text contains the query.\n    matches: Vec\u003cusize\u003e,\n}\n\nimpl Viewport {\n    /// Create an empty viewport `height` rows tall.\n    #[must_use]\n    pub fn new(height: u16) -\u003e Self {\n        Self {\n            lines: Vec::new(),\n            offset: 0,\n            height,\n            search: None,\n            matches: Vec::new(),\n        }\n    }\n\n    /// Return the configured visible height.\n    #[must_use]\n    pub fn height(\u0026self) -\u003e u16 {\n        self.height\n    }\n\n    /// Set the visible height, clamping the current offset if needed.\n    pub fn set_height(\u0026mut self, h: u16) {\n        self.height = h;\n        self.clamp_offset();\n    }\n\n    /// Append a line to the bottom of the buffer, re-running any active search.\n    pub fn append_line(\u0026mut self, line: Line\u003c'static\u003e) {\n        self.lines.push(line);\n        self.recompute_matches();\n        self.clamp_offset();\n    }\n\n    /// Replace the entire buffer with `lines`, resetting the scroll offset and\n    /// re-running any active search.\n    pub fn set_lines(\u0026mut self, lines: Vec\u003cLine\u003c'static\u003e\u003e) {\n        self.lines = lines;\n        self.offset = 0;\n        self.recompute_matches();\n    }\n\n    /// Return the total number of lines in the buffer.\n    #[must_use]\n    pub fn line_count(\u0026self) -\u003e usize {\n        self.lines.len()\n    }\n\n    /// Scroll down by `n` rows (clamped to the bottom of the buffer).\n    pub fn scroll_down(\u0026mut self, n: usize) {\n        self.offset = self.offset.saturating_add(n);\n        self.clamp_offset();\n    }\n\n    /// Scroll up by `n` rows (clamped at zero).\n    pub fn scroll_up(\u0026mut self, n: usize) {\n        self.offset = self.offset.saturating_sub(n);\n    }\n\n    /// Return the current top-most visible line index.\n    #[must_use]\n    pub fn offset(\u0026self) -\u003e usize {\n        self.offset\n    }\n\n    /// Set the search query, recomputing match positions.\n    ///\n    /// Passing `None` (or an empty string) clears the search. Matches are found\n    /// via a case-insensitive substring search through each line's plain text.\n    pub fn set_search(\u0026mut self, query: Option\u003c\u0026str\u003e) {\n        self.search = query.filter(|q| !q.is_empty()).map(str::to_owned);\n        self.recompute_matches();\n    }\n\n    /// Return the number of lines currently matching the active search.\n    #[must_use]\n    pub fn match_count(\u0026self) -\u003e usize {\n        self.matches.len()\n    }\n\n    /// Scroll so the next match (after the current offset) is in view.\n    ///\n    /// Wraps around to the first match when past the last one. No-op when no\n    /// search is active or there are no matches.\n    pub fn next_match(\u0026mut self) {\n        let Some(target) = self.next_match_target() else {\n            return;\n        };\n        self.scroll_to(target);\n    }\n\n    /// Scroll so the previous match (before the current offset) is in view.\n    ///\n    /// Wraps around to the last match when before the first one. No-op when no\n    /// search is active or there are no matches.\n    pub fn prev_match(\u0026mut self) {\n        let Some(target) = self.prev_match_target() else {\n            return;\n        };\n        self.scroll_to(target);\n    }\n\n    /// Render the visible window of lines into `frame`, highlighting any line\n    /// that matches the active search with [`Style::default().yellow()`].\n    pub fn render(\u0026self, frame: \u0026mut Frame\u003c'_\u003e, area: Rect) {\n        let h = usize::from(self.height);\n        let start = self.offset.min(self.lines.len());\n        let end = self.offset.saturating_add(h).min(self.lines.len());\n\n        let mut visible: Vec\u003cLine\u003c'static\u003e\u003e = Vec::with_capacity(end.saturating_sub(start));\n        for global_idx in start..end {\n            let mut line = self.lines[global_idx].clone();\n            if self.matches.contains(\u0026global_idx) {\n                line.style = Style::default().yellow();\n            }\n            visible.push(line);\n        }\n\n        frame.render_widget(Paragraph::new(visible), area);\n    }\n\n    /// Index of the next match strictly after the current offset, wrapping to\n    /// the first match when none follows. `None` when there are no matches.\n    fn next_match_target(\u0026self) -\u003e Option\u003cusize\u003e {\n        if let Some(\u0026next) = self.matches.iter().find(|\u0026\u0026idx| idx \u003e self.offset) {\n            Some(next)\n        } else {\n            self.matches.first().copied()\n        }\n    }\n\n    /// Index of the previous match strictly before the current offset, wrapping\n    /// to the last match when none precedes. `None` when there are no matches.\n    fn prev_match_target(\u0026self) -\u003e Option\u003cusize\u003e {\n        if let Some(\u0026prev) = self.matches.iter().rev().find(|\u0026\u0026idx| idx \u003c self.offset) {\n            Some(prev)\n        } else {\n            self.matches.last().copied()\n        }\n    }\n\n    /// Set the offset so `line_idx` is the top visible row, clamped to bounds.\n    fn scroll_to(\u0026mut self, line_idx: usize) {\n        self.offset = line_idx;\n        self.clamp_offset();\n    }\n\n    /// Clamp [`Viewport::offset`] to the largest legal top-row index.\n    fn clamp_offset(\u0026mut self) {\n        let max = self.max_offset();\n        if self.offset \u003e max {\n            self.offset = max;\n        }\n    }\n\n    /// Largest legal top-row index given the current height.\n    fn max_offset(\u0026self) -\u003e usize {\n        self.lines.len().saturating_sub(usize::from(self.height))\n    }\n\n    /// Recompute [`Viewport::matches`] from the current query via a\n    /// case-insensitive substring search through each line's plain text.\n    fn recompute_matches(\u0026mut self) {\n        self.matches.clear();\n        let Some(query) = \u0026self.search else {\n            return;\n        };\n        let needle = query.to_lowercase();\n        for (idx, line) in self.lines.iter().enumerate() {\n            // `Span.content` is `Cow\u003c'_, str\u003e`; `\u0026*` derefs to `\u0026str`.\n            // (`s.content.as_str()` would resolve to the unstable `str::as_str`.)\n            let plain: String = line.spans.iter().map(|s| \u0026*s.content).collect();\n            if plain.to_lowercase().contains(\u0026needle) {\n                self.matches.push(idx);\n            }\n        }\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    fn vp_with_lines() -\u003e Viewport {\n        let mut vp = Viewport::new(10);\n        vp.append_line(Line::from(\"hello world\"));\n        vp.append_line(Line::from(\"foo bar\"));\n        vp.append_line(Line::from(\"baz qux\"));\n        vp.append_line(Line::from(\"footer here\"));\n        vp\n    }\n\n    #[test]\n    fn set_search_finds_two_matching_line_indices() {\n        let mut vp = vp_with_lines();\n        vp.set_search(Some(\"foo\"));\n        // Lines \"foo bar\" (idx 1) and \"footer here\" (idx 3) both contain \"foo\".\n        assert_eq!(vp.match_count(), 2);\n    }\n\n    #[test]\n    fn search_is_case_insensitive() {\n        let mut vp = Viewport::new(10);\n        vp.append_line(Line::from(\"Foo Bar\"));\n        vp.append_line(Line::from(\"nothing here\"));\n        vp.set_search(Some(\"fOO\"));\n        assert_eq!(vp.match_count(), 1);\n    }\n\n    #[test]\n    fn clearing_search_empties_matches() {\n        let mut vp = vp_with_lines();\n        vp.set_search(Some(\"foo\"));\n        assert_eq!(vp.match_count(), 2);\n        vp.set_search(None);\n        assert_eq!(vp.match_count(), 0);\n    }\n\n    #[test]\n    fn next_match_advances_offset_and_wraps() {\n        // height 1 =\u003e max_offset 3, so offsets 1 and 3 are valid scroll targets.\n        let mut vp = Viewport::new(1);\n        vp.append_line(Line::from(\"hello world\"));\n        vp.append_line(Line::from(\"foo bar\"));\n        vp.append_line(Line::from(\"baz qux\"));\n        vp.append_line(Line::from(\"footer here\"));\n        vp.set_search(Some(\"foo\")); // matches: [1, 3]\n        assert_eq!(vp.offset(), 0);\n        vp.next_match();\n        assert_eq!(vp.offset(), 1);\n        vp.next_match();\n        assert_eq!(vp.offset(), 3);\n        // wrap around back to the first match\n        vp.next_match();\n        assert_eq!(vp.offset(), 1);\n    }\n\n    #[test]\n    fn scroll_clamps_to_max_offset() {\n        let mut vp = Viewport::new(2);\n        vp.append_line(Line::from(\"a\"));\n        vp.append_line(Line::from(\"b\"));\n        vp.append_line(Line::from(\"c\"));\n        // 3 lines, height 2 =\u003e max offset = 1\n        vp.scroll_down(10);\n        assert_eq!(vp.offset(), 1);\n        vp.scroll_up(5);\n        assert_eq!(vp.offset(), 0);\n    }\n\n    #[test]\n    fn empty_viewport_has_zero_lines() {\n        let vp = Viewport::new(10);\n        assert_eq!(vp.line_count(), 0);\n        assert_eq!(vp.match_count(), 0);\n        assert_eq!(vp.offset(), 0);\n    }\n\n    #[test]\n    fn scroll_up_beyond_zero_clamps() {\n        let mut vp = Viewport::new(10);\n        vp.append_line(Line::from(\"a\"));\n        vp.append_line(Line::from(\"b\"));\n        vp.append_line(Line::from(\"c\"));\n        vp.scroll_up(100);\n        assert_eq!(vp.offset(), 0);\n    }\n\n    #[test]\n    fn scroll_down_beyond_end_clamps() {\n        // 3 lines, height 5 =\u003e max_offset = 3.saturating_sub(5) = 0\n        let mut vp = Viewport::new(5);\n        vp.append_line(Line::from(\"a\"));\n        vp.append_line(Line::from(\"b\"));\n        vp.append_line(Line::from(\"c\"));\n        vp.scroll_down(100);\n        assert_eq!(vp.offset(), 0);\n    }\n\n    #[test]\n    fn search_with_no_matches_returns_zero() {\n        let mut vp = Viewport::new(10);\n        vp.append_line(Line::from(\"alpha\"));\n        vp.append_line(Line::from(\"beta\"));\n        vp.append_line(Line::from(\"gamma\"));\n        vp.set_search(Some(\"foo\"));\n        assert_eq!(vp.match_count(), 0);\n    }\n\n    #[test]\n    fn search_recomputes_after_append() {\n        let mut vp = Viewport::new(10);\n        vp.append_line(Line::from(\"foo one\"));\n        vp.append_line(Line::from(\"no match here\"));\n        vp.set_search(Some(\"foo\"));\n        assert_eq!(vp.match_count(), 1);\n        vp.append_line(Line::from(\"foo two\"));\n        assert_eq!(vp.match_count(), 2);\n    }\n\n    #[test]\n    fn clear_search_returns_all_lines_visible() {\n        let mut vp = vp_with_lines();\n        vp.set_search(Some(\"foo\"));\n        assert_eq!(vp.match_count(), 2);\n        vp.set_search(None);\n        assert_eq!(vp.match_count(), 0);\n        // Search only affects highlighting; the buffer is unchanged.\n        assert_eq!(vp.line_count(), 4);\n    }\n\n    #[test]\n    fn height_returns_configured_value() {\n        let vp = Viewport::new(7);\n        assert_eq!(vp.height(), 7);\n    }\n\n    #[test]\n    fn set_height_updates_value() {\n        let mut vp = Viewport::new(5);\n        vp.set_height(12);\n        assert_eq!(vp.height(), 12);\n    }\n\n    #[test]\n    fn set_lines_replaces_content() {\n        let mut vp = Viewport::new(10);\n        vp.append_line(Line::from(\"old\"));\n        assert_eq!(vp.line_count(), 1);\n        vp.set_lines(vec![Line::from(\"a\"), Line::from(\"b\"), Line::from(\"c\")]);\n        assert_eq!(vp.line_count(), 3);\n    }\n\n    #[test]\n    fn prev_match_scrolls_to_earlier_match() {\n        let mut vp = Viewport::new(2);\n        vp.append_line(Line::from(\"foo one\"));\n        vp.append_line(Line::from(\"foo two\"));\n        vp.append_line(Line::from(\"foo three\"));\n        vp.append_line(Line::from(\"foo four\"));\n        vp.set_search(Some(\"foo\"));\n        // Move to last match first via next_match calls, then prev_match should go back.\n        vp.next_match();\n        vp.next_match();\n        vp.next_match();\n        let offset_before = vp.offset();\n        vp.prev_match();\n        let offset_after = vp.offset();\n        // prev_match should not increase offset (either decreases or stays same)\n        assert!(\n            offset_after \u003c= offset_before,\n            \"offset_before={offset_before}, offset_after={offset_after}\"\n        );\n    }\n}\n","traces":[{"line":34,"address":[2004485,2004272,2004507],"length":1,"stats":{"Line":5}},{"line":36,"address":[5639226],"length":1,"stats":{"Line":7}},{"line":40,"address":[563 :[2004248,2003344,2004242],"length":1,"stats":{"Line":7}},{"line":192,"address":[2003367],"length":1,"stats":{"Line":8}},{"line":193,"address":[2003384],"length":1,"stats":{"Line":8}},{"line":196,"address":[2003448],"length":1,"stats":{"Line":3}},{"line":197,"address":[5638489,5638394],"length":1,"stats":{"Line":7}},{"line":200,"address":[2268297,2268272],"length":1,"stats":{"Line":22}},{"line":201,"address":[2237890,2237961],"length":1,"stats":{"Line":11}},{"line":202,"address":[2238162],"length":1,"stats":{"Line":7}}],"covered":71,"coverable":72},{"path":["/","home","lhjnano","source","project","ratatui-bubbles","crates","ratatui-bubbles","tests","elm_render.rs"],"content":"//! Integration test exercising the Elm architecture's [`ratatui_bubbles::elm::Model`] trait\n//! via a tiny counter example, rendered into a TestBackend buffer.\n\nuse pretty_assertions::assert_eq;\nuse ratatui::backend::TestBackend;\nuse ratatui::buffer::{Buffer, Cell};\nuse ratatui::layout::Rect;\nuse ratatui::widgets::Paragraph;\nuse ratatui::{Frame, Terminal};\nuse ratatui_bubbles::elm::{flatten, Command, Model};\n\n/// A minimal [`Model`] that counts increment/decrement messages.\n#[derive(Default)]\nstruct Counter {\n    count: i32,\n}\n\n/// Messages processed by [`Counter`].\nenum CounterMsg {\n    Increment,\n    Decrement,\n}\n\nimpl Model\u003cCounterMsg\u003e for Counter {\n    fn update(\u0026mut self, msg: CounterMsg) -\u003e Command\u003cCounterMsg\u003e {\n        match msg {\n            CounterMsg::Increment =\u003e self.count += 1,\n            CounterMsg::Decrement =\u003e self.count -= 1,\n        }\n        Command::none()\n    }\n\n    fn view(\u0026self, frame: \u0026mut Frame\u003c'_\u003e, area: Rect) {\n        let text = format!(\"count = {}\", self.count);\n        frame.render_widget(Paragraph::new(text), area);\n    }\n}\n\n/// Render `model` into a fresh [`TestBackend`] buffer of `width` x `height` cells.\nfn render_model(model: \u0026Counter, width: u16, height: u16) -\u003e Buffer {\n    let backend = TestBackend::new(width, height);\n    let mut terminal = Terminal::new(backend).expect(\"terminal\");\n    terminal\n        .draw(|frame: \u0026mut Frame\u003c'_\u003e| model.view(frame, Rect::new(0, 0, width, height)))\n        .expect(\"draw\");\n    terminal.backend().buffer().clone()\n}\n\n/// Collect the cell symbols in `buf` at row `y`, columns `0..len`, joined into a String.\nfn row_symbols(buf: \u0026Buffer, y: u16, len: u16) -\u003e String {\n    (0..len)\n        .map(|x| buf.cell((x, y)).map(Cell::symbol).unwrap_or(\"\").to_string())\n        .collect()\n}\n\n#[test]\nfn counter_updates_and_renders() {\n    let mut counter = Counter::default();\n    counter.update(CounterMsg::Increment);\n    counter.update(CounterMsg::Increment);\n    counter.update(CounterMsg::Increment);\n\n    let buf = render_model(\u0026counter, 20, 3);\n    // \"count = 3\" is 9 characters at row 0, column 0.\n    assert_eq!(row_symbols(\u0026buf, 0, 9), \"count = 3\");\n}\n\n#[test]\nfn command_flatten_via_model_update() {\n    let mut counter = Counter::default();\n\n    // Each update returns a `Command::None` leaf; collect them straight from the model.\n    let cmd1 = counter.update(CounterMsg::Increment);\n    let cmd2 = counter.update(CounterMsg::Increment);\n    let cmd3 = counter.update(CounterMsg::Decrement);\n\n    // Batch the three leaf commands and flatten end-to-end via `elm::flatten`.\n    let batch = Command::batch(vec![cmd1, cmd2, cmd3]);\n    let flattened = flatten(batch);\n\n    // Three non-Batch leaves survive flattening unchanged.\n    assert_eq!(flattened.len(), 3);\n    // And the model state reflects the net effect (+1 +1 -1 = +1).\n    assert_eq!(counter.count, 1);\n}\n","traces":[{"line":1,"address":[1905568,1905581],"length":1,"stats":{"Line":2}},{"line":13,"address":[1905606,1905600],"length":1,"stats":{"Line":4}},{"line":15,"address":[1905601],"length":1,"stats":{"Line":2}},{"line":25,"address":[1905872],"le s: {top:?}\");\n}\n\n#[test]\nfn renders_bindings_as_key_desc_pairs() {\n    let mut help = KeyHelp::new();\n    help.add(KeyBinding::new(\"q\", \"quit\"));\n    help.add(KeyBinding::new(\"r\", \"refresh\"));\n    let buf = render_buffer(\u0026help, 30, 6);\n    // The block has a 1-cell border. Content starts at row 1, col 1.\n    // First binding 'q' should be in row 1.\n    let row1 = row_symbols(\u0026buf, 1, 15);\n    assert!(row1.contains('q'), \"row1 was: {row1:?}\");\n    assert!(row1.contains(\"quit\"), \"row1 was: {row1:?}\");\n}\n\n#[test]\nfn excludes_disabled_bindings_from_render() {\n    let mut help = KeyHelp::new();\n    help.add(KeyBinding::new(\"q\", \"quit\"));\n    help.add(KeyBinding::new(\"d\", \"deleted\").disabled());\n    let buf = render_buffer(\u0026help, 30, 6);\n    // Scan all rows — 'deleted' should NOT appear anywhere\n    for y in 0..6 {\n        let row = row_symbols(\u0026buf, y, 30);\n        assert!(\n            !row.contains(\"deleted\"),\n            \"row {y} contained 'deleted': {row:?}\"\n        );\n    }\n}\n","traces":[{"line":1,"address":[1869549,1869536],"length":1,"stats":{"Line":2}},{"line":12,"address":[1866960,1867399,1867405],"length":1,"stats":{"Line":1}},{"line":13,"address":[1867006],"length":1,"stats":{"Line":1}},{"line":14,"address":[1867030],"length":1,"stats":{"Line":2}},{"line":16,"address":[1867176],"length":1,"stats":{"Line":5}},{"line":17,"address":[1867273],"length":1,"stats":{"Line":1}},{"line":18,"address":[1867323],"length":1,"stats":{"Line":2}},{"line":19,"address":[1867241,1867373],"length":1,"stats":{"Line":1}},{"line":21,"address":[1866864],"length":1,"stats":{"Line":2}},{"line":23,"address":[1875256,1875232],"length":1,"stats":{"Line":5}},{"line":24,"address":[1866933],"length":1,"stats":{"Line":2}},{"line":25,"address":[1866948],"length":1,"stats":{"Line":1}},{"line":28,"address":[1867424,1867913,1867907],"length":1,"stats":{"Line":3}},{"line":29,"address":[1867431],"length":1,"stats":{"Line": der the\n//! widget into an in-memory buffer and assert on the visible cell content.\n\n#![allow(clippy::needless_pass_by_value)]\n\nuse pretty_assertions::assert_eq;\nuse ratatui::backend::TestBackend;\nuse ratatui::buffer::Buffer;\nuse ratatui::layout::Rect;\nuse ratatui::style::Modifier;\nuse ratatui::text::Line;\nuse ratatui::{Frame, Terminal};\nuse ratatui_bubbles::list::{List, ListItem};\n\nstruct Task(\u0026'static str);\n\nimpl ListItem for Task {\n    fn render(\u0026self) -\u003e Line\u003c'_\u003e {\n        Line::from(self.0)\n    }\n    fn filterable_text(\u0026self) -\u003e \u0026str {\n        self.0\n    }\n}\n\n/// Render `list` into a fresh `width`x`height` TestBackend buffer.\nfn render_buffer(list: \u0026List\u003cTask\u003e, width: u16, height: u16) -\u003e Buffer {\n    let backend = TestBackend::new(width, height);\n    let mut terminal = Terminal::new(backend).expect(\"terminal\");\n    terminal\n        .draw(|frame: \u0026mut Frame| list.render(frame, Rect::new(0, 0, width, height)))\n        .expect(\"draw\");\n    terminal.backend().buffer().clone()\n}\n\n/// Collect symbols in row `y`, columns `0..len` as a single String.\nfn row_symbols(buf: \u0026Buffer, y: usize, len: usize) -\u003e String {\n    (0..len)\n        .map(|x| buf[(x as u16, y as u16)].symbol().to_string())\n        .collect()\n}\n\n#[test]\nfn renders_all_items_when_no_filter() {\n    let list = List::new(vec![Task(\"alpha\"), Task(\"beta\"), Task(\"gamma\")]);\n    let buf = render_buffer(\u0026list, 20, 5);\n\n    assert_eq!(row_symbols(\u0026buf, 0, 5), \"alpha\");\n    assert_eq!(row_symbols(\u0026buf, 1, 4), \"beta\");\n    assert_eq!(row_symbols(\u0026buf, 2, 5), \"gamma\");\n}\n\n#[test]\nfn renders_only_filtered_items() {\n    let mut list = List::new(vec![Task(\"alpha\"), Task(\"beta\"), Task(\"gamma\")]);\n    list.set_filter(\"am\");\n    let buf = render_buffer(\u0026list, 20, 5);\n\n    // Only \"gamma\" contains \"am\".\n    assert_eq!(list.filtered_len(), 1);\n    assert_eq!(row_symbols(\u0026buf, 0, 5), \"gamma\");\n    // Row 1 should be empty — the filtered set only has one row.\n    assert!(row_symbols(\u0026buf, 1, 20).trim().is_empty());\n}\n\n#[test]\nfn highlighted_style_applied_to_selected_item() {\n    let mut list = List::new(vec![Task(\"alpha\"), Task(\"beta\")]);\n    list.select_next(); // None -\u003e first (alpha, row 0)\n    list.select_next(); // first -\u003e second (beta, row 1)\n    let buf = render_buffer(\u0026list, 20, 5);\n\n    // The selected item should be on row 1 (\"beta\") with REVERSED modifier.\n    // We check only the modifier bits because ratatui's stateful rendering\n    // also stamps fg/bg/underline_color = Reset onto the cell, making a full\n    // Style equality assertion brittle across ratatui versions.\n    let selected = \u0026buf[(0, 1)];\n    assert!(\n        selected.style().add_modifier.contains(Modifier::REVERSED),\n        \"selected row should have REVERSED highlight, got {:?}\",\n        selected.style()\n    );\n\n    // Sanity check: the non-selected row must NOT carry REVERSED, otherwise\n    // the assertion above would be vacuous.\n    let unselected = \u0026buf[(0, 0)];\n    assert!(\n        !unselected.style().add_modifier.contains(Modifier::REVERSED),\n        \"non-selected row should not have REVERSED, got {:?}\",\n        unselected.style()\n    );\n}\n","traces":[{"line":1,"address":[1958256,1958269],"length":1,"stats":{"Line":2}},{"line":20,"address":[1958304],"length":1,"stats":{"Line":2}},{"line":21,"address":[1958324],"length":1,"stats":{"Line":2}},{"line":22,"address":[1958342],"length":1,"stats":{"Line":2}},{"line":23,"address":[1958288],"length":1,"stats":{"Line":1}},{"line":24,"address":[1958293],"length":1,"stats":{"Line":1}},{"line":25,"address":[1958300],"length":1,"stats":{"Line":1}},{"line":29,"address":[1954791,1954797,1954352],"length":1,"stats":{"Line":1}},{"line":30,"address":[1954398],"length":1,"stats":{"Line":1}},{"line":31,"address s":{"Line":0}},{"line":81,"address":[1957775],"length":1,"stats":{"Line":1}},{"line":83,"address":[1957833],"length":1,"stats":{"Line":0}},{"line":88,"address":[1957852,1958001],"length":1,"stats":{"Line":2}},{"line":89,"address":[1958131],"length":1,"stats":{"Line":0}},{"line":90,"address":[1958009],"length":1,"stats":{"Line":1}},{"line":92,"address":[1958086],"length":1,"stats":{"Line":0}},{"line":94,"address":[1943941],"length":1,"stats":{"Line":3}}],"covered":43,"coverable":47},{"path":["/","home","lhjnano","source","project","ratatui-bubbles","crates","ratatui-bubbles","tests","runtime_render.rs"],"content":"//! End-to-end test for [`ratatui_bubbles::runtime::main_loop`] using an\n//! injected [`TestBackend`] and a scripted [`EventSource`].\n//!\n//! Exercises the runtime's full message-drain -\u003e render -\u003e event-poll loop\n//! without touching the real terminal.\n\nuse std::io;\n\nuse crossterm::event::{Event, KeyCode, KeyEvent, KeyEventKind, KeyEventState, KeyModifiers};\nuse ratatui::backend::TestBackend;\nuse ratatui::buffer::Buffer;\nuse ratatui::layout::Rect;\nuse ratatui::widgets::{Block, Borders, Paragraph};\nuse ratatui::{Frame, Terminal};\nuse ratatui_bubbles::elm::{Command, Model};\nuse ratatui_bubbles::runtime::{main_loop, App};\nuse ratatui_bubbles::test_utils::ScriptedEventSource;\n\n// ============================================================\n// Counter App -- copied from examples/demo.rs (private there),\n// simplified to a plain `Count: N` render for easy assertions.\n// ============================================================\n\n#[derive(Debug, Default)]\nstruct Counter {\n    count: i32,\n}\n\n#[derive(Debug, Clone, Copy, PartialEq, Eq)]\nenum Msg {\n    Increment,\n    Decrement,\n    Quit,\n}\n\nimpl Model\u003cMsg\u003e for Counter {\n    fn update(\u0026mut self, msg: Msg) -\u003e Command\u003cMsg\u003e {\n        match msg {\n            Msg::Increment =\u003e self.count += 1,\n            Msg::Decrement =\u003e self.count -= 1,\n            Msg::Quit =\u003e {}\n        }\n        Command::none()\n    }\n\n    fn view(\u0026self, frame: \u0026mut Frame, area: Rect) {\n        let text = format!(\"Count: {}\", self.count);\n        let block = Block::default().borders(Borders::ALL).title(\"Counter\");\n        let paragraph = Paragraph::new(text).block(block);\n        frame.render_widget(paragraph, area);\n    }\n}\n\nimpl App for Counter {\n    type Msg = Msg;\n\n    fn init(\u0026mut self) -\u003e Command\u003cMsg\u003e {\n        Command::none()\n    }\n\n    fn on_event(\u0026mut self, event: Event) -\u003e Option\u003cMsg\u003e {\n        if let Event::Key(KeyEvent {\n            code,\n            kind: KeyEventKind::Press,\n            ..\n        }) = event\n        {\n            match code {\n                KeyCode::Char('+') | KeyCode::Up =\u003e return Some(Msg::Increment),\n                KeyCode::Char('-') | KeyCode::Down =\u003e return Some(Msg::Decrement),\n                KeyCode::Char('q') | KeyCode::Esc =\u003e return Some(Msg::Quit),\n                _ =\u003e {}\n            }\n        }\n        None\n    }\n\n    fn should_quit(\u0026self, msg: \u0026Msg) -\u003e bool {\n        matches!(msg, Msg::Quit)\n    }\n}\n\n// ============================================================\n// Helpers\n// ============================================================\n\nfn key_event(code: KeyCode) -\u003e Event {\n    Event::Key(KeyEvent {\n        code,\n        modifiers: KeyModifiers::NONE,\n        kind: KeyEventKind::Press,\n        state: KeyEventState::NONE,\n    })\n}\n\n/// Drive `program` through `main_loop` with a TestBackend and a scripted\n/// event queue. Returns the final buffer for assertions.\nfn run_program(program: \u0026mut Counter, events: Vec\u003cEvent\u003e) -\u003e io::Result\u003cBuffer\u003e {\n    let backend = TestBackend::new(30, 5);\n    let mut terminal = Terminal::new(backend).expect(\"terminal\");\n    let mut source = ScriptedEventSource::new(events);\n    main_loop(program, \u0026mut terminal, \u0026mut source)?;\n    Ok(terminal.backend().buffer().clone())\n}\n\nfn row_symbols(buf: \u0026Buffer, y: usize, len: usize) -\u003e String {\n    (0..len)\n        .map(|x| buf[(x as u16, y as u16)].symbol().to_string())\n        .collect()\n}\n\n// ============================================================\n// Tests\n// ============================================================\n\n#[test]\nfn counter_starts_at_zero_and_renders() {\n    // A single Quit event: the initial render still shows count = 0 before\n    // the Quit message is drained and the loop exits cleanly.\n    let mut counter = Counter::default();\n    let events = vec![key_event(KeyCode::Char('q'))];\n    let buf = run_program(\u0026mut counter, events).expect(\"ran\");\n\n    // The Counter renders \"Count: 0\" inside a bordered block.\n    // Row 1 (inside the border) should contain \"Count: 0\".\n    let row1 = row_symbols(\u0026buf, 1, 30);\n    assert!(\n        row1.contains(\"Count: 0\"),\n        \"expected 'Count: 0' in row 1, got: {row1:?}\"\n    );\n}\n\n#[test]\nfn increment_events_increase_count() {\n    let mut counter = Counter::default();\n    // 3 increments then quit.\n    let events = vec![\n        key_event(KeyCode::Char('+')),\n        key_event(KeyCode::Char('+')),\n        key_event(KeyCode::Char('+')),\n        key_event(KeyCode::Char('q')),\n    ];\n    let buf = run_program(\u0026mut counter, events).expect(\"ran\");\n\n    let row1 = row_symbols(\u0026buf, 1, 30);\n    assert!(\n        row1.contains(\"Count: 3\"),\n        \"expected 'Count: 3' in row 1, got: {row1:?}\"\n    );\n}\n\n#[test]\nfn decrement_events_decrease_count() {\n    let mut counter = Counter::default();\n    // 2 decrements then quit.\n    let events = vec![\n        key_event(KeyCode::Char('-')),\n        key_event(KeyCode::Char('-')),\n        key_event(KeyCode::Char('q')),\n    ];\n    let buf = run_program(\u0026mut counter, events).expect(\"ran\");\n\n    let row1 = row_symbols(\u0026buf, 1, 30);\n    assert!(\n        row1.contains(\"Count: -2\"),\n        \"expected 'Count: -2' in row 1, got: {row1:?}\"\n    );\n}\n\n#[test]\nfn mixed_events_net_to_correct_count() {\n    let mut counter = Counter::default();\n    // +5, -2 -\u003e net +3\n    let events = vec![\n        key_event(KeyCode::Up),\n        key_event(KeyCode::Up),\n        key_event(KeyCode::Up),\n        key_event(KeyCode::Up),\n        key_event(KeyCode::Up),\n        key_event(KeyCode::Down),\n        key_event(KeyCode::Down),\n        key_event(KeyCode::Esc),\n    ];\n    let buf = run_program(\u0026mut counter, events).expect(\"ran\");\n\n    let row1 = row_symbols(\u0026buf, 1, 30);\n    assert!(\n        row1.contains(\"Count: 3\"),\n        \"expected 'Count: 3' in row 1, got: {row1:?}\"\n    );\n}\n\n#[test]\nfn quit_event_exits_cleanly() {\n    let mut counter = Counter::default();\n    let events = vec![key_event(KeyCode::Char('q'))];\n    let result = run_program(\u0026mut counter, events);\n    assert!(result.is_ok(), \"main_loop should exit cleanly on Quit\");\n}\n\n#[test]\nfn exhaustion_breaks_loop_without_quit() {\n    // No Quit event -- exhaustion should propagate as UnexpectedEof and\n    // cause run_program to return Err.\n    let mut counter = Counter::default();\n    let events = vec![key_event(KeyCode::Char('+'))];\n    let result = run_program(\u0026mut counter, events);\n    assert!(\n        result.is_err(),\n        \"expected Err on exhaustion, got: {result:?}\"\n    );\n    let err = result.unwrap_err();\n    assert_eq!(err.kind(), io::ErrorKind::UnexpectedEof);\n}\n","traces":[{"line":1,"address":[1875709,1875696],"length":1,"stats":{"Line":2}},{"line":24,"address":[1876150,1876144,1876032,1876000],"length":1,"stats":{"Line":12}},{"line":26,"address":[1876027,1876145],"length":1,"stats":{"Line":6}},{"line":29,"address":[1875824,1876106,1875808,1876096,1875843,1875984,1875989,1875813],"length":1," ckend::new(width, height);\n    let mut terminal = Terminal::new(backend).expect(\"terminal\");\n    terminal\n        .draw(|frame: \u0026mut Frame| spinner.render(frame, Rect::new(0, 0, width, height)))\n        .expect(\"draw\");\n    terminal.backend().buffer().clone()\n}\n\n/// Collect symbols in row `y`, columns `0..len` as a single String.\nfn row_symbols(buf: \u0026Buffer, y: usize, len: usize) -\u003e String {\n    (0..len)\n        .map(|x| buf[(x as u16, y as u16)].symbol().to_string())\n        .collect()\n}\n\n#[test]\nfn renders_line_style_frame_zero() {\n    let spinner = Spinner::new(SpinnerStyle::Line);\n    let buf = render_buffer(\u0026spinner, 5, 1);\n    // Line frame 0 is \"|\"\n    assert_eq!(row_symbols(\u0026buf, 0, 1), \"|\");\n}\n\n#[test]\nfn renders_after_tick_advances_frame() {\n    let mut spinner = Spinner::new(SpinnerStyle::Line);\n    let buf_before = render_buffer(\u0026spinner, 5, 1);\n    assert_eq!(row_symbols(\u0026buf_before, 0, 1), \"|\");\n    spinner.tick();\n    let buf_after = render_buffer(\u0026spinner, 5, 1);\n    assert_eq!(row_symbols(\u0026buf_after, 0, 1), \"/\");\n}\n\n#[test]\nfn renders_dot_style_first_frame() {\n    let spinner = Spinner::new(SpinnerStyle::Dot);\n    let buf = render_buffer(\u0026spinner, 5, 1);\n    // Dot frame 0 is \"⣾\" (multi-byte unicode)\n    let s = row_symbols(\u0026buf, 0, 1);\n    assert_eq!(s, \"⣾\");\n}\n","traces":[{"line":1,"address":[1928861,1928848],"length":1,"stats":{"Line":2}},{"line":14,"address":[1927031,1926592,1927037],"length":1,"stats":{"Line":3}},{"line":15,"address":[1926638],"length":1,"stats":{"Line":3}},{"line":16,"address":[1926662],"length":1,"stats":{"Line":3}},{"line":18,"address":[1920814,1920800],"length":1,"stats":{"Line":9}},{"line":19,"address":[1926905],"length":1,"stats":{"Line":3}},{"line":20,"address":[1926955],"length":1,"stats":{"Line":2}},{"line":21,"address":[1927005,1926873],"length":1,"stats":{"Line":2}},{"line":24,"address":[1926496],"length":1  Row, Table};\n\n#[derive(Debug, Clone)]\nstruct Person {\n    name: \u0026'static str,\n    age: \u0026'static str,\n}\nimpl Row for Person {\n    fn cells(\u0026self) -\u003e Vec\u003cString\u003e {\n        vec![self.name.to_string(), self.age.to_string()]\n    }\n}\n\nfn columns() -\u003e Vec\u003cColumn\u003e {\n    vec![Column::new(\"name\", 10), Column::new(\"age\", 5)]\n}\n\nfn render_buffer(table: \u0026Table\u003cPerson\u003e, width: u16, height: u16) -\u003e Buffer {\n    let backend = TestBackend::new(width, height);\n    let mut terminal = Terminal::new(backend).expect(\"terminal\");\n    terminal\n        .draw(|frame: \u0026mut Frame| table.render(frame, Rect::new(0, 0, width, height)))\n        .expect(\"draw\");\n    terminal.backend().buffer().clone()\n}\n\nfn row_symbols(buf: \u0026Buffer, y: usize, len: usize) -\u003e String {\n    (0..len)\n        .map(|x| buf[(x as u16, y as u16)].symbol().to_string())\n        .collect()\n}\n\n#[test]\nfn renders_header_row() {\n    let t = Table::\u003cPerson\u003e::new(columns());\n    let buf = render_buffer(\u0026t, 20, 5);\n    // Header row should contain 'name'\n    let header = row_symbols(\u0026buf, 0, 10);\n    assert!(header.starts_with(\"name\"));\n}\n\n#[test]\nfn renders_data_rows_below_header() {\n    let mut t = Table::\u003cPerson\u003e::new(columns());\n    t.set_rows(vec![\n        Person {\n            name: \"alice\",\n            age: \"30\",\n        },\n        Person {\n            name: \"bob\",\n            age: \"25\",\n        },\n    ]);\n    let buf = render_buffer(\u0026t, 20, 5);\n    // Row 1 should contain 'alice', row 2 'bob' (header is row 0)\n    let row1 = row_symbols(\u0026buf, 1, 10);\n    let row2 = row_symbols(\u0026buf, 2, 10);\n    assert!(row1.starts_with(\"alice\"), \"row1 was: {row1:?}\");\n    assert!(row2.starts_with(\"bob\"), \"row2 was: {row2:?}\");\n}\n\n#[test]\nfn renders_no_data_rows_when_empty() {\n    let t = Table::\u003cPerson\u003e::new(columns());\n    let buf = render_buffer(\u0026t, 20, 5);\n    // Row 0 has header; row 1 should be empty\n    let row1 = row_symbols(\u0026buf, 1, 10);\n    assert!(row1.trim().is_empty(), \"row1 was: {row1:?}\");\n}\n","traces":[{"line":1,"address":[1872509,1872496],"length":1,"stats":{"Line":2}},{"line":13,"address":[1872920,1873024,1873050,1872880],"length":1,"stats":{"Line":0}},{"line":15,"address":[1873035],"length":1,"stats":{"Line":0}},{"line":16,"address":[1872908,1873042],"length":1,"stats":{"Line":0}},{"line":19,"address":[1873072,1873390,1873396],"length":1,"stats":{"Line":1}},{"line":20,"address":[1873377,1873096],"length":1,"stats":{"Line":1}},{"line":21,"address":[1873372],"length":1,"stats":{"Line":1}},{"line":24,"address":[1872528,1872858,1872852],"length":1,"stats":{"Line":3}},{"line":25,"address":[1872542,1872839],"length":1,"stats":{"Line":3}},{"line":26,"address":[1872834],"length":1,"stats":{"Line":3}},{"line":28,"address":[1870080,1870519,1870525],"length":1,"stats":{"Line":2}},{"line":29,"address":[1870126],"length":1,"stats":{"Line":2}},{"line":30,"address":[1870150],"length":1,"stats":{"Line":2}},{"line":32,"address":[1869104,1869118],"length":1,"stats":{"Line":5}},{"line":33,"address":[1870393],"length":1,"stats":{"Line":2}},{"line":34,"address":[1870443],"length":1,"stats":{"Line":2}},{"line":35,"address":[1870493,1870361],"length":1,"stats":{"Line":2}},{"line":37,"address":[1869984],"length":1,"stats":{"Line":3}},{"line":39,"address":[1869032,1869008],"length":1,"stats":{"Line":9}},{"line":40,"address":[1870053],"length":1,"stats":{"Line":3}},{"line":41,"address":[1870068],"length":1,"stats":{"Line":3}},{"line":44,"address":[1869234,1869216],"length":1,"stats":{"Line":3}},{"line":45,"address":[1870564],"length":1,"stats":{"Line":1}},{"line":46,"address":[1870612],"length":1,"stats":{"Line":1}},{"line":48,"address":[1870681],"length":1,"stats":{"Line":1}},{"line":49,"address":[1870805,1870737],"length":1,"stats":{"Line":2}},{"line":50,"address":[1869 fer().clone()\n}\n\n/// Collect the symbols in `buf` at row `y`, columns `0..len`, joined into a\n/// single `String`.\nfn row_symbols(buf: \u0026Buffer, y: u16, len: u16) -\u003e String {\n    (0..len)\n        .map(|x| {\n            buf.cell(Position { x, y })\n                .map(Cell::symbol)\n                .unwrap_or(\"\")\n                .to_string()\n        })\n        .collect()\n}\n\n#[test]\nfn renders_single_line_content() {\n    let mut ti = TextInput::new();\n    ti.insert_str(\"hello world\");\n    let buf = render_input(\u0026ti, 30, 3);\n    // \"hello world\" (11 chars) should render at row 0, column 0.\n    assert_eq!(row_symbols(\u0026buf, 0, 11), \"hello world\");\n}\n\n#[test]\nfn renders_multiline_content() {\n    let mut ti = TextInput::new();\n    ti.insert_str(\"line1\");\n    ti.enter();\n    ti.insert_str(\"line2\");\n    let buf = render_input(\u0026ti, 20, 3);\n    // \"line1\" on row 0, \"line2\" on row 1.\n    assert_eq!(row_symbols(\u0026buf, 0, 5), \"line1\");\n    assert_eq!(row_symbols(\u0026buf, 1, 5), \"line2\");\n}\n","traces":[{"line":1,"address":[1955229,1955216],"length":1,"stats":{"Line":2}},{"line":10,"address":[1953735,1953296,1953741],"length":1,"stats":{"Line":1}},{"line":11,"address":[1953342],"length":1,"stats":{"Line":1}},{"line":12,"address":[1953366],"length":1,"stats":{"Line":1}},{"line":14,"address":[1921662,1921648],"length":1,"stats":{"Line":5}},{"line":15,"address":[1953609],"length":1,"stats":{"Line":2}},{"line":16,"address":[1953659],"length":1,"stats":{"Line":2}},{"line":17,"address":[1953577,1953709],"length":1,"stats":{"Line":2}},{"line":21,"address":[1953216],"length":1,"stats":{"Line":2}},{"line":23,"address":[1921536],"length":1,"stats":{"Line":4}},{"line":24,"address":[1921563],"length":1,"stats":{"Line":2}},{"line":25,"address":[1921584],"length":1,"stats":{"Line":2}},{"line":26,"address":[1921595],"length":1,"stats":{"Line":2}},{"line":27,"address":[1921618],"length":1,"stats":{"Line":2}},{"lin
